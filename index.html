<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b1622" />
  <title>CAPITAN AI — Enterprise Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7/dist/ethers.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <style>
    :root {
      --bg-primary: #0b1622;
      --bg-secondary: #0f1a2a;
      --bg-tertiary: #1a2a3a;
      --surface: #0f1a2a;
      --surface-float: rgba(15, 26, 42, 0.75);
      --border: #1e2d3d;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --accent-cyan: #00d4ff;
      --accent-violet: #7c3aed;
      --accent-glow-cyan: rgba(0, 212, 255, 0.15);
      --accent-glow-violet: rgba(124, 58, 237, 0.15);
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
      --glass-bg: rgba(15, 26, 42, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(20px);
      --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      --shadow-glow: 0 0 30px rgba(0, 212, 255, 0.1);
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-size-base: 13px;
      --line-height-base: 1.55;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-pill: 9999px;
      --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --duration-fast: 150ms;
      --duration-med: 300ms;
      --duration-slow: 500ms;
    }

    body.light {
      --bg-primary: #f8fafc;
      --bg-secondary: #f1f5f9;
      --bg-tertiary: #e2e8f0;
      --surface: #ffffff;
      --surface-float: rgba(255, 255, 255, 0.75);
      --border: #cbd5e1;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-tertiary: #64748b;
      --glass-bg: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(0, 0, 0, 0.06);
    }

    body {
      margin: 0; padding: 0; height: 100vh; overflow: hidden;
      font-family: var(--font-family); font-size: var(--font-size-base);
      line-height: var(--line-height-base); background: var(--bg-primary);
      color: var(--text-primary);
      transition: background var(--duration-med) var(--ease-smooth), color var(--duration-med) var(--ease-smooth);
    }

    capitan-app-shell { display: block; height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <capitan-app-shell></capitan-app-shell>

  <script>
    // ==================== STORE ====================
    class Store {
      constructor(initialState = {}) {
        this._state = JSON.parse(JSON.stringify(initialState));
        this._subscribers = new Map();
        this._globalSubscribers = new Set();
      }
      get(path) {
        const keys = path.split('.');
        let val = this._state;
        for (const key of keys) {
          if (val == null) return undefined;
          val = val[key];
        }
        return val;
      }
      set(path, value) {
        const keys = path.split('.');
        let obj = this._state;
        for (let i = 0; i < keys.length - 1; i++) {
          if (typeof obj[keys[i]] !== 'object' || obj[keys[i]] === null) obj[keys[i]] = {};
          obj = obj[keys[i]];
        }
        const oldValue = obj[keys[keys.length - 1]];
        if (oldValue !== value) {
          obj[keys[keys.length - 1]] = value;
          this._notify(path, value, oldValue);
        }
      }
      subscribe(pathOrCallback, callback) {
        if (typeof pathOrCallback === 'function') {
          this._globalSubscribers.add(pathOrCallback);
          return () => this._globalSubscribers.delete(pathOrCallback);
        }
        if (!this._subscribers.has(pathOrCallback)) {
          this._subscribers.set(pathOrCallback, new Set());
        }
        this._subscribers.get(pathOrCallback).add(callback);
        return () => {
          const set = this._subscribers.get(pathOrCallback);
          if (set) set.delete(callback);
        };
      }
      _notify(path, newValue, oldValue) {
        const subs = this._subscribers.get(path);
        if (subs) subs.forEach(cb => cb(newValue, oldValue, path));
        const parts = path.split('.');
        for (let i = parts.length - 1; i > 0; i--) {
          const parentPath = parts.slice(0, i).join('.');
          const parentSubs = this._subscribers.get(parentPath);
          if (parentSubs) parentSubs.forEach(cb => cb(this.get(parentPath), oldValue, parentPath));
        }
        this._globalSubscribers.forEach(cb => cb(path, newValue, oldValue));
      }
      transaction(fn) { fn(this); }
      hydrate() {
        const token = localStorage.getItem('ct');
        if (token) {
          this.set('auth.token', token);
          const user = localStorage.getItem('cu');
          if (user) { try { this.set('auth.user', JSON.parse(user)); } catch(e){} }
        }
        this.set('ui.theme', localStorage.getItem('theme') || 'dark');
      }
    }

    const initialState = {
      auth: { token: null, user: null, isAdmin: false, isGuest: false, loading: false, error: null },
      ui: { theme: 'dark', sidebarOpen: false, activeView: 'chat', openDrawer: null, modals: [], toasts: [], walletTab: 'tokens', showClaimModal: false },
      tokens: { balance: 0, tier: 'free', rate: 0, loading: false },
      wallet: {
        address: localStorage.getItem('os_address') || null,
        network: parseInt(localStorage.getItem('network') || '137'),
        balances: [],
        activity: [],
        chartData: [],
        chartTimeframe: '1h',
        activityPage: 0, activityHasMore: true,
        loadingBalances: false, loadingActivity: false,
        markets: { crypto: [], stocks: [], commodities: [] },
        totalUsd: 0,
        addressBook: JSON.parse(localStorage.getItem('addressBook') || '[]'),
        walletConnectUri: null,
        connectedDapps: [],
      },
      chat: { messages: [], currentChatId: null, sending: false, history: [], loadingHistory: false, deepReasoning: false },
      portfolio: { items: [], loading: false },
      research: { topics: [], projects: [], loading: false },
      developer: { keys: [], webhooks: [], loadingKeys: false, loadingWebhooks: false },
      workspaces: { list: [], activeRoomId: null, messages: {}, loadingList: false, loadingMessages: false },
      community: { leaderboard: [], badges: [], loading: false },
      notifications: { items: [], unreadCount: 0, loading: false, lastFetch: null },
      admin: { dashboardData: null, loading: false },
    };

    const store = new Store(initialState);
    store.hydrate();

    // ==================== API ====================
    const BASE_URL = 'https://capitan-ai-jxu8.onrender.com';
    class ApiError extends Error {
      constructor(message, status) { super(message); this.status = status; }
    }

    async function request(endpoint, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      const token = store.get('auth.token');
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const config = { ...options, headers };
      if (config.body && typeof config.body === 'object' && !(config.body instanceof FormData)) {
        config.body = JSON.stringify(config.body);
      }
      const res = await fetch(BASE_URL + endpoint, config);
      if (res.status === 401) {
        store.set('auth.token', null);
        store.set('auth.user', null);
        localStorage.removeItem('ct');
        localStorage.removeItem('cu');
        throw new ApiError('Session expired', 401);
      }
      if (!res.ok) {
        let message = 'Request failed';
        try {
          const errorBody = await res.json();
          message = errorBody.detail || errorBody.message || message;
        } catch(e) {
          const text = await res.text();
          if (text) message = text;
        }
        throw new ApiError(message, res.status);
      }
      const contentType = res.headers.get('content-type');
      if (contentType && contentType.includes('application/json')) return res.json();
      return res.text();
    }

    const api = {
      get: (endpoint) => request(endpoint, { method: 'GET' }),
      post: (endpoint, body) => request(endpoint, { method: 'POST', body }),
      put: (endpoint, body) => request(endpoint, { method: 'PUT', body }),
      delete: (endpoint) => request(endpoint, { method: 'DELETE' }),
      // NEW: claim wallet (backend must implement /api/wallet/claim)
      claimWallet: () => request('/api/wallet/claim', { method: 'POST' }),
    };

    // ==================== BASE ELEMENT ====================
    class CapitanElement extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        this._unsubscribeFunctions = [];
      }
      connectedCallback() {
        this._unsubscribeFunctions = this.subscribe();
        this.render();
      }
      disconnectedCallback() {
        this._unsubscribeFunctions.forEach(fn => fn());
        this._unsubscribeFunctions = [];
      }
      subscribe() { return []; }
      render() {}
      observe(path, callback) { return store.subscribe(path, callback); }
      emit(name, detail) {
        this.dispatchEvent(new CustomEvent(name, { bubbles: true, composed: true, detail }));
      }
      toast(msg, type = 'info') {
        const id = Date.now();
        store.transaction(s => {
          const toasts = s.get('ui.toasts') || [];
          s.set('ui.toasts', [...toasts, { id, msg, type }]);
        });
        setTimeout(() => {
          store.transaction(s => {
            const toasts = s.get('ui.toasts');
            s.set('ui.toasts', toasts.filter(t => t.id !== id));
          });
        }, 3000);
      }
      static define(tag) {
        if (!customElements.get(tag)) customElements.define(tag, this);
      }
    }

    // ==================== TOAST CONTAINER ====================
    class ToastContainer extends CapitanElement {
      subscribe() { return [this.observe('ui.toasts', () => this.render())]; }
      render() {
        const toasts = store.get('ui.toasts') || [];
        if (toasts.length === 0) { this.shadowRoot.innerHTML = ''; return; }
        this.shadowRoot.innerHTML = `
          <style>
            .toast-container { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; }
            .toast { background:var(--glass-bg); backdrop-filter:var(--glass-blur); color:var(--text-primary); padding:10px 20px; border-radius:40px; font-size:13px; box-shadow:var(--shadow-lg); border:1px solid var(--glass-border); animation:slideUp 0.3s var(--ease-spring); }
            .toast-success { border-left:4px solid var(--success); }
            .toast-error { border-left:4px solid var(--danger); }
            @keyframes slideUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
          </style>
          <div class="toast-container">${toasts.map(t => `<div class="toast toast-${t.type}">${t.msg}</div>`).join('')}</div>
        `;
      }
    }
    ToastContainer.define('capitan-toast-container');

    // ==================== APP SHELL ====================
    class AppShell extends CapitanElement {
      subscribe() {
        return [
          this.observe('auth.token', () => this.render()),
          this.observe('ui.theme', (theme) => {
            document.body.className = theme === 'auto' ? (new Date().getHours() >= 6 && new Date().getHours() < 18 ? 'light' : 'dark') : theme;
          }),
        ];
      }
      render() {
        this.shadowRoot.innerHTML = `
          <style>
            :host { display:block; height:100%; width:100%; }
          </style>
          <capitan-main-layout></capitan-main-layout>
          <capitan-toast-container></capitan-toast-container>
          <capitan-modals></capitan-modals>
          <capitan-claim-modal></capitan-claim-modal>
        `;
      }
    }
    AppShell.define('capitan-app-shell');

    // ==================== CLAIM MODAL (shown if no wallet) ====================
    class ClaimModal extends CapitanElement {
      subscribe() {
        return [this.observe('ui.showClaimModal', (val) => {
          if (val) this.render();
          else this.shadowRoot.innerHTML = '';
        })];
      }
      render() {
        if (!store.get('ui.showClaimModal')) { this.shadowRoot.innerHTML = ''; return; }
        this.shadowRoot.innerHTML = `
          <style>
            .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(16px); z-index:2000; display:flex; align-items:center; justify-content:center; padding:16px; }
            .modal { background:var(--glass-bg); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-xl); max-width:440px; width:100%; padding:32px 24px; text-align:center; box-shadow:0 25px 60px rgba(0,0,0,0.7); }
            h2 { font-size:24px; font-weight:700; margin-bottom:12px; background:linear-gradient(135deg,var(--accent-cyan),var(--accent-violet)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
            p { color:var(--text-secondary); font-size:14px; margin-bottom:24px; line-height:1.6; }
            .pill-btn {
              padding: 14px 28px; border-radius: var(--radius-pill); border: none;
              background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
              color: white; font-weight: 700; font-size: 16px; cursor: pointer;
              box-shadow: 0 4px 20px rgba(0,212,255,0.3); transition: transform 0.2s, box-shadow 0.2s;
            }
            .pill-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,255,0.4); }
          </style>
          <div class="overlay">
            <div class="modal">
              <h2>Welcome to CAPITAN AI</h2>
              <p>To unlock the full power of Capitan, you need an OS Wallet.<br/>
                 Create yours now and receive <strong>1,000 CLOSE tokens</strong> for free.</p>
              <button class="pill-btn" id="claimBtn">Create OS Wallet</button>
            </div>
          </div>
        `;
        this.shadowRoot.getElementById('claimBtn').addEventListener('click', () => {
          this._claimWallet();
        });
      }
      async _claimWallet() {
        try {
          const data = await api.claimWallet(); // { token, address, balance }
          store.set('auth.token', data.token);
          store.set('auth.user', data.user || { name: 'User' }); // minimal user
          store.set('auth.isAdmin', false);
          localStorage.setItem('ct', data.token);
          if (data.user) localStorage.setItem('cu', JSON.stringify(data.user));
          store.set('wallet.address', data.address);
          localStorage.setItem('os_address', data.address);
          store.set('tokens.balance', data.balance || 1000);
          store.set('ui.showClaimModal', false);
          this.toast('Wallet created! 1,000 CLOSE added.', 'success');
        } catch (e) {
          alert('Failed to create wallet: ' + e.message);
        }
      }
    }
    ClaimModal.define('capitan-claim-modal');

    // ==================== MAIN LAYOUT ====================
    class MainLayout extends CapitanElement {
      subscribe() { return [this.observe('ui.activeView', () => this.render())]; }
      render() {
        const activeView = store.get('ui.activeView') || 'chat';
        this.shadowRoot.innerHTML = `
          <style>
            :host { display:flex; height:100%; overflow:hidden; }
            capitan-sidebar { width:280px; flex-shrink:0; }
            .main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
          </style>
          <capitan-sidebar></capitan-sidebar>
          <div class="main-content">
            ${this._getView(activeView)}
          </div>
        `;
      }
      _getView(view) {
        const views = {
          chat:'<capitan-chat-view></capitan-chat-view>',
          wallet:'<capitan-wallet-view></capitan-wallet-view>',
          portfolio:'<capitan-portfolio-view></capitan-portfolio-view>',
          research:'<capitan-research-view></capitan-research-view>',
          developer:'<capitan-developer-view></capitan-developer-view>',
          workspaces:'<capitan-workspaces-view></capitan-workspaces-view>',
          community:'<capitan-community-view></capitan-community-view>',
          dashboard:'<capitan-dashboard-view></capitan-dashboard-view>'
        };
        return views[view] || views.chat;
      }
    }
    MainLayout.define('capitan-main-layout');

    // ==================== SIDEBAR ====================
    class Sidebar extends CapitanElement {
      subscribe() {
        return [
          this.observe('ui.activeView', () => this.render()),
          this.observe('tokens.balance', () => this.render()),
          this.observe('auth.user', () => this.render()),
          this.observe('tokens.tier', () => this.render()),
        ];
      }
      render() {
        const activeView = store.get('ui.activeView');
        const user = store.get('auth.user');
        const balance = store.get('tokens.balance');
        const tier = store.get('tokens.tier');
        const hasWallet = !!store.get('wallet.address') && !!store.get('auth.token');
        this.shadowRoot.innerHTML = `
          <style>
            :host { display:flex; flex-direction:column; height:100%; background:var(--surface); border-right:1px solid var(--border); }
            .brand { padding:16px 20px 12px; display:flex; align-items:center; gap:10px; }
            .logo-text { font-weight:800; font-size:20px; letter-spacing:1px; background:linear-gradient(135deg,var(--accent-cyan),var(--accent-violet)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
            .nav { padding:8px 12px; flex:1; }
            .nav-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:var(--radius-md); cursor:pointer; font-weight:500; font-size:13px; color:var(--text-secondary); transition:all var(--duration-fast); margin-bottom:2px; }
            .nav-item:hover { background:var(--bg-tertiary); color:var(--text-primary); }
            .nav-item.active { background:var(--accent-glow-cyan); color:var(--accent-cyan); }
            .nav-item.locked { opacity:0.4; cursor:not-allowed; }
            .nav-item svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; flex-shrink:0; }
            .footer { padding:12px 16px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
            .profile { display:flex; align-items:center; gap:10px; cursor:pointer; }
            .avatar { width:36px; height:36px; border-radius:50%; background:var(--accent-glow-cyan); border:2px solid var(--accent-cyan); display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--accent-cyan); }
            .name { font-weight:600; font-size:13px; }
            .tier { font-size:10px; color:var(--accent-cyan); }
            .balance { font-size:11px; color:var(--text-tertiary); }
          </style>
          <div class="brand"><span class="logo-text">CAPITAN AI</span></div>
          <div class="nav">
            ${this._navItem('chat', 'Chat', 'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z', activeView, hasWallet)}
            ${this._navItem('wallet', 'OS Wallets', 'M20 21V5a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v16 M20 17h-5a3 3 0 0 1 0-6h5 M4 10h4v4H4z', activeView, true)}
            ${this._navItem('portfolio', 'Portfolio', 'M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z', activeView, hasWallet)}
            ${this._navItem('research', 'Research', 'M12 2a10 10 0 1 0 10 10 M12 8v8 M8 12h8', activeView, hasWallet)}
            ${this._navItem('developer', 'Developer', 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M8 16h8 M8 12h8', activeView, hasWallet)}
            ${this._navItem('workspaces', 'Workspaces', 'M12 2a10 10 0 1 0 10 10 M12 8v8 M8 12h8', activeView, hasWallet)}
            ${this._navItem('community', 'Community', 'M17 21v-2a4 4 0 0 0-3-3.87 M7 21v-2a4 4 0 0 1 3-3.87 M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z', activeView, hasWallet)}
            ${store.get('auth.isAdmin') ? this._navItem('dashboard', 'Dashboard', 'M3 3h7v7H3z M14 3h7v7h-7z M3 14h7v7H3z M14 14h7v7h-7z', activeView, true) : ''}
          </div>
          <div class="footer">
            <div class="profile">
              <div class="avatar">${user?.name?.charAt(0) || '?'}</div>
              <div><div class="name">${user?.name || 'Guest'}</div><div class="tier">${tier || 'free'}</div></div>
            </div>
            <div class="balance">${Math.floor(balance).toLocaleString()} CLOSE</div>
          </div>
        `;
        this._attachListeners();
      }
      _navItem(view, label, svgPath, activeView, enabled = true) {
        const cls = `nav-item ${view === activeView ? 'active' : ''} ${!enabled ? 'locked' : ''}`;
        return `<div class="${cls}" data-view="${view}" ${!enabled ? 'title="Requires OS Wallet"' : ''}><svg viewBox="0 0 24 24"><path d="${svgPath}"/></svg>${label}</div>`;
      }
      _attachListeners() {
        setTimeout(() => {
          this.shadowRoot.querySelectorAll('.nav-item:not(.locked)').forEach(item => {
            item.addEventListener('click', () => {
              store.set('ui.activeView', item.dataset.view);
              store.set('ui.sidebarOpen', false);
            });
          });
        }, 0);
      }
    }
    Sidebar.define('capitan-sidebar');

    // ==================== CHAT VIEW (simplified, locked without wallet) ====================
    class ChatView extends CapitanElement {
      subscribe() {
        return [this.observe('auth.token', () => this.render())];
      }
      render() {
        const hasWallet = !!store.get('wallet.address') && !!store.get('auth.token');
        this.shadowRoot.innerHTML = `
          <style>
            :host { display:flex; align-items:center; justify-content:center; height:100%; background:var(--bg-primary); }
            .chat-locked { text-align:center; color:var(--text-secondary); max-width:400px; }
            .pill-btn {
              padding: 10px 20px; border-radius: var(--radius-pill); border: none;
              background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
              color: white; font-weight: 600; font-size: 14px; cursor: pointer;
              box-shadow: 0 4px 15px rgba(0,212,255,0.3); margin-top: 16px;
            }
          </style>
          ${!hasWallet ? `
            <div class="chat-locked">
              <h2>Unlock Capitan AI</h2>
              <p>You need an OS Wallet with CLOSE tokens to start chatting. Create one now – it’s free and instant.</p>
              <button class="pill-btn" id="createWalletChatBtn">Create OS Wallet</button>
            </div>
          ` : `
            <div style="padding:40px;">Chat interface coming soon</div>
          `}
        `;
        if (!hasWallet) {
          this.shadowRoot.getElementById('createWalletChatBtn')?.addEventListener('click', () => {
            store.set('ui.showClaimModal', true);
          });
        }
      }
    }
    ChatView.define('capitan-chat-view');

    // ==================== WALLET VIEW (same as before, with create wallet if no address) ====================
    class WalletView extends CapitanElement {
      constructor() {

          store.set('wallet.balances', data.tokens || []);
          let total = 0;
          for (const t of data.tokens) total += t.usdValue || 0;

      _modalWrap(content) {

      _closeModal(name) { store.set('ui.modals', store.get('ui.modals').filter(m => m !== name)); }
      _createSendModal() {
        const modal = this._modalWrap(`
          <div style="background:var(--glass-bg); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-lg); max-width:500px; width:100%; padding:24px;">

        modal.querySelector('#sendCancel').addEventListener('click', () => this._closeModal('send'));

          const amount = ethers.utils.parseUnits(amountInput, decimals).toString();
          try {
            const res = await api.post('/api/wallet/send', { to, token_address: tokenAddress, amount, chain_id: store.get('wallet.network')||137 });
            this._closeModal('send');
            document.querySelector('capitan-wallet-view')?._loadBalances();
          } catch(e) { alert(e.message); }
        });
        return modal;
      }
      _createReceiveModal() {
        const addr = store.get('wallet.address') || '0x0000000000000000000000000000000000000000';
        const modal = this._modalWrap(`
          <div style="background:var(--glass-bg); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-lg); max-width:400px; width:100%; padding:24px; text-align:center;">
            <h2>Receive</h2>
            <div style="word-break:break-all; margin:12px 0; background:var(--bg-secondary); padding:10px; border-radius:var(--radius-md);">${addr}</div>
            <div id="qrCode" style="margin:12px 0;"></div>
            <button class="pill-btn primary" id="copyAddr">Copy Address</button>
            <button class="pill-btn" id="receiveClose" style="margin-top:8px;">Close</button>
          </div>
        `);
        try { new QRCode(modal.querySelector('#qrCode'), { text: addr, width: 150, height: 150 }); } catch(e){}
        modal.querySelector('#copyAddr').addEventListener('click', () => { navigator.clipboard.writeText(addr); });
        modal.querySelector('#receiveClose').addEventListener('click', () => this._closeModal('receive'));
        return modal;
      }
      _createSwapModal() {
        const modal = this._modalWrap(`
          <div style="background:var(--glass-bg); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-lg); max-width:500px; width:100%; padding:24px;">
            <h2>Swap</h2>
            <select id="swapFrom" style="width:100%;margin:8px 0;padding:10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);">${(store.get('wallet.balances')||[]).map(t=>`<option value="${t.address}">${t.symbol}</option>`).join('')}</select>
            <select id="swapTo" style="width:100%;margin:8px 0;padding:10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);">${(store.get('wallet.balances')||[]).map(t=>`<option value="${t.address}">${t.symbol}</option>`).join('')}</select>
            <input id="swapAmount" type="number" placeholder="Amount" style="width:100%;margin:8px 0;padding:10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);"/>
            <div style="display:flex;gap:10px;margin-top:16px;">
              <button class="pill-btn" id="swapCancel">Cancel</button>
              <button class="pill-btn primary" id="swapConfirm">Swap</button>
            </div>
          </div>
        `);
        modal.querySelector('#swapCancel').addEventListener('click', () => this._closeModal('swap'));
        modal.querySelector('#swapConfirm').addEventListener('click', async () => {
          const from = modal.querySelector('#swapFrom').value;
          const to = modal.querySelector('#swapTo').value;
          const amountInput = modal.querySelector('#swapAmount').value;
          if (!amountInput) return alert('Enter amount');
          let decimals = 18;
          const token = store.get('wallet.balances').find(t=>t.address===from);
          if (token) decimals = token.decimals || 18;
          const amount = ethers.utils.parseUnits(amountInput, decimals).toString();
          try {
            const res = await api.post('/api/wallet/swap/execute', { from_token:from, to_token:to, amount, slippage:1.0 });
            this._closeModal('swap');
            document.querySelector('capitan-wallet-view')?._loadBalances();
          } catch(e) { alert(e.message); }
        });
        return modal;
      }
      _createBuyModal() {
        const modal = this._modalWrap(`
          <div style="background:var(--glass-bg); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-lg); max-width:500px; width:100%; padding:24px;">
            <h2>Buy CLOSE</h2>
            <div id="buyRate">Loading rate...</div>
            <input id="buyAmount" type="number" placeholder="CLOSE amount" style="width:100%;margin:8px 0;padding:10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);"/>
            <div id="buyEquivalent"></div>
            <div style="margin:8px 0;">Send POL to:</div>
            <div id="buyAddress" style="word-break:break-all; font-family:monospace;"></div>
            <input id="buyTxHash" placeholder="Transaction ID" style="width:100%;margin:8px 0;padding:10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);"/>
            <div style="display:flex;gap:10px;margin-top:16px;">
              <button class="pill-btn" id="buyCancel">Cancel</button>
              <button class="pill-btn primary" id="buyVerify">Verify Payment</button>
            </div>
          </div>
        `);
        api.get('/api/token/rate').then(d => {
          modal.querySelector('#buyRate').innerText = `1 POL = ${d.rate} CLOSE`;
          modal.querySelector('#buyAddress').innerText = d.matic_payment_address;
        });
        modal.querySelector('#buyCancel').addEventListener('click', () => this._closeModal('buy'));
        modal.querySelector('#buyVerify').addEventListener('click', async () => {
          const amount = modal.querySelector('#buyAmount').value;
          const txHash = modal.querySelector('#buyTxHash').value.trim();
          if (!amount || !txHash) return alert('Fill all fields');
          try {
            const res = await api.post('/api/cap/purchase', { cap_amount: Math.floor(amount*1e18).toString(), tx_hash: txHash });
            if (res.verified) { this._closeModal('buy'); }
            else alert('Verification failed');
          } catch(e) { alert(e.message); }
        });
        return modal;
      }
    }
    ModalsContainer.define('capitan-modals');

    // ==================== PLACEHOLDER VIEWS ====================
    class PortfolioView extends CapitanElement { render() { this.shadowRoot.innerHTML = '<div style="padding:40px;">Portfolio</div>'; } }
    PortfolioView.define('capitan-portfolio-view');
    class ResearchView extends CapitanElement { render() { this.shadowRoot.innerHTML = '<div style="padding:40px;">Research Hub</div>'; } }
    ResearchView.define('capitan-research-view');
    class DeveloperView extends CapitanElement { render() { this.shadowRoot.innerHTML = '<div style="padding:40px;">Developer</div>'; } }
    DeveloperView.define('capitan-developer-view');
    class WorkspacesView extends CapitanElement { render() { this.shadowRoot.innerHTML = '<div style="padding:40px;">Workspaces</div>'; } }
    WorkspacesView.define('capitan-workspaces-view');
    class CommunityView extends CapitanElement { render() { this.shadowRoot.innerHTML = '<div style="padding:40px;">Community</div>'; } }
    CommunityView.define('capitan-community-view');
    class DashboardView extends CapitanElement { render() { this.shadowRoot.innerHTML = '<div style="padding:40px;">Admin Dashboard</div>'; } }
    DashboardView.define('capitan-dashboard-view');

    // ==================== GRACEFUL AUTH CHECK ====================
    (async () => {
      const token = store.get('auth.token');
      if (!token) {
        // No token at all – show claim modal
        store.set('ui.showClaimModal', true);
        return;
      }
      try {
        const res = await fetch(BASE_URL + '/api/auth/validate', { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const data = await res.json();
          store.set('auth.user', data.user);
          store.set('auth.isAdmin', data.is_admin);
          // Wallet exists? If not, we may still need to show claim modal? Actually if they have a valid token, they have a user, but maybe no wallet address yet? We'll assume wallet exists.
        } else {
          // Token invalid – clear and show claim
          store.set('auth.token', null); store.set('auth.user', null);
          localStorage.removeItem('ct'); localStorage.removeItem('cu');
          store.set('ui.showClaimModal', true);
        }
      } catch (e) {
        store.set('auth.token', null); store.set('auth.user', null);
        localStorage.removeItem('ct'); localStorage.removeItem('cu');
        store.set('ui.showClaimModal', true);
      }
      const theme = store.get('ui.theme');
      document.body.className = theme === 'auto' ? (new Date().getHours() >= 6 && new Date().getHours() < 18 ? 'light' : 'dark') : theme;
    })();
  </script>
</body>
</html>
