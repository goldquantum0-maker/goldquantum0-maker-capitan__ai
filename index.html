<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="application-name" content="CAPITAN AI">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CAPITAN AI">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="CAPITAN AI — Enterprise Intelligence by CLOSEAI Technologies">
  <meta name="format-detection" content="telephone=no">
  <title>CAPITAN AI</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23000' rx='20'/%3E%3Cpath d='M50 15 L75 27 L75 52 C75 65 63 76 50 82 C37 76 25 65 25 52 L25 27 Z' fill='none' stroke='%23A0A0A4' stroke-width='4'/%3E%3Ctext y='.78em' font-size='38' text-anchor='middle' x='50' fill='%23A0A0A4' font-family='Inter,sans-serif' font-weight='700'%3EC%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --bg2: #050505;
      --bg3: #0a0a0a;
      --bg4: #101010;
      --bdr: #1a1a1a;
      --bdr2: #222;
      --bdr3: #333;
      --txt: #FFFFFF;
      --txt2: #CCCCCC;
      --txt3: #999999;
      --txt4: #777777;
      --accent: #A0A0A4;
      --accent-hover: #B8B8BC;
      --accent-bg: rgba(160, 160, 164, 0.12);
      --red: #F87171;
      --green: #4ade80;
      --amber: #fbbf24;
      --orange: #F97316;
      --orange-bg: rgba(249, 115, 22, 0.15);
      --icon: #9CA3AF;
      --icon-hover: #FFFFFF;
      --radius: 14px;
      --r-sm: 10px;
      --r-xs: 7px;
      --r-lg: 18px;
      --fs-xs: 10px;
      --fs-sm: 11px;
      --fs-md: 12px;
      --fs-lg: 14px;
      --fs-xl: 17px;
      --lh: 1.45;
      --safe: env(safe-area-inset-bottom, 0px);
      --shadow: 0 20px 60px rgba(0, 0, 0, .9);
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --sidebar-w: 320px;
    }
    :root.light {
      --bg: #FFFFFF;
      --bg2: #F5F5F7;
      --bg3: #EBEBED;
      --bg4: #E0E0E3;
      --bdr: #E0E0E0;
      --bdr2: #D0D0D0;
      --bdr3: #B0B0B0;
      --txt: #000000;
      --txt2: #333333;
      --txt3: #666666;
      --txt4: #999999;
      --accent: #6B6B70;
      --accent-hover: #8A8A90;
      --accent-bg: rgba(107, 107, 112, 0.10);
      --red: #DC2626;
      --green: #16A34A;
      --amber: #D97706;
      --orange: #EA580C;
      --icon: #6B7280;
      --icon-hover: #000000;
      --shadow: 0 12px 40px rgba(0, 0, 0, .06);
    }
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      font-size: 15px;
      height: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--font);
      font-size: var(--fs-sm);
      font-weight: 400;
      line-height: var(--lh);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      display: flex;
      height: 100vh;
      height: 100dvh;
      position: relative;
    }
    ::-webkit-scrollbar {
      width: 3px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--bdr3);
      border-radius: 3px;
    }
    .splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .4s ease, visibility .4s ease;
    }
    .splash-screen.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .splash-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logoPulse .8s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: .6; }
    }
    .icon-svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .icon-svg.sm {
      width: 12px;
      height: 12px;
    }
    .icon-svg.lg {
      width: 18px;
      height: 18px;
    }
    .stream-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 1px;
      animation: cursorBlink .6s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .token-fade {
      animation: tokenIn .1s ease;
    }
    @keyframes tokenIn {
      from { opacity: .3; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg);
      border-right: 1px solid var(--bdr);
      display: flex;
      flex-direction: column;
      z-index: 100;
      overflow-y: auto;
      overflow-x: hidden;
      transition: transform var(--transition);
      height: 100%;
      flex-shrink: 0;
    }
    .sidebar-mobile {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      transform: translateX(-105%);
      box-shadow: var(--shadow);
      z-index: 200;
      transition: transform .25s var(--transition);
    }
    .sidebar-mobile.open {
      transform: translateX(0);
    }
    .sb-header {
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--bdr);
      flex-shrink: 0;
    }
    .sb-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: transform .2s;
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }
    .sb-logo:hover { transform: scale(1.08); }
    .sb-logo:active { transform: scale(.95); }
    .sb-brand-name {
      font-size: var(--fs-md);
      font-weight: 700;
      color: var(--txt);
      letter-spacing: -0.3px;
    }
    .profile-icon {
      margin-left: auto;
      background: var(--bg2);
      border: 1px solid var(--bdr);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .12s;
    }
    .profile-icon:hover {
      background: var(--bg3);
      border-color: var(--accent);
    }
    .sb-ticker {
      flex-shrink: 0;
      overflow: hidden;
      background: var(--bg2);
      border-bottom: 1px solid var(--bdr);
      padding: 3px 0;
    }
    .sb-ticker-track {
      display: flex;
      gap: 14px;
      animation: tickerScroll 20s linear infinite;
      white-space: nowrap;
      padding: 2px 6px;
    }
    @keyframes tickerScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .sb-ticker-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 8px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .btn-new-convo {
      display: flex;
      align-items: center;
      gap: 8px;
      width: calc(100% - 20px);
      margin: 12px 10px;
      padding: 12px 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      font-size: var(--fs-sm);
      font-weight: 600;
      font-family: var(--font);
      transition: all .12s;
    }
    .btn-new-convo:hover {
      background: var(--accent-hover);
      transform: scale(1.01);
    }
    .section-header {
      padding: 16px 20px 6px;
      font-size: 10px;
      color: var(--txt4);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .section-body {
      overflow: hidden;
      transition: max-height .25s ease;
      max-height: 0;
    }
    .section-body.open {
      max-height: 500px;
    }
    .sb-chat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      cursor: pointer;
      color: var(--txt3);
      font-size: var(--fs-sm);
      font-weight: 500;
      transition: all .1s;
      border-bottom: 1px solid var(--bdr);
    }
    .sb-chat-item:hover {
      background: var(--bg3);
      color: var(--txt);
    }
    .sb-chat-item.active {
      background: var(--bg3);
      color: var(--txt);
      font-weight: 600;
    }
    .sb-chat-item span {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: var(--fs-sm);
    }
    .sb-chat-del {
      background: none;
      border: none;
      color: transparent;
      cursor: pointer;
      font-size: 11px;
      padding: 2px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      transition: all .12s;
    }
    .sb-chat-item:hover .sb-chat-del {
      color: var(--txt4);
    }
    .sb-chat-del:hover {
      color: var(--red) !important;
      background: var(--bg4);
    }
    .sb-footer {
      padding: 16px 20px;
      text-align: center;
      font-size: 8px;
      color: var(--txt4);
      letter-spacing: .04em;
      border-top: 1px solid var(--bdr);
      font-weight: 500;
      flex-shrink: 0;
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.9);
      z-index: 150;
      opacity: 0;
      transition: opacity .2s;
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }
    .overlay.visible {
      display: block;
      opacity: 1;
    }
    .toggle-sidebar {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 180;
      background: var(--bg2);
      border: 1px solid var(--bdr);
      color: var(--icon);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all .12s;
    }
    .toggle-sidebar:hover {
      color: var(--icon-hover);
      background: var(--bg3);
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      min-width: 0;
    }
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      min-height: 0;
      padding: 0 16px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 16px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 35vh;
      text-align: center;
      padding: 20px;
      animation: fadeUp .35s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .welcome h2 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .welcome-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 500px;
      margin-top: 8px;
    }
    .wp-pill {
      padding: 8px 16px;
      border: 1px solid var(--bdr2);
      border-radius: 24px;
      font-size: var(--fs-xs);
      color: var(--txt2);
      cursor: pointer;
      transition: all .12s;
      font-weight: 500;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .wp-pill:hover {
      border-color: var(--bdr3);
      color: var(--txt);
      background: var(--bg3);
    }
    .wp-pill svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }
    .msg {
      margin-bottom: 16px;
      animation: msgIn .18s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user {
      display: flex;
      justify-content: flex-end;
    }
    .msg-user-bubble {
      background: var(--bg3);
      border: 1px solid var(--bdr2);
      border-radius: var(--r-lg) var(--r-lg) 4px var(--r-lg);
      padding: 10px 14px;
      max-width: 85%;
      color: var(--txt);
      font-size: var(--fs-sm);
      line-height: var(--lh);
      word-break: break-word;
    }
    .msg-ai-label {
      font-size: 9px;
      color: var(--txt4);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .msg-ai-body {
      color: var(--txt);
      line-height: 1.55;
      font-size: var(--fs-sm);
      word-break: break-word;
    }
    .input-area {
      padding: 10px 0 calc(14px + var(--safe));
      flex-shrink: 0;
      background: var(--bg);
    }
    .input-wrap {
      display: flex;
      gap: 8px;
      background: var(--bg2);
      border: 1px solid var(--bdr2);
      border-radius: 28px;
      padding: 8px 8px 8px 16px;
      align-items: center;
      transition: all .18s;
    }
    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-bg);
    }
    .input-field {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--txt);
      font-size: var(--fs-sm);
      padding: 6px 0;
      font-family: var(--font);
      font-weight: 400;
    }
    .input-field::placeholder {
      color: var(--txt4);
    }
    .send-btn {
      width: 34px;
      height: 34px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .12s;
    }
    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: scale(1.04);
    }
    .send-btn:disabled {
      opacity: .1;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.95);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      animation: fadeIn .18s ease;
    }
    .modal-overlay.open {
      display: flex;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--bdr2);
      border-radius: var(--r-lg);
      padding: 24px;
      width: 460px;
      max-width: 94vw;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: modalIn .2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.96) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal h2 {
      font-size: var(--fs-lg);
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--txt);
    }
    .pill-tab {
      flex: 1;
      padding: 7px;
      border: 1px solid var(--bdr);
      border-radius: 20px;
      background: none;
      color: var(--txt3);
      font-size: var(--fs-xs);
      cursor: pointer;
      font-family: var(--font);
      font-weight: 600;
      text-align: center;
      transition: all .12s;
    }
    .pill-tab.active {
      background: var(--txt);
      color: var(--bg);
      border-color: var(--txt);
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--txt);
      color: var(--bg);
      padding: 8px 18px;
      border-radius: 20px;
      font-size: var(--fs-xs);
      font-weight: 600;
      z-index: 400;
      animation: tIn .2s ease, tOut .25s ease 2.2s forwards;
      pointer-events: none;
      white-space: nowrap;
    }
    @keyframes tIn {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes tOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    /* Profile Card Refinements */
    .profile-card {
      background: var(--bg3);
      border-radius: var(--r-lg);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .profile-card-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background .1s;
      border-bottom: 1px solid var(--bdr);
    }
    .profile-card-item:last-child {
      border-bottom: none;
    }
    .profile-card-item:hover {
      background: var(--bg4);
    }
    .profile-card-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-bg);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .profile-card-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--txt);
    }
    .profile-card-info {
      flex: 1;
    }
    .profile-card-title {
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--txt);
    }
    .profile-card-subtitle {
      font-size: 9px;
      color: var(--txt4);
      margin-top: 2px;
    }
    .profile-card-badge {
      background: var(--accent-bg);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 9px;
      color: var(--accent);
      font-weight: 600;
    }
    .avatar-container {
      position: relative;
      display: inline-block;
    }
    .avatar {
      width: 80px;
      height: 80px;
      background: var(--orange);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      margin: 0 auto 12px;
    }
    .telegram-login-card {
      background: var(--accent-bg);
      border: 1px solid var(--accent);
      border-radius: var(--r-lg);
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
      cursor: pointer;
      transition: all .2s;
    }
    .telegram-login-card:hover {
      background: var(--accent-bg);
      transform: translateY(-1px);
    }
    @media (max-width: 768px) {
      .toggle-sidebar { display: flex; }
      .sidebar { display: none; }
      .sidebar-mobile { display: flex; flex-direction: column; }
      .msg-user-bubble { max-width: 92%; }
    }
  </style>
</head>
<body>
<div class="splash-screen" id="splashScreen">
  <span class="splash-logo">
    <svg width="52" height="52" viewBox="0 0 56 56" fill="none">
      <rect width="56" height="56" rx="14" fill="#000"/>
      <path d="M28 8 L46 17 L46 32 C46 42 38 50 28 54 C18 50 10 42 10 32 L10 17 Z" fill="none" stroke="#A0A0A4" stroke-width="2.5"/>
      <text x="28" y="37" text-anchor="middle" font-size="22" fill="#A0A0A4" font-family="Inter,sans-serif" font-weight="700">C</text>
    </svg>
  </span>
</div>

<div id="app"></div>
<div class="overlay" id="overlay"></div>
<button class="toggle-sidebar" id="toggleSidebar" aria-label="Menu">
  <svg class="icon-svg lg" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
</button>

<div id="profileModal" class="modal-overlay"><div class="modal"><div id="profileContent"></div><button class="modal-btn sec" id="closeProfileModal">Close</button></div></div>
<div id="upgradeModal" class="modal-overlay"><div class="modal"><h2>Upgrade</h2><div class="tier-grid" id="tierCards"></div><div id="paySection" style="display:none"><div class="pill-tabs"><button class="pill-tab active" data-coin="BTC">BTC</button><button class="pill-tab" data-coin="ETH">ETH</button></div><div class="wallet-box" id="walletAddr"></div><input type="text" id="txidInput" placeholder="Transaction hash"><button class="modal-btn" id="verifyUpgrade">Verify & Activate</button></div><button class="modal-btn sec" id="closeUpgrade">Close</button></div></div>
<div id="supportModal" class="modal-overlay"><div class="modal"><h2>Support</h2><div style="font-size:var(--fs-xs);color:var(--txt2);line-height:1.6"><p>Email: closeaitechnologies@protonmail.com</p></div><button class="modal-btn sec" id="closeSupport">Close</button></div></div>
<div id="privacyModal" class="modal-overlay"><div class="modal"><h2>Privacy</h2><div style="font-size:var(--fs-xs);color:var(--txt2);line-height:1.6"><p>CAPITAN AI by CLOSEAI Technologies. No permanent storage.</p></div><button class="modal-btn sec" id="closePrivacy">Close</button></div></div>
<div id="offlineBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:500;background:var(--amber);color:#000;text-align:center;padding:6px;font-size:11px;font-weight:600">Offline Mode</div>

<script>
  (function(){
    var t=localStorage.getItem('cap_theme_mode')||'system';
    if(t==='light'){document.documentElement.classList.add('light');}
    else if(t==='dark'){document.documentElement.classList.remove('light');}
    else{var d=window.matchMedia('(prefers-color-scheme: dark)').matches;if(!d)document.documentElement.classList.add('light');}
    window.CAPITAN_GREETING=new Date().getHours()<12?'Good morning':new Date().getHours()<17?'Good afternoon':'Good evening';
  })();
</script>

<script>
  const CFG={API:'https://capitan-ai-jxu8.onrender.com',POLL_CHATS:4000,MAX_MSG:4000,STREAM_DELAY:12};
  const $=(s,d=document)=>d.querySelector(s);
  const $$=(s,d=document)=>d.querySelectorAll(s);

  const S={
    session:null,token:null,tier:'free',loading:false,thinking:false,
    sidebarOpen:window.innerWidth>768,isOnline:navigator.onLine,
    chats:[],activeChat:null,messages:[],library:[],payConfig:null,
    draft:'',selTier:null,selCoin:'BTC',themeMode:localStorage.getItem('cap_theme_mode')||'system',
    user:null,sidebarSections:{library:true}
  };

  const api = {
    base: CFG.API,
    async r(p,o={}){
      if(!S.isOnline) throw new Error('Offline');
      const h={...o.headers};
      if(!(o.body instanceof FormData)) h['Content-Type']='application/json';
      if(S.token) h['Authorization']=`Bearer ${S.token}`;
      const res=await fetch(`${this.base}${p}`,{...o,headers:h});
      if(res.status===401){localStorage.removeItem('ct');S.token=null;await this.sess();throw new Error('Session refreshed');}
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.detail||'Error');}
      return res.headers.get('content-type')?.includes('json')?await res.json():await res.text();
    },
    async sess(){const d=await this.r('/api/session');S.session={id:d.id,tier:d.tier};S.tier=d.tier;S.token=d.token;localStorage.setItem('ct',d.token);return d;},
    async getSess(){return this.r('/api/session')},
    async chats(){return this.r('/api/chats')},
    async chat(id){return this.r(`/api/chats/${id}`)},
    async send(msgs,cid){return this.r('/api/chat',{method:'POST',body:JSON.stringify({messages:msgs,chat_id:cid})})},
    async delChat(id){return this.r(`/api/chats/${id}`,{method:'DELETE'})},
    async payCfg(){return this.r('/api/payment-config')},
    async upgrade(tier,txid,coin){return this.r('/api/upgrade',{method:'POST',body:JSON.stringify({tier,txid,currency:coin})})},
    async health(){return this.r('/health')}
  };

  const SVG = {
    finance: `<svg class="icon-svg sm" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>`,
    code: `<svg class="icon-svg sm" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
    math: `<svg class="icon-svg sm" viewBox="0 0 24 24"><path d="M4 17h16M4 12h16M4 7h16"/></svg>`,
    folder: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>`,
    smile: `<svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/></svg>`,
    book: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>`,
    apps: `<svg class="icon-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`,
    briefcase: `<svg class="icon-svg" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>`,
    star: `<svg class="icon-svg" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    users: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/></svg>`,
    moon: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>`,
    sun: `<svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/></svg>`,
    monitor: `<svg class="icon-svg" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>`,
    lock: `<svg class="icon-svg" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>`,
    logout: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/></svg>`,
    trash: `<svg class="icon-svg" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/></svg>`,
    telegram: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>`
  };

  function esc(t){const d=document.createElement('div');d.textContent=String(t||'');return d.innerHTML;}
  function toast(msg,type='info'){const ex=$('.toast');if(ex)ex.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}

  function welcomeHTML(){
    return `<div class="welcome">
      <h2>CAPITAN AI</h2>
      <div class="welcome-pills">
        <div class="wp-pill" onclick="quickSend('Explain DCF valuation')">${SVG.finance} finance</div>
        <div class="wp-pill" onclick="quickSend('Write a Python trading bot')">${SVG.code} code</div>
        <div class="wp-pill" onclick="quickSend('Solve quadratic equation')">${SVG.math} math</div>
      </div>
    </div>`;
  }

  function renderMsgsHTML(){
    if(!S.messages.length) return welcomeHTML();
    return S.messages.map((m,i)=>m.role==='user'?`<div class="msg user"><div class="msg-user-bubble">${esc(m.content)}</div></div>`:`<div class="msg"><div class="msg-ai-label">CAPITAN AI</div><div class="msg-ai-body" id="msgBody${i}">${esc(m.content)}</div></div>`).join('');
  }

  function renderChatsHTML(){
    if(!S.chats.length) return '<div style="padding:12px;color:var(--txt4);text-align:center">No conversations</div>';
    return S.chats.map(c=>`<div class="sb-chat-item ${S.activeChat===c.id?'active':''}" onclick="loadChat('${c.id}')"><span>${esc(c.title||'Chat')}</span><button class="sb-chat-del" onclick="event.stopPropagation();delChat('${c.id}')">✕</button></div>`).join('');
  }

  function render(){
    const app=$('#app');
    const isMobile=window.innerWidth<=768;
    app.innerHTML = `<aside class="sidebar ${isMobile?'sidebar-mobile':''}" id="sidebar">
      <div class="sb-header">
        <span class="sb-logo" onclick="handleLogoClick()">
          <svg width="24" height="24" viewBox="0 0 28 28" fill="none"><path d="M14 3 L24 8 L24 16 C24 22 19.5 26.5 14 28.5 C8.5 26.5 4 22 4 16 L4 8 Z" fill="none" stroke="#A0A0A4" stroke-width="1.8"/><text x="14" y="19.5" text-anchor="middle" font-size="12" fill="#A0A0A4" font-family="Inter,sans-serif" font-weight="700">C</text></svg>
        </span>
        <span class="sb-brand-name">CAPITAN AI</span>
        <div class="profile-icon" onclick="showProfileModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
      <button class="btn-new-convo" onclick="newChat()">+ New Conversation</button>
      <div class="section-header" onclick="toggleSection('section-library')">Library</div>
      <div class="section-body open" id="section-library"><div class="sb-chat-item" onclick="openLib()">📁 My Library</div></div>
      <div class="section-header">Recent Chats</div>
      <div class="section-body open"><div class="chats-list" id="chatsList">${renderChatsHTML()}</div></div>
      <div class="sb-footer">CLOSEAI Technologies</div>
    </aside>
    <main class="main">
      <div class="chat-container">
        <div class="chat-messages" id="chatMsgs">${renderMsgsHTML()}</div>
        <div class="input-area">
          <div class="input-wrap">
            <input type="text" class="input-field" id="msgInput" placeholder="Ask anything..." autocomplete="off" maxlength="${CFG.MAX_MSG}" value="${esc(S.draft)}" ${S.loading?'disabled':''} oninput="handleTyping()"/>
            <button class="send-btn" id="sendBtn" ${S.loading?'disabled':''} onclick="sendMsg()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </main>`;
    if(S.sidebarOpen && isMobile){ $('#sidebar').classList.add('open'); $('#overlay').classList.add('visible'); }
  }

  async function sendMsg(){
    if(!S.isOnline){toast('Offline');return;}
    const inp=$('#msgInput');if(!inp)return;
    const msg=inp.value.trim();if(!msg||S.loading)return;
    inp.value='';S.draft='';S.loading=true;S.thinking=true;
    S.messages.push({role:'user',content:msg});
    renderMsgs();scrollBottom();
    const aiIdx=S.messages.length;
    S.messages.push({role:'assistant',content:''});
    renderMsgs();
    try{
      const r=await api.send(S.messages.slice(0,-1),S.activeChat);
      S.messages[S.messages.length-1].content=r.content||'';
      S.activeChat=r.chat_id;
      loadChats();renderMsgs();scrollBottom();
    }catch(e){
      S.messages[S.messages.length-1].content=`Error: ${e.message}`;
      renderMsgs();toast(e.message);
    }finally{
      S.loading=false;S.thinking=false;
    }
  }

  function quickSend(p){const inp=$('#msgInput');if(inp){inp.value=p;inp.focus();}}
  async function loadChats(){try{const d=await api.chats();S.chats=d.chats||[];renderSidebarChats();}catch(e){}}
  async function loadChat(id){S.activeChat=id;S.messages=[];try{const c=await api.chat(id);S.messages=c.messages||[];renderMsgs();renderSidebarChats();scrollBottom();}catch(e){toast(e.message);}}
  async function delChat(id){if(!confirm('Delete?'))return;try{await api.delChat(id);S.chats=S.chats.filter(c=>c.id!==id);if(S.activeChat===id)newChat();renderSidebarChats();toast('Deleted');}catch(e){toast(e.message);}}
  function newChat(){S.activeChat=null;S.messages=[];render();if(window.innerWidth<=768)closeSidebar();}

  function showProfileModal(){
    const tierNames={free:'Free',plus:'Plus',pro:'Pro',pro_max:'Pro Max',founder:'Founder'};
    const userInitial = (S.user?.name || 'U').charAt(0).toUpperCase();
    const displayName = S.user?.name || 'Guest User';
    let content = `
      <div style="text-align:center;margin-bottom:24px">
        <div class="avatar-container"><div class="avatar">${userInitial}</div></div>
        <div style="font-weight:700;font-size:20px;margin-top:12px;color:var(--txt)">${esc(displayName)}</div>
        <div style="display:inline-block;margin-top:8px"><span class="profile-card-badge">${tierNames[S.tier]}</span></div>
      </div>
    `;
    if(!S.token){
      content += `<div class="telegram-login-card" onclick="initTelegramLogin()">
        <div style="margin-bottom:8px">${SVG.telegram}</div>
        <div style="font-weight:600;margin-bottom:4px">Sign in with Telegram</div>
        <div style="font-size:11px;color:var(--txt3)">Save your data across devices</div>
      </div>`;
    }
    content += `<div class="profile-card">
      <div class="profile-card-item" onclick="openLib()"><div class="profile-card-icon">${SVG.folder}</div><div class="profile-card-info"><div class="profile-card-title">Library</div><div class="profile-card-subtitle">Saved notes & content</div></div></div>
      <div class="profile-card-item" onclick="setThemeMode('dark')"><div class="profile-card-icon">${SVG.moon}</div><div class="profile-card-info"><div class="profile-card-title">Dark Mode</div></div></div>
      <div class="profile-card-item" onclick="setThemeMode('light')"><div class="profile-card-icon">${SVG.sun}</div><div class="profile-card-info"><div class="profile-card-title">Light Mode</div></div></div>
      <div class="profile-card-item" onclick="openSupport()"><div class="profile-card-icon">${SVG.users}</div><div class="profile-card-info"><div class="profile-card-title">Support</div></div></div>
      ${S.token?`<div class="profile-card-item" onclick="logout()"><div class="profile-card-icon">${SVG.logout}</div><div class="profile-card-info"><div class="profile-card-title" style="color:var(--red)">Logout</div></div></div>`:''}
    </div>`;
    $('#profileContent').innerHTML = content;
    $('#profileModal').classList.add('open');
  }

  function initTelegramLogin(){
    window.Telegram?.Login?.auth?.({bot_id:'capitan_ai_bot',request_access:'write'},(user)=>{if(user){S.user=user;S.token='tg_'+user.id;localStorage.setItem('ct',S.token);closeModals();render();toast('Welcome '+user.first_name);}});
    toast('Opening Telegram login...');
  }

  function setThemeMode(m){S.themeMode=m;localStorage.setItem('cap_theme_mode',m);applyTheme();render();toast('Theme: '+m);}
  function applyTheme(){const h=document.documentElement;if(S.themeMode==='light')h.classList.add('light');else if(S.themeMode==='dark')h.classList.remove('light');else{const d=window.matchMedia('(prefers-color-scheme: dark)').matches;d?h.classList.remove('light'):h.classList.add('light');}}

  function openLib(){toast('Library opened');}
  function openSupport(){$('#supportModal').classList.add('open');}
  function closeModals(){$$('.modal-overlay').forEach(m=>m.classList.remove('open'));}
  function toggleSidebar(){S.sidebarOpen=!S.sidebarOpen;const sb=$('#sidebar');const ov=$('#overlay');if(window.innerWidth<=768){S.sidebarOpen?(sb.classList.add('open'),ov?.classList.add('visible')):(sb.classList.remove('open'),ov?.classList.remove('visible'));}}
  function closeSidebar(){S.sidebarOpen=false;$('#sidebar')?.classList.remove('open');$('#overlay')?.classList.remove('visible');}
  function scrollBottom(){const c=$('#chatMsgs');if(c)c.scrollTop=c.scrollHeight;}
  function renderMsgs(){const c=$('#chatMsgs');if(c){c.innerHTML=renderMsgsHTML();scrollBottom();}}
  function renderSidebarChats(){const c=$('#chatsList');if(c)c.innerHTML=renderChatsHTML();}
  function handleTyping(){S.draft=$('#msgInput')?.value||'';}

  document.addEventListener('DOMContentLoaded',async ()=>{
    applyTheme();
    const saved=localStorage.getItem('ct');
    if(saved){S.token=saved;try{const s=await api.getSess();S.session=s;S.tier=s.tier;}catch(e){localStorage.removeItem('ct');await api.sess();}}
    else{await api.sess();}
    await loadChats();
    render();
    document.getElementById('splashScreen')?.classList.add('hide');
    $('#toggleSidebar')?.addEventListener('click',toggleSidebar);
    $('#overlay')?.addEventListener('click',closeSidebar);
    $('#closeProfileModal')?.addEventListener('click',()=>$('#profileModal').classList.remove('open'));
    $('#closeSupport')?.addEventListener('click',()=>$('#supportModal').classList.remove('open'));
    window.addEventListener('resize',()=>{if(window.innerWidth>768)closeSidebar();});
  });

  window.toggleSection=()=>{};
  window.handleLogoClick=()=>{};
  window.logout=()=>{localStorage.removeItem('ct');S.token=null;location.reload();};
</script>
</body>
</html>
