<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CAPITAN AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Newsreader:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --void: #080808;
  --abyss: #0c0c0c;
  --surface: #111111;
  --lift: #171717;
  --edge: #222222;
  --line: #2a2a2a;
  --ink: #f2f0eb;
  --ink-2: #9a9690;
  --ink-3: #4a4845;
  --ink-4: #2e2d1b;
  --gold: #c9a96e;
  --gold-dim: #8a7050;
  --gold-glow: rgba(201,169,110,0.12);
  --font-display: 'Syne', sans-serif;
  --font-body: 'Newsreader', Georgia, serif;
  --font-mono: 'DM Mono', monospace;
  --r: 4px;
  --r-md: 8px;
  --r-lg: 12px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}
:root.light {
  --void: #f5f4f0;
  --abyss: #efede8;
  --surface: #e8e6e0;
  --lift: #e2e0d9;
  --edge: #d4d2ca;
  --line: #c8c6bd;
  --ink: #1a1916;
  --ink-2: #4a4845;
  --ink-3: #8a8880;
  --ink-4: #bab8b0;
  --gold: #9a7040;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 13px; }
body {
  background: var(--void);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.65;
  height: 100vh; height: 100dvh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
#app { display: flex; height: 100vh; height: 100dvh; }
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

.sidebar {
  width: 256px; min-width: 256px;
  background: var(--abyss);
  border-right: 1px solid var(--edge);
  display: flex; flex-direction: column;
  z-index: 60; transition: width 0.4s var(--ease);
  overflow: hidden; height: 100%;
}
.sidebar.collapsed { width: 52px; min-width: 52px; }
.sb-top { padding: 20px 18px 16px; border-bottom: 1px solid var(--edge); flex-shrink: 0; }
.sb-brand { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.sb-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; flex: 1; }
.sb-logo-text {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.18em; color: var(--ink);
  text-transform: uppercase;
}
.sb-collapse-btn {
  width: 28px; height: 28px; background: none;
  border: 1px solid var(--edge); color: var(--ink-3);
  border-radius: var(--r); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.sb-collapse-btn:hover { border-color: var(--line); color: var(--ink-2); background: var(--lift); }

.btn-new-chat {
  width: 100%; background: var(--surface);
  border: 1px solid var(--edge); color: var(--ink);
  padding: 9px 12px; border-radius: var(--r-md);
  cursor: pointer; font-family: var(--font-display);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.2s var(--ease);
}
.btn-new-chat:hover { background: var(--lift); border-color: var(--line); }

.sb-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px 0 0; min-height: 0; }
.sb-section { padding: 0 10px 6px; }
.sb-section-label {
  font-family: var(--font-display); font-size: 9px; font-weight: 700;
  letter-spacing: 0.2em; color: var(--ink-3); text-transform: uppercase;
  padding: 8px 8px 4px; display: flex; align-items: center;
  justify-content: space-between; cursor: pointer;
  border-radius: var(--r); transition: color 0.2s; user-select: none;
}
.sb-section-label:hover { color: var(--ink-2); }
.sb-section-label .arrow { font-size: 7px; transition: transform 0.25s; opacity: 0.5; }
.sb-section-label.open .arrow { transform: rotate(90deg); opacity: 0.8; }
.sb-section-body { overflow: hidden; transition: max-height 0.3s var(--ease); }

.sb-nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 8px; border-radius: var(--r-md);
  cursor: pointer; background: none; border: none;
  color: var(--ink-2); font-family: var(--font-display);
  font-size: 11.5px; font-weight: 500;
  width: 100%; text-align: left;
  transition: all 0.18s; min-height: 34px;
}
.sb-nav-item:hover { background: var(--surface); color: var(--ink); }
.sb-nav-item.active { background: var(--lift); color: var(--ink); }
.sb-nav-item .pro-chip {
  margin-left: auto; font-size: 7.5px; font-weight: 700;
  letter-spacing: 0.1em; background: var(--gold-glow);
  color: var(--gold); border: 1px solid var(--gold-dim);
  padding: 2px 6px; border-radius: 3px;
}

.sb-limit { margin: 4px 10px 8px; padding: 10px; background: var(--surface); border: 1px solid var(--edge); border-radius: var(--r-md); }
.sb-limit-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 9px; color: var(--ink-3); }
.sb-limit-track { height: 2px; background: var(--edge); border-radius: 1px; overflow: hidden; }
.sb-limit-fill { height: 100%; background: var(--gold-dim); border-radius: 1px; transition: width 0.5s; }

.sb-bottom { border-top: 1px solid var(--edge); padding: 12px 10px; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; }
.btn-upgrade {
  width: 100%; background: var(--gold-glow);
  border: 1px solid var(--gold-dim); color: var(--gold);
  padding: 10px 12px; border-radius: var(--r-md);
  cursor: pointer; font-family: var(--font-display);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-upgrade:hover { background: rgba(201,169,110,0.2); border-color: var(--gold); }
.sb-tier-badge { text-align: center; font-family: var(--font-display); font-size: 8.5px; font-weight: 700; letter-spacing: 0.15em; color: var(--ink-3); text-transform: uppercase; padding: 4px 0; }
.sb-tier-badge.plus { color: var(--gold-dim); }
.sb-tier-badge.pro { color: var(--gold); }
.sb-tier-badge.founder { color: var(--gold); }
.sb-footer-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; padding: 2px 0; }
.sb-footer-links a { font-family: var(--font-display); font-size: 8.5px; color: var(--ink-3); text-decoration: none; }
.sb-footer-links a:hover { color: var(--ink-2); }
.sb-company { text-align: center; font-family: var(--font-mono); font-size: 8px; color: var(--ink-4); letter-spacing: 0.15em; text-transform: uppercase; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--void); }
.chat-wrap { flex: 1; display: flex; flex-direction: column; max-width: 760px; margin: 0 auto; width: 100%; }
.chat-messages { flex: 1; overflow-y: auto; padding: 36px 32px; scroll-behavior: smooth; }

.welcome { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; min-height: 62vh; padding: 0 4px; }
.welcome-eyebrow { font-family: var(--font-mono); font-size: 9.5px; color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 16px; }
.welcome h1 { font-family: var(--font-display); font-size: clamp(32px, 5vw, 48px); font-weight: 700; color: var(--ink); letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 8px; }
.welcome-sub { font-family: var(--font-body); font-style: italic; font-size: 15px; color: var(--ink-2); margin-bottom: 36px; font-weight: 300; }
.welcome-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.welcome-pill {
  font-family: var(--font-display); font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.08em; color: var(--ink-2);
  background: transparent; border: 1px solid var(--edge);
  padding: 8px 16px; border-radius: 2px; cursor: pointer;
  transition: all 0.2s var(--ease); text-transform: uppercase;
}
.welcome-pill:hover { border-color: var(--gold-dim); color: var(--gold); }
.welcome-pill.locked { opacity: 0.35; border-style: dashed; cursor: default; }

.msg { margin-bottom: 24px; animation: fadeUp 0.3s var(--ease) both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { display: flex; justify-content: flex-end; }
.msg-user-bubble {
  background: var(--surface); border: 1px solid var(--edge);
  border-radius: var(--r-lg) var(--r-lg) var(--r) var(--r-lg);
  padding: 12px 18px; max-width: 72%;
  font-family: var(--font-body); font-size: 13.5px;
  color: var(--ink); line-height: 1.7;
}
.msg-ai-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.msg-ai-label { font-family: var(--font-display); font-size: 9.5px; font-weight: 700; letter-spacing: 0.16em; color: var(--ink-3); text-transform: uppercase; }
.msg-model-chip { font-family: var(--font-mono); font-size: 8.5px; color: var(--ink-3); background: var(--surface); border: 1px solid var(--edge); padding: 2px 7px; border-radius: 2px; }
.msg-ai-body { padding-left: 30px; }
.msg-content { font-family: var(--font-body); font-size: 14px; color: var(--ink); line-height: 1.85; }
.msg-content p { margin-bottom: 14px; }
.msg-content strong { font-weight: 700; }
.msg-content code { font-family: var(--font-mono); font-size: 11.5px; background: var(--surface); border: 1px solid var(--edge); padding: 1px 6px; border-radius: var(--r); }
.msg-actions { display: flex; gap: 2px; margin-top: 10px; padding-left: 30px; opacity: 0; transition: opacity 0.2s; }
.msg:hover .msg-actions { opacity: 1; }
.msg-action-btn { background: none; border: none; color: var(--ink-3); font-family: var(--font-display); font-size: 9.5px; font-weight: 600; cursor: pointer; padding: 4px 10px; border-radius: var(--r); text-transform: uppercase; }
.msg-action-btn:hover { background: var(--surface); color: var(--ink-2); }
.msg-disclaimer { font-family: var(--font-mono); font-size: 8px; color: var(--ink-4); margin-top: 10px; padding-left: 30px; }
.thinking-wrap { padding-left: 30px; display: flex; align-items: center; gap: 8px; }
.thinking-text { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; }
.thinking-dots { display: flex; gap: 4px; }
.thinking-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); animation: pulse 1.4s ease-in-out infinite; opacity: 0.4; }
.thinking-dot:nth-child(1) { animation-delay: 0s; }
.thinking-dot:nth-child(2) { animation-delay: 0.2s; }
.thinking-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

.input-area { padding: 0 32px 28px; flex-shrink: 0; }
.input-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.model-tabs { display: flex; gap: 4px; }
.model-tab {
  font-family: var(--font-display); font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.1em; color: var(--ink-3);
  background: none; border: 1px solid transparent;
  padding: 5px 10px; border-radius: var(--r); cursor: pointer;
  transition: all 0.15s; text-transform: uppercase;
}
.model-tab:hover { color: var(--ink-2); border-color: var(--edge); }
.model-tab.active { color: var(--ink); background: var(--surface); border-color: var(--edge); }
.input-box { display: flex; align-items: flex-end; gap: 10px; background: var(--abyss); border: 1px solid var(--edge); border-radius: var(--r-lg); padding: 12px 12px 12px 18px; transition: border-color 0.2s; }
.input-box:focus-within { border-color: var(--line); box-shadow: 0 0 0 3px rgba(201,169,110,0.05); }
.input-field { flex: 1; background: none; border: none; outline: none; color: var(--ink); font-family: var(--font-body); font-size: 14px; line-height: 1.6; padding: 2px 0; }
.input-field::placeholder { color: var(--ink-4); font-style: italic; }
.input-field:disabled { opacity: 0.3; }
.send-btn { width: 38px; height: 38px; background: var(--ink); border: none; border-radius: var(--r-md); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.send-btn:hover { background: var(--gold); }
.send-btn:disabled { opacity: 0.15; cursor: not-allowed; }
.input-hint { text-align: center; padding: 6px 0 0; font-family: var(--font-mono); font-size: 9px; color: var(--ink-4); }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(8,8,8,0.9); z-index: 200; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(12px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--abyss); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 36px; width: 460px; max-width: 92vw; box-shadow: 0 24px 64px rgba(0,0,0,0.8); }
.modal h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.modal-desc { font-size: 13px; color: var(--ink-2); margin-bottom: 24px; }
.modal-price { font-family: var(--font-display); font-size: 44px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.modal-price span { font-size: 15px; color: var(--ink-3); font-weight: 400; }
.modal input { width: 100%; background: var(--surface); border: 1px solid var(--edge); color: var(--ink); padding: 11px 14px; border-radius: var(--r-md); font-family: var(--font-body); font-size: 13px; margin-bottom: 10px; outline: none; }
.modal input:focus { border-color: var(--gold-dim); }
.modal-btn-row { display: flex; gap: 8px; margin-top: 18px; }
.modal-btn-primary { flex: 1; background: var(--ink); color: var(--void); border: none; padding: 12px; border-radius: var(--r-md); cursor: pointer; font-family: var(--font-display); font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; min-height: 44px; }
.modal-btn-primary:hover { background: var(--gold); }
.modal-btn-secondary { flex: 1; background: transparent; color: var(--ink-2); border: 1px solid var(--edge); padding: 12px; border-radius: var(--r-md); cursor: pointer; font-family: var(--font-display); font-size: 10.5px; font-weight: 600; text-transform: uppercase; min-height: 44px; }
.modal-btn-secondary:hover { background: var(--surface); color: var(--ink); }
.modal-tier-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.modal-tier-tab { flex: 1; text-align: center; padding: 10px; border: 1px solid var(--edge); border-radius: var(--r-md); cursor: pointer; font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--ink-2); transition: all 0.2s; }
.modal-tier-tab:hover { border-color: var(--line); color: var(--ink); }
.modal-tier-tab.active { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }

.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--void); padding: 9px 20px; border-radius: 3px; font-family: var(--font-display); font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; z-index: 300; animation: toastAnim 2.8s var(--ease) forwards; pointer-events: none; }
@keyframes toastAnim { 0% { opacity: 0; transform: translateX(-50%) translateY(8px); } 12% { opacity: 1; transform: translateX(-50%) translateY(0); } 78% { opacity: 1; } 100% { opacity: 0; } }

.mobile-menu-btn { display: none; position: fixed; top: 18px; left: 14px; z-index: 70; background: var(--abyss); border: 1px solid var(--edge); color: var(--ink); width: 34px; height: 34px; border-radius: var(--r-md); cursor: pointer; align-items: center; justify-content: center; }

@media (max-width: 768px) {
  .sidebar { position: fixed; top: 0; bottom: 0; left: 0; transform: translateX(-100%); width: 280px !important; min-width: 280px !important; box-shadow: 20px 0 60px rgba(0,0,0,0.8); z-index: 65; }
  .sidebar.mobile-open { transform: translateX(0); }
  .mobile-menu-btn { display: flex; }
  .chat-messages { padding: 60px 18px 20px; }
  .input-area { padding: 0 18px 24px; }
}
</style>
</head>
<body>

<div id="app"></div>
<button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>

<div id="paymentModal" class="modal-overlay">
  <div class="modal">
    <h2 id="modalTitle">Capitan Pro</h2>
    <p class="modal-desc" id="modalDesc">Unlimited messages. All domains. All tools.</p>
    <div class="modal-price" id="modalPrice">$17<span> / month</span></div>
    <div class="modal-tier-tabs">
      <button class="modal-tier-tab" data-tier="plus" onclick="switchModalTier('plus')">Plus · $6</button>
      <button class="modal-tier-tab active" data-tier="pro" onclick="switchModalTier('pro')">Pro · $17</button>
    </div>
    <div style="margin-bottom:16px">
      <select id="cryptoCurrency" style="width:100%;background:var(--surface);border:1px solid var(--edge);color:var(--ink);padding:8px;border-radius:var(--r-md);font-family:var(--font-body);font-size:13px;margin-bottom:8px">
        <option value="BTC">BTC</option>
        <option value="ETH">ETH</option>
        <option value="USDC">USDC</option>
      </select>
      <div style="background:var(--surface);border:1px solid var(--edge);padding:10px;border-radius:var(--r-md);font-family:var(--font-mono);font-size:9px;color:var(--ink-2);word-break:break-all;margin-bottom:8px">bc1qrv6yr6e0mat96rvrc8smdf9rvu9rlp8xuk8new</div>
      <input type="text" placeholder="Transaction hash (TXID)" id="txidInput">
    </div>
    <div class="modal-btn-row">
      <button class="modal-btn-primary" id="verifyPaymentBtn">Verify & Activate</button>
      <button class="modal-btn-secondary" id="closeModal">Cancel</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CAPITAN AI — TIERS: Free | Plus $6 | Pro $17 | Founder
// ═══════════════════════════════════════
const API_BASE = 'https://goldquantum0-capitan-ai-1.onrender.com';
const CFG = { FOUNDER_CLICKS: 5, EMAIL: 'closeaitechnologies@gmail.com', ADMIN_CODE: 'Osinachi@350' };

const TIERS = {
  free:    { name:'Free',    price:0,  msgLimit:20,  msgWindow:7, domains:['general','finance'],                       tools:[],                  badge:'FREE' },
  plus:    { name:'Plus',    price:6,  msgLimit:30,  msgWindow:7, domains:['general','finance','coding','math'],       tools:[],                  badge:'PLUS' },
  pro:     { name:'Pro',     price:17, msgLimit:1/0, msgWindow:0, domains:['general','finance','coding','math','quant','science'], tools:['workspace','memory','apiKeys','export','promptLib'], badge:'PRO' },
  founder: { name:'Founder', price:0,  msgLimit:1/0, msgWindow:0, domains:['general','finance','coding','math','quant','science'], tools:['workspace','memory','apiKeys','export','promptLib','admin'], badge:'FOUNDER' }
};

const uid = () => Math.random().toString(36).slice(2,8).toUpperCase();
const mid = () => 'mem_'+uid();

let S = loadState();

function defaultState() {
  return {
    messages:[], streaming:false, tier:'free', proExpiry:null,
    sidebarOpen:true, sidebarCollapsed:false,
    sections:{workflows:true,settings:false}, theme:'dark',
    founderClicks:0, founderTimer:null,
    memories:[{id:uid(),memId:mid(),content:'Patterns stored',active:true}],
    selectedModel:'balanced',
    models:[{id:'quick',name:'Quick'},{id:'balanced',name:'Balanced'},{id:'deep',name:'Deep'}],
    freeMsgCount:0, freeMsgWindowStart:Date.now(), adminAuth:false
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem('capitan_state');
    if (raw) {
      const p = JSON.parse(raw);
      if (p.proExpiry && Date.now() > p.proExpiry) { p.tier = 'free'; p.proExpiry = null; }
      if (p.tier === 'free') { p.adminAuth = false; }
      if (p.tier !== 'founder') { p.adminAuth = false; }
      return {...defaultState(),...p};
    }
  } catch(e) {}
  return defaultState();
}

function saveState() {
  try {
    localStorage.setItem('capitan_state', JSON.stringify({
      tier:S.tier, proExpiry:S.proExpiry, theme:S.theme,
      freeMsgCount:S.freeMsgCount, freeMsgWindowStart:S.freeMsgWindowStart,
      adminAuth:S.tier==='founder'?S.adminAuth:false,
      sidebarCollapsed:S.sidebarCollapsed
    }));
  } catch(e) {}
}

const isPro = () => S.tier === 'pro' || S.tier === 'founder';
const isFounder = () => S.tier === 'founder';
const getTier = () => TIERS[S.tier] || TIERS.free;
const canDomain = (d) => getTier().domains.includes(d);
const canTool = (t) => getTier().tools.includes(t);

function canMessage() {
  const t = getTier();
  if (t.msgLimit === Infinity) return true;
  if (Date.now() - S.freeMsgWindowStart > t.msgWindow * 3600000) {
    S.freeMsgCount = 0; S.freeMsgWindowStart = Date.now(); saveState();
  }
  return S.freeMsgCount < t.msgLimit;
}

function remaining() {
  const t = getTier();
  if (t.msgLimit === Infinity) return '∞';
  return Math.max(0, t.msgLimit - S.freeMsgCount);
}

function msgPct() {
  const t = getTier();
  if (t.msgLimit === Infinity) return 0;
  return Math.min(100, (S.freeMsgCount / t.msgLimit) * 100);
}

function toast(msg) {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>el.remove(),2900);
}

function esc(s) { return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''; }
function escAttr(s) { return s?s.replace(/'/g,"\\'").replace(/"/g,'&quot;'):''; }
function fmt(s) { return s?s.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>'):''; }
function applyTheme() { document.documentElement.classList.toggle('light', S.theme==='light'); }

const greeting = () => {
  const h = new Date().getHours();
  if (h<6) return 'Late night.'; if (h<12) return 'Good morning.';
  if (h<17) return 'Good afternoon.'; if (h<21) return 'Good evening.';
  return 'Night session.';
};

  document.getElementById('modalPrice').innerHTML = '$'+t.price+'<span> / month</span>';
  document.querySelectorAll('.modal-tier-tab').forEach(b=>b.classList.toggle('active',b.dataset.tier===tier));
}
