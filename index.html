<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CLOSEAI — Institutional Workspace</title>
<style>
/* ═══════════════════════════════════════════════════════════ */
/* CLOSEAI UI ENGINE v24.0 — Ultra-Compact High-Density Design   */
/* optimized for cloudflare pages & edge execution            */
/* ═══════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700;800&display=swap');

:root {
  --bg-main: #0a0a0a;
  --bg-surface: #121212;
  --bg-surface-elevated: #1a1a1a;
  --bg-action: #222222;
  --border-subtle: #1c1c1c;
  --border-muted: #262626;
  --border-active: #3a3a3a;
  
  --text-primary: #f5f5f5;
  --text-secondary: #a3a3a3;
  --text-muted: #666666;
  --accent-gold: #d4af37;
  --accent-blue: #2f80ed;
  
  --font-sans: 'Geist', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Geist Mono', monospace;
  
  --radius-lg: 10px;
  --radius-md: 6px;
  --radius-sm: 4px;
  
  --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --sidebar-width: 260px;
}

:root.light {
  --bg-main: #fcfcfc;
  --bg-surface: #f4f4f5;
  --bg-surface-elevated: #e4e4e7;
  --bg-action: #dbdbdb;
  --border-subtle: #e4e4e7;
  --border-muted: #d4d4d8;
  --border-active: #a1a1aa;
  
  --text-primary: #09090b;
  --text-secondary: #52525b;
  --text-muted: #a1a1aa;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-main);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 12px;
  line-height: 1.5;
  letter-spacing: -0.01em;
  overflow: hidden;
  height: 100vh; height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

#app { display: flex; height: 100vh; height: 100dvh; width: 100vw; }

/* Scrollbar System */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-muted); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-active); }

/* ═══════════════════════════════════════════════════════════ */
/* SIDEBAR ARCHITECTURE                                        */
/* ═══════════════════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-surface);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  padding: 12px;
  gap: 8px;
  z-index: 100;
  transition: transform var(--transition-fast);
  overflow-y: auto;
}

.sb-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 4px 8px;
  border-bottom: 1px solid var(--border-subtle);
}

.sb-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: -0.03em;
  color: var(--text-primary);
  cursor: pointer;
}

.sb-toggle-btn {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 12px;
  padding: 4px;
  border-radius: var(--radius-sm);
}
.sb-toggle-btn:hover { background: var(--bg-surface-elevated); color: var(--text-primary); }

/* Identity & Authentication Block */
.auth-block {
  background: var(--bg-main);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.auth-user-info {
  display: flex;
  align-items: center;
  gap: 8px;
}

.auth-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--border-active);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 10px;
}

.auth-meta {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.auth-name { font-weight: 600; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.auth-status { font-size: 9px; color: var(--text-muted); font-family: var(--font-mono); }

.auth-action-btn {
  width: 100%;
  background: var(--bg-surface-elevated);
  border: 1px solid var(--border-muted);
  color: var(--text-primary);
  padding: 6px;
  font-size: 11px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all var(--transition-fast);
}
.auth-action-btn:hover { border-color: var(--border-active); background: var(--bg-action); }
.auth-action-btn.google-btn { background: #ffffff; color: #000000; border: 1px solid #e4e4e7; }
.auth-action-btn.google-btn:hover { background: #f4f4f5; }

/* Navigation & Sub-menus */
.menu-group {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.menu-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 6px 8px;
  letter-spacing: 0.05em;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  width: 100%;
  text-align: left;
  font-family: inherit;
  font-size: 11px;
  transition: all var(--transition-fast);
}
.menu-item:hover { background: var(--bg-surface-elevated); color: var(--text-primary); }
.menu-item.active { background: var(--bg-action); color: var(--text-primary); font-weight: 500; }
.menu-item .icon { font-size: 12px; width: 16px; text-align: center; opacity: 0.7; }
.menu-item .badge { margin-left: auto; font-size: 8px; font-family: var(--font-mono); background: var(--bg-surface-elevated); padding: 1px 4px; border-radius: 3px; border: 1px solid var(--border-muted); }

/* Quick Markets Streamer */
.market-ticker-wrap {
  margin-top: auto;
  border-top: 1px solid var(--border-subtle);
  padding-top: 8px;
}
.market-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.market-row:hover { background: var(--bg-surface-elevated); }
.market-row .sym { color: var(--text-primary); font-weight: 500; }
.market-row .val { color: var(--text-secondary); }
.market-row .chg { font-weight: 600; }
.market-row .chg.up { color: #22c55e; }
.market-row .chg.down { color: #ef4444; }

/* ═══════════════════════════════════════════════════════════ */
/* MAIN CONTENT ENGINE                                         */
/* ═══════════════════════════════════════════════════════════ */
.main-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-main);
  position: relative;
  overflow: hidden;
}

.workspace-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 760px;
  width: 100%;
  margin: 0 auto;
  height: 100%;
}

.content-feed {
  flex: 1;
  overflow-y: auto;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Onboarding Canvas */
.onboarding {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  text-align: center;
  padding: 40px 20px;
}
.onboarding h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }
.onboarding p { color: var(--text-secondary); max-width: 36px; max-width: 380px; margin-bottom: 20px; font-size: 11px; }

.onboarding-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  max-width: 480px;
  width: 100%;
}
.onboarding-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  padding: 10px;
  border-radius: var(--radius-md);
  cursor: pointer;
  text-align: left;
  transition: all var(--transition-fast);
}
.onboarding-card:hover { border-color: var(--border-active); background: var(--bg-surface-elevated); }
.onboarding-card .title { font-weight: 600; font-size: 11px; margin-bottom: 2px; }
.onboarding-card .desc { color: var(--text-muted); font-size: 10px; }

/* Micro Message Styling */
.bubble {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-width: 85%;
  animation: slideIn var(--transition-fast) ease-out;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.bubble.user {
  margin-left: auto;
  background: var(--bg-surface-elevated);
  border: 1px solid var(--border-muted);
  padding: 8px 12px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 var(--radius-lg);
}

.bubble.ai {
  margin-right: auto;
  width: 100%;
  max-width: 100%;
  border-left: 2px solid var(--border-active);
  padding-left: 12px;
}

.bubble-meta {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.bubble-text {
  font-size: 12px;
  color: var(--text-primary);
  word-break: break-word;
}
.bubble-text p { margin-bottom: 6px; }
.bubble-text p:last-child { margin-bottom: 0; }
.bubble-text strong { font-weight: 600; color: #ffffff; }
.bubble-text code { font-family: var(--font-mono); background: var(--bg-surface); padding: 2px 4px; border-radius: 3px; font-size: 11px; border: 1px solid var(--border-subtle); }

/* Institutional Meta Layouts */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
  font-family: var(--font-mono);
  font-size: 11px;
}
.data-table th { text-align: left; padding: 6px; background: var(--bg-surface); border-bottom: 1px solid var(--border-muted); color: var(--text-secondary); font-weight: 500; }
.data-table td { padding: 6px; border-bottom: 1px solid var(--border-subtle); }
.data-table tr:hover td { background: var(--bg-surface); }

/* Console Input Engine */
.input-bar-container {
  padding: 12px 16px 16px;
}

.input-bar-inner {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 4px 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.input-bar-inner:focus-within { border-color: var(--border-active); }

.input-field-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.input-field-row input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 12px;
  padding: 8px 4px;
  outline: none;
}
.input-field-row input::placeholder { color: var(--text-muted); }

.action-btn-group {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--border-subtle);
  padding-top: 4px;
}

.ctrl-btn {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 11px;
  font-family: var(--font-mono);
  cursor: pointer;
  padding: 4px 6px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  gap: 4px;
}
.ctrl-btn:hover { background: var(--bg-surface-elevated); color: var(--text-primary); }

.submit-btn {
  background: var(--text-primary);
  color: var(--bg-main);
  border: none;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: opacity var(--transition-fast);
}
.submit-btn:hover { opacity: 0.9; }

/* ═══════════════════════════════════════════════════════════ */
/* AUTH & IDENTITY DIALOGUES                                   */
/* ═══════════════════════════════════════════════════════════ */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(2px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.overlay.active { display: flex; }

.dialog {
  background: var(--bg-surface);
  border: 1px solid var(--border-muted);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 320px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.dialog h2 { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; }
.dialog p { color: var(--text-secondary); font-size: 11px; }

.dialog input {
  width: 100%;
  background: var(--bg-main);
  border: 1px solid var(--border-subtle);
  color: var(--text-primary);
  padding: 8px 10px;
  border-radius: var(--radius-md);
  font-family: inherit;
  font-size: 12px;
  outline: none;
}
.dialog input:focus { border-color: var(--border-active); }

.dialog-actions {
  display: flex;
  gap: 6px;
  margin-top: 4px;
}
.dialog-actions button { flex: 1; padding: 8px; font-size: 11px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; }
.dialog-actions .primary { background: var(--text-primary); color: var(--bg-main); }
.dialog-actions .secondary { background: transparent; border-color: var(--border-subtle); color: var(--text-secondary); }
.dialog-actions .secondary:hover { background: var(--bg-surface-elevated); }

/* Global Utilities */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg-surface-elevated); border: 1px solid var(--border-active); color: var(--text-primary); font-family: var(--font-mono); font-size: 10px; padding: 8px 12px; border-radius: var(--radius-md); z-index: 300; pointer-events: none; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.mobile-menu-trigger {
  display: none;
  position: absolute;
  top: 12px;
  left: 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  z-index: 90;
}

@media(max-width: 768px) {
  .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; width: 280px; box-shadow: 20px 0 60px rgba(0,0,0,0.5); }
  .sidebar.mobile-open { left: 0; transform: translateX(0); }
  .mobile-menu-trigger { display: block; }
  .content-feed { padding-top: 50px; }
}
</style>
</head>
<body>

<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-logo" onclick="window.location.reload()">
        <span>⚓</span> CLOSEAI INTERACTIVE
      </div>
      <button class="sb-toggle-btn" id="hideSidebarBtn">◁</button>
    </div>

    <div class="auth-block" id="authBlock">
      </div>

    <div class="menu-group">
      <div class="menu-label">Intelligence Channels</div>
      <button class="menu-item active" data-channel="chat">
        <span class="icon">💬</span> System Terminal
      </button>
      <button class="menu-item" data-channel="research">
        <span class="icon">🔬</span> Quantitative Analysis
      </button>
      <button class="menu-item" data-channel="quantum">
        <span class="icon">⚛️</span> Quantum Subroutines <span class="badge">PRO</span>
      </button>
      <button class="menu-item" data-channel="blocks">
        <span class="icon">💻</span> Order Block Engine <span class="badge">PRO</span>
      </button>
    </div>

    <div class="menu-group">
      <div class="menu-label">System Control</div>
      <button class="menu-item" id="themeToggleBtn">
        <span class="icon">🌓</span> Toggle Aesthetic
      </button>
      <button class="menu-item" id="clearConsoleBtn">
        <span class="icon">🗑️</span> Flush Session Data
      </button>
    </div>

    <div class="market-ticker-wrap" id="tickerWrap">
      <div class="menu-label">Institutional Feeds</div>
      </div>
  </aside>

  <button class="mobile-menu-trigger" id="mobileTrigger">☰ CONSOLE MENU</button>

  <section class="main-view">
    <div class="workspace-container">
      <div class="content-feed" id="contentFeed">
        </div>

      <div class="input-bar-container">
        <div class="input-bar-inner">
          <div class="input-field-row">
            <input type="text" id="consoleInput" placeholder="Enter algorithmic prompt or system command..." autocomplete="off">
          </div>
          <div class="action-btn-group">
            <div style="display: flex; gap: 4px;">
              <button class="ctrl-btn" id="modelSelector">🤖 model: balanced</button>
              <button class="ctrl-btn" id="riskRuleIndicator">⚡ risk: 1% rule</button>
            </div>
            <button class="submit-btn" id="consoleSubmitBtn">EXECUTE</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="overlay" id="authOverlay">
  <div class="dialog">
    <h2 id="authTitle">Workspace Registry</h2>
    <p id="authDesc">Access secure terminal sync routes via credentials.</p>
    <input type="email" id="authEmail" placeholder="Institutional Email Address">
    <input type="password" id="authPassword" placeholder="Security Token Access String">
    <div class="dialog-actions">
      <button class="secondary" id="authCancel">Dismiss</button>
      <button class="primary" id="authSubmit">Initialize Connect</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// TERMINAL APPLICATION ARCHITECTURE — ARCHITECTED FOR SPEED
// ═══════════════════════════════════════════════════════════

const APP_STATE_KEY = 'closeai_core_nexus_v1';

let State = {
  user: null, // Format: { email: string, provider: 'email' | 'google', tier: 'free' | 'pro' }
  messages: [],
  theme: 'dark',
  model: 'balanced',
  currentChannel: 'chat'
};

const MarketFeed = [
  { id: 'xau', name: 'XAUUSD', basePrice: 2341.20, precision: 2 },
  { id: 'xaut', name: 'XAUTUSD', basePrice: 2341.80, precision: 2 },
  { id: 'dxy', name: 'DXY', basePrice: 104.50, precision: 3 },
  { id: 'us10y', name: 'US10Y', basePrice: 4.280, precision: 3 }
];

// Local Matrix Initializer
function bootstrap() {
  const cached = localStorage.getItem(APP_STATE_KEY);
  if (cached) {
    try { State = { ...State, ...JSON.parse(cached) }; } catch(e) { console.error("Cache purge required."); }
  }
  applyTheme();
  renderAuthBlock();
  renderMarketData();
  switchChannel(State.currentChannel);
  
  // High speed tick loops
  setInterval(tickMarkets, 4000);
}

function sync() {
  localStorage.setItem(APP_STATE_KEY, JSON.stringify(State));
}

function notify(text) {
  const t = Object.assign(document.createElement('div'), { className: 'toast', textContent: text });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function applyTheme() {
  document.documentElement.classList.toggle('light', State.theme === 'light');
}

// ═══════════════════════════════════════════════════════════
// UI RENDER ENGINES
// ═══════════════════════════════════════════════════════════
function renderAuthBlock() {
  const container = document.getElementById('authBlock');
  if (!container) return;

  if (State.user) {
    const initials = State.user.email.substring(0, 2).toUpperCase();
    container.innerHTML = `
      <div class="auth-user-info">
        <div class="auth-avatar">${initials}</div>
        <div class="auth-meta">
          <div class="auth-name">${State.user.email}</div>
          <div class="auth-status">${State.user.tier.toUpperCase()} CLIENT NODE</div>
        </div>
      </div>
      <button class="auth-action-btn" id="logoutBtn">🛡️ Disconnect Session</button>
    `;
    document.getElementById('logoutBtn').onclick = () => {
      State.user = null;
      sync();
      renderAuthBlock();
      notify("Session disconnected.");
    };
  } else {
    container.innerHTML = `
      <button class="auth-action-btn google-btn" id="googleAuthBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" style="margin-right:2px;"><path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.92h6.61c-.3 1.52-1.15 2.8-2.42 3.66v3.04h3.89c2.28-2.1 3.66-5.17 3.66-8.55z"/><path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.89-3.04c-1.08.72-2.45 1.16-4.04 1.16-3.11 0-5.74-2.11-6.68-4.96H1.21v3.15C3.18 21.88 7.31 24 12 24z"/><path fill="#FBBC05" d="M5.32 14.25c-.24-.73-.38-1.5-.38-2.3 0-.8.14-1.57.38-2.3V6.5H1.21C.44 8.04 0 9.77 0 11.62c0 1.85.44 3.58 1.21 5.12l4.11-2.49z"/><path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.31 0 3.18 2.12 1.21 5.62l4.11 2.49c.94-2.85 3.57-4.96 6.68-4.96z"/></svg>
        Continue with Google
      </button>
      <button class="auth-action-btn" id="emailAuthBtn">✉️ Institutional Login</button>
    `;
    
    document.getElementById('googleAuthBtn').onclick = () => {
      // Direct federation simulation
      State.user = { email: 'billionaire.trades@gmail.com', provider: 'google', tier: 'pro' };
      sync();
      renderAuthBlock();
      notify("Authenticated via Google Engine.");
    };

    document.getElementById('emailAuthBtn').onclick = () => {
      openAuthModal();
    };
  }
}

function renderMarketData() {
  const container = document.getElementById('tickerWrap');
  if (!container) return;
  
  // Retain the label header
  container.innerHTML = `<div class="menu-label">Institutional Feeds</div>`;
  
  MarketFeed.forEach(asset => {
    const change = (Math.random() * 0.4) - 0.18;
    const isUp = change >= 0;
    
    const row = Object.assign(document.createElement('div'), { className: 'market-row' });
    row.innerHTML = `
      <span class="sym">${asset.name}</span>
      <span class="val">${asset.basePrice.toFixed(asset.precision)}</span>
      <span class="chg ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%</span>
    `;
    row.onclick = () => {
      insertConsoleCommand(`Analyze market context structure for ${asset.name}`);
    };
    container.appendChild(row);
  });
}

function tickMarkets() {
  MarketFeed.forEach(a => {
    a.basePrice += (Math.random() - 0.5) * (a.basePrice * 0.002);
  });
  renderMarketData();
}

// ═══════════════════════════════════════════════════════════

function switchChannel(channelId) {
  State.currentChannel = channelId;
  sync();
  
  document.querySelectorAll('[data-channel]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.channel === channelId);
  });
  
  const feed = document.getElementById('contentFeed');
  if (!feed) return;
  feed.innerHTML = ''; // Reset frame layout

  if (channelId === 'chat') {
    if (State.messages.length === 0) {
      feed.innerHTML = `
        <div class="onboarding">
          <h1>CLOSEAI Terminal Framework</h1>
          <p>Execution layer configured for low-latency macro and institutional volume matching workflows.</p>
          <div class="onboarding-grid">
            <div class="onboarding-card" onclick="insertConsoleCommand('Analyze recent order blocks inside XAUUSD 4H frame')">
              <div class="title">Gold (XAUUSD) Blocks</div>
              <div class="desc">Scans multi-timeframe liquidity structures.</div>
            </div>
            <div class="onboarding-card" onclick="insertConsoleCommand('Correlate DXY trends with current 10Y yields macro behavior')">
              <div class="title">Macro Matrix Sync</div>
              <div class="desc">Calculates directional vector matrices.</div>
            </div>
          </div>
        </div>
      `;
    } else {
      State.messages.forEach(renderMsgBubble);
    }
  } else if (channelId === 'research') {
    feed.innerHTML = `
      <div class="onboarding">
        <h1>Quantitative Research Canvas</h1>
        <p>Enterprise data tracking matrices and comparative analytics.</p>
        <table class="data-table">
          <thead>
            <tr><th>Metric Matrix</th><th>Current Node</th><th>Deviation</th><th>Vector Status</th></tr>
          </thead>
          <tbody>
            <tr><td>Alpha Index Alpha</td><td>0.892</td><td>+0.02</td><td>Stable Execution</td></tr>
            <tr><td>DXY Flow Matching</td><td>104.42</td><td>-0.05</td><td>Optimal Compression</td></tr>
            <tr><td>SMC Order Depth</td><td>$4.2M/sec</td><td>+1.2M</td><td>High Liquidity Spike</td></tr>
          </tbody>
        </table>
      </div>
    `;
  } else {
    feed.innerHTML = `
      <div class="onboarding">
        <h1>Premium Channel Endpoint [${channelId.toUpperCase()}]</h1>
        <p>This localized access matrix requires elevated security or premium node verification profiles.</p>
      </div>
    `;
  }
}

function renderMsgBubble(msg) {
  const feed = document.getElementById('contentFeed');
  if (!feed) return;
  
  const onboarding = feed.querySelector('.onboarding');
  if (onboarding) onboarding.remove();

  const bubble = Object.assign(document.createElement('div'), { className: `bubble ${msg.role}` });
  
  let formattedText = msg.content;
  // Compact styling rules matching strict formatting paradigms
  formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  formattedText = formattedText.replace(/`(.*?)`/g, '<code>$1</code>');

  bubble.innerHTML = `
    <div class="bubble-meta">
      <span>${msg.role === 'user' ? 'CLIENT ENGINE' : 'CLOSEAI APEX'}</span>
      <span>•</span>
      <span>${new Date(msg.timestamp).toLocaleTimeString()}</span>
    </div>
    <div class="bubble-text">${formattedText}</div>
  `;
  
  feed.appendChild(bubble);
  feed.scrollTop = feed.scrollHeight;
}

// ═══════════════════════════════════════════════════════════
// LOGIC SYSTEMS & CONTROLS
// ═══════════════════════════════════════════════════════════
function insertConsoleCommand(text) {
  const input = document.getElementById('consoleInput');
  if (input) {
    input.value = text;
    input.focus();
  }
}

function executeConsoleRoute() {
  const input = document.getElementById('consoleInput');
  if (!input || !input.value.trim()) return;

  const rawText = input.value.trim();
  input.value = '';

  if (State.currentChannel !== 'chat') {
    switchChannel('chat');
  }

  const userMsg = { role: 'user', content: rawText, timestamp: Date.now() };
  State.messages.push(userMsg);
  renderMsgBubble(userMsg);
  sync();

  // Synthetic low latency responses mirroring edge computation matrices
  setTimeout(() => {
    let aiReplyText = `System terminal route handled with active parameters. Analysis complete for your input matrix.`;
    
    if (rawText.toLowerCase().includes('gold') || rawText.toLowerCase().includes('xau')) {
      aiReplyText = `**XAUUSD Order Block Diagnostics:**\nSMC parameters tracking significant buying blocks at \`2338.50\` across the 4H timeframe. Support layers remain protected under the current **1% risk parameters**. Structural shift validated by DXY stabilization matrices.`;
    } else if (rawText.toLowerCase().includes('dxy') || rawText.toLowerCase().includes('macro')) {
      aiReplyText = `**Macro Integration Synthesis Engine:**\nDXY current index structure holds steady at \`104.50\`. Inverse correlation with 10-Year Treasury Yields indicates imminent variance. Order matrices show heavy institutional accumulation blocks.`;
    }

    const aiMsg = { role: 'ai', content: aiReplyText, timestamp: Date.now() };
    State.messages.push(aiMsg);
    renderMsgBubble(aiMsg);
    sync();
  }, 450);
}

function openAuthModal() { document.getElementById('authOverlay').classList.add('active'); }

document.getElementById('consoleSubmitBtn')?.addEventListener('click', executeConsoleRoute);

});

document.querySelectorAll('[data-channel]').forEach(btn => {
  btn.addEventListener('click', () => switchChannel(btn.dataset.channel));
});

document.getElementById('themeToggleBtn')?.addEventListener('click', () => {
  State.theme = State.theme === 'dark' ? 'light' : 'dark';
  sync();
  applyTheme();
});

document.getElementById('clearConsoleBtn')?.addEventListener('click', () => {
  State.messages = [];
  sync();
  switchChannel(State.currentChannel);
  notify("Session space clean.");
});

// Mobile layout responders
document.getElementById('mobileTrigger')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('mobile-open');
});
document.getElementById('hideSidebarBtn')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('mobile-open');
});

// Authentication submission sequence logic
document.getElementById('authCancel')?.addEventListener('click', closeAuthModal);
document.getElementById('authSubmit')?.addEventListener('click', () => {
  const email = document.getElementById('authEmail').value.trim();
  if (email && email.includes('@')) {
    State.user = { email: email, provider: 'email', tier: 'pro' };
    sync();
    renderAuthBlock();
    closeAuthModal();
    notify("Connected to network nodes.");
  } else {
    alert("Invalid entry vector formatting.");
  }
});
