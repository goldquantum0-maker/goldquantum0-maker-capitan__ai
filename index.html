<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>CAPITAN AI — Enterprise Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Theme Variables - Light (default) */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-tertiary: #f0f0f2;
            --text-primary: #171717;
            --text-secondary: #6e6e73;
            --text-tertiary: #8e8e93;
            --border: #e5e5e7;
            --border-light: #ececee;
            --accent: #0ea5e9;
            --accent-dark: #0284c7;
            --accent-soft: #e0f2fe;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 24px rgba(0,0,0,0.12);
            --sidebar-width: 280px;
        }

        /* Dark Theme */
        body.dark {
            --bg-primary: #1a1a1a;
            --bg-secondary: #252525;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ededed;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            --border: #333333;
            --border-light: #3a3a3a;
            --accent: #38bdf8;
            --accent-dark: #0ea5e9;
            --accent-soft: #1e3a5f;
        }

        /* System Theme follows OS preference */
        @media (prefers-color-scheme: dark) {
            body.system {
                --bg-primary: #1a1a1a;
                --bg-secondary: #252525;
                --bg-tertiary: #2a2a2a;
                --text-primary: #ededed;
                --text-secondary: #a1a1aa;
                --text-tertiary: #71717a;
                --border: #333333;
                --border-light: #3a3a3a;
                --accent: #38bdf8;
                --accent-dark: #0ea5e9;
                --accent-soft: #1e3a5f;
            }
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            overflow-y: auto;
            z-index: 20;
        }

        .sidebar.collapsed {
            width: 0;
            overflow: hidden;
            border-right: none;
        }

        /* Sidebar Toggle Button */
        .sidebar-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 20px;
        }

        .sidebar-toggle:hover {
            background: var(--bg-tertiary);
            transform: scale(1.02);
        }

        /* Main content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
        }

        /* Chat Container */
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 0 24px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px 0 24px;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .message {
            margin-bottom: 24px;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            display: flex;
            justify-content: flex-end;
        }

        .message.user .message-content {
            background: var(--accent);
            color: white;
            border-radius: 20px 20px 4px 20px;
            padding: 10px 16px;
            max-width: 85%;
        }

        .message.assistant .message-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 20px 20px 20px 4px;
            padding: 10px 16px;
            max-width: 95%;
        }

        .message-content {
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .message-content pre {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 12px;
        }

        .message-content code {
            font-family: monospace;
            background: var(--bg-tertiary);
            padding: 2px 5px;
            border-radius: 4px;
        }

        /* Input Area */
        .input-area {
            padding: 0 0 24px;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 8px 12px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .input-field {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            padding: 8px 0;
            color: var(--text-primary);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--accent-dark);
            transform: scale(1.02);
        }

        /* Settings Panel */
        .settings-panel {
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .settings-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .settings-header:hover {
            background: var(--bg-tertiary);
        }

        .settings-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .settings-content.open {
            max-height: 400px;
        }

        .setting-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border-top: 1px solid var(--border-light);
        }

        .setting-item:hover {
            background: var(--bg-tertiary);
        }

        /* Chat History Items */
        .chat-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border-bottom: 1px solid var(--border-light);
        }

        .chat-item:hover {
            background: var(--bg-tertiary);
        }

        .chat-item.active {
            background: var(--accent-soft);
            color: var(--accent);
        }

        /* Upgrade Cards */
        .tier-comparison {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }

        .tier-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tier-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        /* Dashboard Stats */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--bg-primary);
            border-radius: 20px;
            width: 90%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: var(--shadow-lg);
        }

        /* Library Items */
        .library-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid var(--border-light);
        }

        .library-item:hover {
            background: var(--bg-tertiary);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                transition: transform 0.2s ease;
                z-index: 25;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .chat-container {
                padding: 0 16px;
            }
        }
    </style>
</head>
<body class="light">

<div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div style="padding: 16px;">
            <button class="btn" onclick="newChat()" style="margin-top: 0;">
                + New Conversation
            </button>
        </div>

        <!-- Chat History -->
        <div style="flex: 1; overflow-y: auto;" id="chatHistoryList">
            <div style="padding: 20px; text-align: center; color: var(--text-tertiary); font-size: 13px;">
                No conversations yet
            </div>
        </div>

        <!-- Settings Section -->
        <div class="settings-panel">
            <div class="settings-header" onclick="toggleSettings()">
                <span>⚙️ Settings</span>
                <span id="settingsArrow">▼</span>
            </div>
            <div class="settings-content" id="settingsContent">
                <div class="setting-item" onclick="toggleTheme('light')">
                    <span>☀️ Light Mode</span>
                    <span id="themeLightCheck" style="color: var(--accent);">✓</span>
                </div>
                <div class="setting-item" onclick="toggleTheme('dark')">
                    <span>🌙 Dark Mode</span>
                    <span id="themeDarkCheck" style="color: var(--accent); display: none;">✓</span>
                </div>
                <div class="setting-item" onclick="toggleTheme('system')">
                    <span>🖥️ System Theme</span>
                    <span id="themeSystemCheck" style="color: var(--accent); display: none;">✓</span>
                </div>
                <div class="setting-item" onclick="openUpgrade()">
                    <span>💎 Upgrade Plan</span>
                    <span>→</span>
                </div>
                <div class="setting-item" onclick="showOwnerDashboard()">
                    <span>📊 Owner Dashboard</span>
                    <span>→</span>
                </div>
                <div class="setting-item" onclick="openLibrary()">
                    <span>📚 My Library</span>
                    <span>→</span>
                </div>
                <div class="setting-item" onclick="initTelegramLogin()">
                    <span>🔐 Telegram Login</span>
                    <span>→</span>
                </div>
                <div class="setting-item" onclick="logout()" style="color: var(--danger);">
                    <span>🚪 Sign Out</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Sidebar Toggle Button -->
    <button class="sidebar-toggle" id="sidebarToggle">☰</button>

    <!-- Main Chat Area -->
    <main class="main">
        <div class="chat-container">
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; padding: 60px 20px;">
                    <h2 style="margin-bottom: 12px;">CAPITAN AI</h2>
                    <p style="color: var(--text-secondary);">Ask me anything — finance, code, research, or creative tasks.</p>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="input-field" id="messageInput" rows="1" placeholder="Send a message..." onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                    <button class="send-btn" onclick="sendMessage()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modals -->
<div id="upgradeModal" class="modal-overlay"><div class="modal" id="upgradeModalContent"></div></div>
<div id="dashboardModal" class="modal-overlay"><div class="modal" id="dashboardModalContent"></div></div>
<div id="libraryModal" class="modal-overlay"><div class="modal" id="libraryModalContent"></div></div>

<script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    const CFG = {
        API: 'https://capitan-ai-jxu8.onrender.com',
        STREAM_DELAY: 12
    };

    // State
    let state = {
        token: localStorage.getItem('ct') || null,
        tier: 'free',
        user: null,
        activeChatId: null,
        chats: [],
        messages: [],
        loading: false,
        library: [],
        theme: localStorage.getItem('theme') || 'light',
        sidebarOpen: window.innerWidth > 768,
        settingsOpen: false
    };

    // ============================================================
    // HELPER FUNCTIONS
    // ============================================================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function formatMarkdown(text) {
        if (!text) return '';
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/`(.*?)`/g, '<code>$1</code>')
            .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
            .replace(/\n/g, '<br>');
    }

    function toast(message) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toastEl = document.createElement('div');
        toastEl.className = 'toast';
        toastEl.textContent = message;
        document.body.appendChild(toastEl);
        setTimeout(() => toastEl.remove(), 2500);
    }

    function closeModal(modalId) {
        document.getElementById(modalId).classList.remove('open');
    }

    function scrollToBottom() {
        const area = document.getElementById('messagesArea');
        if (area) area.scrollTop = area.scrollHeight;
    }

    // ============================================================
    // THEME MANAGEMENT
    // ============================================================
    function applyTheme() {
        document.body.className = state.theme;
        localStorage.setItem('theme', state.theme);
        
        const lightCheck = document.getElementById('themeLightCheck');
        const darkCheck = document.getElementById('themeDarkCheck');
        const systemCheck = document.getElementById('themeSystemCheck');
        if (lightCheck) lightCheck.style.display = state.theme === 'light' ? 'inline' : 'none';
        if (darkCheck) darkCheck.style.display = state.theme === 'dark' ? 'inline' : 'none';
        if (systemCheck) systemCheck.style.display = state.theme === 'system' ? 'inline' : 'none';
    }

    function toggleTheme(theme) {
        state.theme = theme;
        applyTheme();
        toast(`Theme switched to ${theme}`);
    }

    function toggleSettings() {
        state.settingsOpen = !state.settingsOpen;
        const content = document.getElementById('settingsContent');
        const arrow = document.getElementById('settingsArrow');
        if (state.settingsOpen) {
            content.classList.add('open');
            arrow.innerHTML = '▲';
        } else {
            content.classList.remove('open');
            arrow.innerHTML = '▼';
        }
    }

    // ============================================================
    // SIDEBAR TOGGLE
    // ============================================================
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        state.sidebarOpen = !state.sidebarOpen;
        
        if (window.innerWidth <= 768) {
            if (state.sidebarOpen) {
                sidebar.classList.add('open');
            } else {
                sidebar.classList.remove('open');
            }
        } else {
            if (state.sidebarOpen) {
                sidebar.classList.remove('collapsed');
            } else {
                sidebar.classList.add('collapsed');
            }
        }
    }

    // ============================================================
    // API CALLS
    // ============================================================
    async function apiCall(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
        
        const res = await fetch(`${CFG.API}${endpoint}`, { ...options, headers });
        if (res.status === 401) {
            logout();
            throw new Error('Session expired');
        }
        if (!res.ok) {
            const errorText = await res.text();
            throw new Error(errorText || 'Request failed');
        }
        return res.json();
    }

    async function initSession() {
        try {
            if (state.token) {
                const sess = await apiCall('/api/session');
                state.tier = sess.tier;
                state.user = sess.user_data;
            } else {
                const sess = await apiCall('/api/session');
                state.token = sess.token;
                state.tier = sess.tier;
                localStorage.setItem('ct', state.token);
            }
        } catch (e) {
            console.warn('Session init failed:', e);
            toast('Connection issue. Retrying...');
        }
    }

    // ============================================================
    // CHAT FUNCTIONS
    // ============================================================
    function renderChatHistory() {
        const container = document.getElementById('chatHistoryList');
        if (!container) return;
        
        if (state.chats.length === 0) {
            container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-tertiary); font-size: 13px;">No conversations yet</div>';
            return;
        }
        
        container.innerHTML = state.chats.map(chat => `
            <div class="chat-item ${state.activeChatId === chat.id ? 'active' : ''}" onclick="loadChat('${chat.id}')">
                <span style="flex: 1; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(chat.title || 'Chat')}</span>
                <button onclick="event.stopPropagation(); deleteChat('${chat.id}')" style="background: none; border: none; color: var(--text-tertiary); cursor: pointer;">🗑️</button>
            </div>
        `).join('');
    }

    function renderMessages() {
        const container = document.getElementById('messagesArea');
        if (!container) return;
        
        if (state.messages.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <h2 style="margin-bottom: 12px;">CAPITAN AI</h2>
                    <p style="color: var(--text-secondary);">Ask me anything — finance, code, research, or creative tasks.</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = state.messages.map((msg, idx) => `
            <div class="message ${msg.role}">
                <div class="message-content">${msg.role === 'user' ? escapeHtml(msg.content) : formatMarkdown(msg.content)}</div>
            </div>
        `).join('');
        
        scrollToBottom();
    }

    async function loadChats() {
        try {
            const data = await apiCall('/api/chats');
            state.chats = data.chats || [];
            renderChatHistory();
        } catch (e) {
            console.warn('Load chats failed:', e);
        }
    }

    async function loadChat(chatId) {
        try {
            const data = await apiCall(`/api/chats/${chatId}`);
            state.messages = data.messages || [];
            state.activeChatId = chatId;
            renderMessages();
            renderChatHistory();
        } catch (e) {
            toast('Failed to load chat');
        }
    }

    async function newChat() {
        state.activeChatId = null;
        state.messages = [];
        renderMessages();
        renderChatHistory();
        document.getElementById('messageInput').focus();
    }

    async function deleteChat(chatId) {
        if (!confirm('Delete this conversation?')) return;
        try {
            await apiCall(`/api/chats/${chatId}`, { method: 'DELETE' });
            if (state.activeChatId === chatId) await newChat();
            await loadChats();
            toast('Chat deleted');
        } catch (e) {
            toast('Failed to delete');
        }
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || state.loading) return;
        
        input.value = '';
        state.messages.push({ role: 'user', content: text });
        renderMessages();
        state.loading = true;

        const aiIndex = state.messages.length;
        state.messages.push({ role: 'assistant', content: '' });
        renderMessages();

        try {
            const res = await apiCall('/api/chat', {
                method: 'POST',
                body: JSON.stringify({ messages: state.messages.slice(0, -1), chat_id: state.activeChatId })
            });
            state.messages[aiIndex].content = res.content || 'No response';
            state.activeChatId = res.chat_id;
            renderMessages();
            await loadChats();
        } catch (err) {
            state.messages[aiIndex].content = `Error: ${err.message}`;
            renderMessages();
            toast(err.message);
        } finally {
            state.loading = false;
        }
    }

    // ============================================================
    // TELEGRAM LOGIN (COMPLETE)
    // ============================================================
    window.onTelegramAuth = async function(user) {
        try {
            toast('Verifying Telegram...');
            const res = await fetch(`${CFG.API}/api/auth/telegram/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: user })
            });
            const data = await res.json();
            if (data.token) {
                state.token = data.token;
                state.user = data.user;
                state.tier = data.user.tier;
                localStorage.setItem('ct', data.token);
                toast(`Welcome ${data.user.name || user.first_name}!`);
                await loadChats();
                closeModal('dashboardModal');
                renderMessages();
            } else {
                toast('Login failed');
            }
        } catch (e) {
            toast('Telegram login error: ' + e.message);
        }
    };

    function initTelegramLogin() {
        // Remove existing script if any
        const existing = document.querySelector('script[data-telegram-login]');
        if (existing) existing.remove();
        
        const script = document.createElement('script');
        script.src = 'https://telegram.org/js/telegram-widget.js?22';
        script.setAttribute('data-telegram-login', 'capitan_ai_bot');
        script.setAttribute('data-size', 'large');
        script.setAttribute('data-radius', '12');
        script.setAttribute('data-request-access', 'write');
        script.setAttribute('data-onauth', 'onTelegramAuth(user)');
        script.async = true;
        document.body.appendChild(script);
        
        toast('Opening Telegram login...');
        setTimeout(() => script.remove(), 5000);
    }

    // ============================================================
    // UPGRADE MODAL
    // ============================================================

    function selectTier(tier) {
        toast(`Upgrade to ${tier} - Contact support for payment details`);

    // ============================================================
    // OWNER DASHBOARD
    // ============================================================
    async function showOwnerDashboard() {
        const modal = document.getElementById('dashboardModalContent');
        modal.innerHTML = `<div style="text-align: center;">Loading dashboard...</div>`;
        document.getElementById('dashboardModal').classList.add('open');
        
        try {
            let stats = null;
            try {
                stats = await apiCall('/api/admin');
            } catch (e) {}
            
            modal.innerHTML = `
                <h2>📊 Owner Dashboard</h2>
                <div class="dashboard-stats">
                    <div class="stat-card">
                        <div class="stat-number">${state.tier}</div>
                        <div>Current Tier</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${state.chats.length}</div>
                        <div>Total Chats</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${state.messages.length}</div>
                        <div>Current Messages</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats?.total_users || 'N/A'}</div>
                        <div>Platform Users</div>
                    </div>
                </div>
                <div style="margin-top: 16px;">
                    <p><strong>📝 Your Activity</strong></p>
                    <p style="font-size: 13px;">• Telegram connected: ${state.user?.telegram_username ? '✅ Yes' : '❌ No'}</p>
                    <p style="font-size: 13px;">• Total conversations: ${state.chats.length}</p>
                </div>
                <button class="btn btn-secondary" onclick="closeModal('dashboardModal')">Close</button>
            `;
        } catch (e) {
            modal.innerHTML = `
                <h2>📊 Owner Dashboard</h2>
                <p>Sign in with Telegram to see full dashboard stats.</p>
                <button class="btn" onclick="initTelegramLogin()">Login with Telegram</button>
                <button class="btn btn-secondary" onclick="closeModal('dashboardModal')">Close</button>

    // ============================================================
    // LIBRARY
    // ============================================================
    async function openLibrary() {
        try {
            const lib = await apiCall('/api/library');
            state.library = lib.items || [];
        } catch (e) {
            state.library = [];
        }
        
        const modal = document.getElementById('libraryModalContent');
        modal.innerHTML = `
            <h2>📚 My Library</h2>
            <div style="margin-bottom: 16px;">
                <input type="text" id="libName" placeholder="Item name" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-secondary); color: var(--text-primary); margin-bottom: 8px;">
                <textarea id="libContent" rows="3" placeholder="Content" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-secondary); color: var(--text-primary);"></textarea>
                <button class="btn" onclick="saveLibraryItem()">Save to Library</button>
            </div>
            <div id="libraryList">
                ${state.library.length === 0 ? '<p style="text-align: center; color: var(--text-tertiary);">No saved items</p>' : 
                    state.library.map(item => `
                        <div class="library-item">
                            <div style="flex: 1; cursor: pointer;" onclick="viewLibraryItem('${item.id}')">
                                <strong>${escapeHtml(item.name)}</strong>
                                <div style="font-size: 11px; color: var(--text-tertiary);">${new Date(item.created).toLocaleDateString()}</div>
                            </div>
                            <button onclick="deleteLibraryItem('${item.id}')" style="background: none; border: none; color: var(--danger); cursor: pointer;">🗑️</button>
                        </div>
                    `).join('')
                }
            </div>
            <button class="btn btn-secondary" onclick="closeModal('libraryModal')">Close</button>
        `;
        document.getElementById('libraryModal').classList.add('open');
    }

    async function saveLibraryItem() {
        const name = document.getElementById('libName')?.value.trim();
        const content = document.getElementById('libContent')?.value.trim();
        if (!name || !content) {
            toast('Name and content required');
            return;
        }
        try {
            await apiCall('/api/library', {
                method: 'POST',
                body: JSON.stringify({ name, type: 'note', content })
            });
            toast('Saved to library!');
            openLibrary();
        } catch (e) {
            toast('Failed to save');
        }
    }

    async function deleteLibraryItem(id) {
        if (!confirm('Delete this item?')) return;
        try {
            await apiCall(`/api/library/${id}`, { method: 'DELETE' });
            toast('Deleted');
            openLibrary();
        } catch (e) {
            toast('Failed to delete');
        }
    }

    async function viewLibraryItem(id) {
        const item = state.library.find(i => i.id === id);
        if (item) {
            const nameInput = document.getElementById('libName');
            const contentInput = document.getElementById('libContent');
            if (nameInput) nameInput.value = item.name;
            if (contentInput) contentInput.value = item.content;
        }
    }

    // ============================================================
    // LOGOUT
    // ============================================================
    function logout() {
        localStorage.removeItem('ct');
        state.token = null;
        state.user = null;
        state.tier = 'free';
        state.activeChatId = null;
        state.messages = [];
        state.chats = [];
        toast('Logged out');
        renderMessages();
        renderChatHistory();
    }

    // ============================================================
    // KEEP-ALIVE PING (Prevents Render cold starts)
    // ============================================================
    function startKeepAlive() {
        setInterval(async () => {
            try {
                await fetch(`${CFG.API}/health`);
                console.log('Keep-alive ping sent');
            } catch (e) {
                console.log('Keep-alive failed');
            }
        }, 14 * 60 * 1000); // Every 14 minutes
    }

    // ============================================================
    // INITIALIZATION
    // ============================================================
    async function init() {
        applyTheme();
        await initSession();
        await loadChats();
        renderMessages();
        
        // Sidebar toggle listener
        document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
        
        // Close sidebar on click outside (mobile)
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');
            if (window.innerWidth <= 768 && state.sidebarOpen && sidebar && !sidebar.contains(e.target) && !toggle.contains(e.target)) {
                toggleSidebar();
            }
        });
        
        startKeepAlive();
        console.log('CAPITAN AI Frontend Ready');
    }

    // Start the app
    init();
</script>
