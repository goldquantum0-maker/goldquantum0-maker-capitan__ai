<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>CAPITAN AI</title>

<style>
:root {
  --bg: #000000;
  --bg2: #050505;
  --bg3: #0a0a0a;
  --bg4: #111111;
  --bdr: #1a1a1a;
  --bdr2: #222222;
  --txt: #FFFFFF;
  --txt2: #CCCCCC;
  --txt3: #666666;
  --txt4: #444444;
  --accent: #4ADE80;
  --accent-hover: #22C55E;
  --accent-bg: rgba(74,222,128,0.12);
  --radius: 14px;
  --r-sm: 8px;
  --sidebar-w: 300px;
  --red: #EF4444;
  --amber: #F59E0B;
}
:root.light {
  --bg: #FFFFFF;
  --bg2: #F8F8FA;
  --bg3: #EFEFF2;
  --bdr: #E5E5E5;
  --txt: #000000;
  --txt2: #333333;
  --txt3: #666666;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--txt); font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; }
#app { display: flex; height: 100vh; position: relative; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--bdr);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  z-index: 100;
}
.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--bdr);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sb-logo {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-new-convo {
  margin: 16px;
  padding: 12px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--radius);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-new-convo:hover { background: var(--accent-hover); transform: scale(1.02); }
.sb-section-header {
  padding: 16px 20px 8px;
  font-size: 11px;
  color: var(--txt3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.chats-list {
  flex: 1;
  overflow-y: auto;
}
.sb-chat-item {
  padding: 12px 20px;
  cursor: pointer;
  border-bottom: 1px solid var(--bdr);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.15s;
}
.sb-chat-item:hover { background: var(--bg3); }
.sb-chat-item.active { background: var(--accent-bg); border-left: 2px solid var(--accent); }
.sb-chat-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
.sb-chat-del { background: none; border: none; color: var(--txt3); cursor: pointer; padding: 4px 8px; border-radius: 4px; opacity: 0; transition: opacity 0.2s; }
.sb-chat-item:hover .sb-chat-del { opacity: 1; }
.sb-chat-del:hover { color: var(--red); background: var(--bg4); }
.sidebar-footer {
  padding: 16px;
  text-align: center;
  font-size: 9px;
  color: var(--txt4);
  border-top: 1px solid var(--bdr);
}

/* Main Area */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.top-bar {
  position: absolute;
  top: 16px;
  right: 20px;
  z-index: 90;
  display: flex;
  gap: 12px;
  align-items: center;
}
.profile-btn {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}
.profile-btn:hover { border-color: var(--accent); transform: scale(1.05); }
.profile-indicator {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  position: absolute;
  bottom: 2px;
  right: 2px;
}
.profile-indicator.authenticated { background: var(--accent); box-shadow: 0 0 4px var(--accent); }
.profile-indicator.anonymous { background: var(--amber); }

.toggle-sidebar {
  position: fixed;
  top: 16px;
  left: 16px;
  background: var(--bg2);
  border: 1px solid var(--bdr);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 180;
}

.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
  padding: 0 20px;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 80px 0 20px;
  scroll-behavior: smooth;
}

/* Welcome Screen */
.welcome {
  text-align: center;
  padding: 40px;
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.welcome h1 {
  font-size: 42px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}
.welcome p {
  color: var(--txt3);
  font-size: 15px;
  margin-bottom: 32px;
}
.welcome-pills {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.wp-pill {
  padding: 12px 24px;
  border: 1px solid var(--bdr2);
  border-radius: 40px;
  cursor: pointer;
  background: var(--bg2);
  transition: all 0.2s;
  font-weight: 500;
}
.wp-pill:hover { border-color: var(--accent); background: var(--accent-bg); transform: translateY(-2px); }

/* Messages */
.msg { margin-bottom: 24px; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { display: flex; justify-content: flex-end; }
.msg-user-bubble {
  background: var(--accent-bg);
  border: 1px solid var(--accent);
  padding: 12px 18px;
  border-radius: 20px 20px 4px 20px;
  max-width: 80%;
}
.msg-ai-label {
  font-size: 10px;
  color: var(--txt3);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.msg-ai-body {
  line-height: 1.6;
  font-size: 14px;
}
.msg-ai-body pre {
  background: var(--bg3);
  padding: 14px;
  border-radius: 10px;
  overflow-x: auto;
  margin: 12px 0;
  border: 1px solid var(--bdr);
}
.msg-ai-body code {
  background: var(--bg3);
  padding: 2px 6px;
  border-radius: 5px;
  font-family: 'SF Mono', monospace;
  font-size: 12px;
}
.msg-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.msg:hover .msg-actions { opacity: 1; }
.msg-action {
  background: none;
  border: none;
  color: var(--txt3);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 14px;
  transition: all 0.15s;
}
.msg-action:hover { color: var(--txt); background: var(--bg3); }

/* Input Area */
.input-area { padding: 16px 0 24px; background: var(--bg); }
.input-wrap {
  display: flex;
  gap: 12px;
  background: var(--bg2);
  border: 1px solid var(--bdr2);
  border-radius: 32px;
  padding: 6px 6px 6px 20px;
  align-items: center;
  transition: all 0.2s;
}
.input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
.input-field {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--txt);
  font-size: 15px;
  padding: 12px 0;
}
.input-field::placeholder { color: var(--txt4); }
.send-btn {
  width: 44px;
  height: 44px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: transform 0.15s;
}
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.send-btn:hover:not(:disabled) { transform: scale(1.05); }

/* Streaming */
.stream-cursor {
  display: inline-block;
  width: 2px;
  height: 1.2em;
  background: var(--accent);
  animation: blink 1s step-end infinite;
  vertical-align: middle;
  margin-left: 2px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.token-fade { animation: tokenFade 0.05s ease; }
@keyframes tokenFade { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg2);
  border: 1px solid var(--bdr);
  color: var(--txt);
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 13px;
  z-index: 1000;
  backdrop-filter: blur(10px);
  animation: toastIn 0.2s ease;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* Modals */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(12px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--bdr2);
  border-radius: var(--radius);
  padding: 28px;
  width: 420px;
  max-width: 90%;
  max-height: 85vh;
  overflow-y: auto;
  animation: modalIn 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal h2 { margin-bottom: 8px; font-size: 22px; font-weight: 700; }
.modal p { margin-bottom: 20px; color: var(--txt3); font-size: 13px; }
.modal input, .modal textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--bdr);
  color: var(--txt);
  padding: 12px 14px;
  border-radius: 10px;
  margin-bottom: 12px;
  font-size: 14px;
}
.modal-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}
.modal-btn:hover { opacity: 0.9; transform: scale(1.01); }
.modal-btn.sec { background: transparent; border: 1px solid var(--bdr); color: var(--txt); }
.telegram-login-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #26A5E4;
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 40px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  transition: all 0.2s;
}
.telegram-login-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* Tier Cards */
.tier-card {
  border: 1px solid var(--bdr2);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.tier-card:hover { border-color: var(--accent); background: var(--accent-bg); transform: translateX(2px); }
.tier-card.selected { border-color: var(--accent); background: var(--accent-bg); }
.tier-name { font-weight: 700; font-size: 18px; }
.tier-price { font-size: 26px; font-weight: 700; margin: 8px 0; }
.tier-price span { font-size: 12px; font-weight: 400; color: var(--txt3); }
.wallet-box {
  background: var(--bg3);
  padding: 14px;
  border-radius: 10px;
  text-align: center;
  font-family: monospace;
  font-size: 12px;
  margin-bottom: 12px;
  cursor: pointer;
  word-break: break-all;
}
.profile-section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--bdr); }
.profile-avatar {
  width: 60px;
  height: 60px;
  background: var(--accent-bg);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 12px;
}
.project-item {
  padding: 12px;
  border-bottom: 1px solid var(--bdr);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.thinking { display: flex; align-items: center; gap: 8px; padding: 8px 0; color: var(--txt3); }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -300px; top: 0; bottom: 0; z-index: 200; }
  .sidebar.open { left: 0; }
  .toggle-sidebar { display: flex; }
  .top-bar { right: 16px; }
  .chat-messages { padding-top: 70px; }
  .chat-container { padding: 0 12px; }
  .welcome h1 { font-size: 28px; }
}
</style>
</head>

<script>
// Configuration
const API_URL = 'https://capitan-ai-jxu8.onrender.com';
const TELEGRAM_BOT_ID = 'capitan_ai_bot';
let currentUser = null;
let authToken = localStorage.getItem('auth_token');
let anonymousSession = localStorage.getItem('anonymous_session');
let S = { loading: false, chats: [], activeChat: null, messages: [], draft: '', streamAbort: null, sidebarOpen: window.innerWidth > 768 };

// API Class
class Api {
  async request(path, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
    else if (anonymousSession) headers['Authorization'] = `Bearer ${anonymousSession}`;
    const res = await fetch(`${API_URL}${path}`, { ...options, headers });
    if (res.status === 401 && authToken) {
      authToken = null; localStorage.removeItem('auth_token'); currentUser = null;
      toast('Session expired. Please sign in again.');
    }
    if (!res.ok) throw new Error(`Error ${res.status}`);
    return res.json();
  }
  async createAnonymousSession() { return this.request('/api/session'); }
  async verifyTelegram(data) { return this.request('/api/auth/telegram/verify', { method: 'POST', body: JSON.stringify({ data }) }); }
  async getMe() { return this.request('/api/auth/me'); }
  async logout() { return this.request('/api/auth/logout', { method: 'POST' }); }
  async updateProfile(name) { return this.request('/api/auth/update-profile', { method: 'POST', body: JSON.stringify({ name }) }); }
  async deleteAccount() { return this.request('/api/auth/delete-account', { method: 'DELETE' }); }
  async getChats() { return this.request('/api/chats'); }
  async sendMessage(messages, chatId) { return this.request('/api/chat', { method: 'POST', body: JSON.stringify({ messages, chat_id: chatId }) }); }
  async deleteChat(id) { return this.request(`/api/chats/${id}`, { method: 'DELETE' }); }
  async getProjects() { return this.request('/api/projects'); }
  async createProject(name, desc) { return this.request('/api/projects', { method: 'POST', body: JSON.stringify({ name, description: desc }) }); }
  async deleteProject(id) { return this.request(`/api/projects/${id}`, { method: 'DELETE' }); }
  async getPaymentConfig() { return this.request('/api/payment-config'); }
  async upgrade(tier, txid) { return this.request('/api/upgrade', { method: 'POST', body: JSON.stringify({ tier, txid, currency: 'BTC' }) }); }
  async createWorkspace(name, code) { return this.request('/api/workspace/create', { method: 'POST', body: JSON.stringify({ name, room_code: code }) }); }
  async joinWorkspace(code) { return this.request('/api/workspace/join', { method: 'POST', body: JSON.stringify({ room_code: code }) }); }
}
const api = new Api();

// Token Streamer
class TokenStreamer {
  constructor(content, container, delay = 8) {
    this.content = content; this.container = container; this.delay = delay;
    this.index = 0; this.tokens = this.tokenize(content); this.running = false;
  }
  tokenize(t) { const r = []; const rg = /([^\s]+|\s+)/g; let m; while ((m = rg.exec(t)) !== null) r.push(m[0]); return r; }
  start() { this.running = true; if (S.streamAbort) S.streamAbort(); S.streamAbort = () => this.stop(); this.next(); }
  next() {
    if (!this.running || this.index >= this.tokens.length) { this.finish(); return; }
    const s = document.createElement('span'); s.className = 'token-fade'; s.textContent = this.tokens[this.index];
    this.container.appendChild(s); this.index++; this.scroll(); setTimeout(() => this.next(), this.delay);
  }
  stop() { this.running = false; if (this.index < this.tokens.length) this.container.appendChild(document.createTextNode(this.tokens.slice(this.index).join(''))); this.finish(); }
  finish() { const c = this.container.querySelector('.stream-cursor'); if (c) c.remove(); this.container.innerHTML = this.formatMD(this.content); S.streamAbort = null; this.scroll(); }
  scroll() { const m = document.getElementById('chatMsgs'); if (m) m.scrollTop = m.scrollHeight; }
  formatMD(t) {
    if (!t) return '';
    t = t.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) => `<pre><code>${this.escape(c.trim())}</code></pre>`);
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/\n/g, '<br>');
    return t;
  }
  escape(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }

// Telegram Login (inside profile)
window.onTelegramAuth = async function(user) {
  try {
    const res = await api.verifyTelegram(user);
    authToken = res.token;
    currentUser = res.user;
    localStorage.setItem('auth_token', authToken);
    localStorage.removeItem('anonymous_session');
    await loadChats();
    render();
    document.getElementById('profileModal').classList.remove('open');
    toast(`Welcome ${currentUser.name || currentUser.telegram_username || 'User'}! Your data is now saved.`);
  } catch(e) { toast('Login failed: ' + e.message); }
};

// Profile Modal
async function showProfileModal() {
  const content = document.getElementById('profileContent');
  
  if (currentUser) {
    const tierInfo = { free: 'Free', plus: 'Plus', pro: 'Pro', pro_max: 'Pro Max', founder: 'Founder' };
    content.innerHTML = `
      <div class="profile-avatar">👤</div>
      <div class="profile-section">
        <div><label style="color:var(--txt3);font-size:11px">Telegram</label><div style="font-weight:600">@${escapeHtml(currentUser.telegram_username || 'unknown')}</div></div>
        <div><label style="color:var(--txt3);font-size:11px;margin-top:12px">Name</label><input type="text" id="profileName" value="${escapeHtml(currentUser.name || '')}" style="width:100%;background:var(--bg3);border:1px solid var(--bdr);padding:10px;border-radius:8px;margin-top:4px"></div>
        <div><label style="color:var(--txt3);font-size:11px;margin-top:12px">Plan</label><div style="color:var(--accent);font-weight:600;font-size:16px">${tierInfo[currentUser.tier]}</div></div>
        <div><label style="color:var(--txt3);font-size:11px;margin-top:12px">Member Since</label><div>${new Date(currentUser.created_at).toLocaleDateString()}</div></div>
        <button class="modal-btn" id="saveProfileBtn" style="margin-top:16px">Save Changes</button>
      </div>
      <div class="profile-section">
        <button class="modal-btn" id="upgradeBtn" style="background:var(--accent);color:#000">⚡ Upgrade Plan</button>
        <button class="modal-btn sec" id="projectsBtn">📁 My Projects</button>
        <button class="modal-btn sec" id="workspaceBtn">🗂️ Work Area</button>
        <button class="modal-btn sec" id="supportBtn">🆘 Support</button>
        <button class="modal-btn sec" id="logoutBtn" style="color:var(--red)">🚪 Logout</button>
        <button class="modal-btn sec" id="deleteAccountBtn" style="color:var(--red);border-color:var(--red)">🗑️ Delete Account</button>
      </div>
    `;
    document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
      const name = document.getElementById('profileName').value;
      await api.updateProfile(name); currentUser.name = name; toast('Profile updated');
    });
    document.getElementById('upgradeBtn')?.addEventListener('click', () => { document.getElementById('profileModal').classList.remove('open'); showUpgradeModal(); });
    document.getElementById('projectsBtn')?.addEventListener('click', () => { document.getElementById('profileModal').classList.remove('open'); showProjectsModal(); });
    document.getElementById('workspaceBtn')?.addEventListener('click', () => { document.getElementById('profileModal').classList.remove('open'); showWorkspaceModal(); });
    document.getElementById('supportBtn')?.addEventListener('click', () => { document.getElementById('profileModal').classList.remove('open'); document.getElementById('supportModal').classList.add('open'); });
    document.getElementById('logoutBtn')?.addEventListener('click', async () => { await api.logout(); authToken = null; currentUser = null; localStorage.clear(); window.location.reload(); });
    document.getElementById('deleteAccountBtn')?.addEventListener('click', async () => { if (confirm('Delete account permanently? All data will be lost.')) { await api.deleteAccount(); authToken = null; currentUser = null; localStorage.clear(); window.location.reload(); } });
  } else {
    content.innerHTML = `
      <div class="profile-avatar">👤</div>
      <div class="profile-section">
        <p style="text-align:center;margin-bottom:16px">Sign in with Telegram to save your chats, projects, and workspaces across devices.</p>
        <div id="telegramLoginWidget"></div>
        <button class="modal-btn sec" id="skipLoginBtn" style="margin-top:12px">Continue as Guest</button>
      </div>
    `;
    // Initialize Telegram widget
    const widget = document.getElementById('telegramLoginWidget');
    if (widget) {
      const script = document.createElement('script');
      script.src = 'https://telegram.org/js/telegram-widget.js?22';
      script.setAttribute('data-telegram-login', TELEGRAM_BOT_ID);
      script.setAttribute('data-size', 'large');
      script.setAttribute('data-radius', '12');
      script.setAttribute('data-request-access', 'write');
      script.setAttribute('data-onauth', 'onTelegramAuth(user)');
      script.async = true;
      widget.innerHTML = '';
      widget.appendChild(script);
    }
    document.getElementById('skipLoginBtn')?.addEventListener('click', () => {
      document.getElementById('profileModal').classList.remove('open');
    });
  }
  document.getElementById('profileModal').classList.add('open');
}

// Upgrade Modal
async function showUpgradeModal() {
  const config = await api.getPaymentConfig();
  document.getElementById('tierList').innerHTML = `
    <div class="tier-card" onclick="selectTier('plus')"><div class="tier-name">🔶 Plus</div><div class="tier-price">$8<span>/mo</span></div><div>✓ 50 messages/day</div><div>✓ Groq Llama 3.3 70B</div><div>✓ Web search</div><div>✓ File uploads</div></div>
    <div class="tier-card" onclick="selectTier('pro')"><div class="tier-name">💎 Pro</div><div class="tier-price">$17<span>/mo</span></div><div>✓ 150 messages/day</div><div>✓ Claude 3.5 Sonnet</div><div>✓ Live markets</div><div>✓ Projects</div></div>
    <div class="tier-card" onclick="selectTier('pro_max')"><div class="tier-name">👑 Pro Max</div><div class="tier-price">$30<span>/mo</span></div><div>✓ Unlimited messages</div><div>✓ GPT-4o + Claude Ensemble</div><div>✓ Advanced reasoning</div><div>✓ All features</div></div>

  event.target.closest('.tier-card').classList.add('selected');
  const wallets = { BTC: 'bc1qrv6yr6e0mat96rvrc8smdf9rvu9rlp8xuk8new', ETH: '0x5bd39ad3e8b1cb01e7385958160fd9b2675d02d1' };
  document.getElementById('walletAddr').innerHTML = `Send BTC to: ${wallets.BTC}`;
  document.getElementById('walletAddr').onclick = () => { navigator.clipboard.writeText(wallets.BTC); toast('Address copied'); };
  document.getElementById('paySection').style.display = 'block';
};

document.getElementById('verifyUpgradeBtn')?.addEventListener('click', async () => {
  const txid = document.getElementById('txidInput').value;
  if (!window.selectedTier || !txid) { toast('Select tier and enter TXID'); return; }
  try {
    await api.upgrade(window.selectedTier, txid);
    toast('Upgrade successful!');
    document.getElementById('upgradeModal').classList.remove('open');
    if (currentUser) { currentUser.tier = window.selectedTier; }
  } catch(e) { toast(e.message); }
});

// Projects Modal
async function showProjectsModal() {
  if (!currentUser) { toast('Please sign in with Telegram to use projects'); showProfileModal(); return; }
  const projects = await api.getProjects();
  document.getElementById('projectsList').innerHTML = projects.projects.map(p => `
    <div class="project-item"><div><strong>${escapeHtml(p.name)}</strong><br><small>${escapeHtml(p.description || '')}</small></div><button onclick="deleteProject('${p.id}')" style="background:none;border:none;color:var(--red);cursor:pointer">🗑️</button></div>
  `).join('') || '<div style="text-align:center;color:var(--txt3);padding:20px">No projects yet. Create your first project!</div>';
  document.getElementById('projectsModal').classList.add('open');
}

document.getElementById('createProjectBtn')?.addEventListener('click', async () => {
  const name = document.getElementById('projectName').value;
  if (!name) { toast('Project name required'); return; }
  await api.createProject(name, document.getElementById('projectDesc').value);
  document.getElementById('projectName').value = '';
  document.getElementById('projectDesc').value = '';
  showProjectsModal();
  toast('Project created!');
});

window.deleteProject = async (id) => { if (confirm('Delete this project?')) { await api.deleteProject(id); showProjectsModal(); toast('Project deleted'); } };

// Workspace Modal
async function showWorkspaceModal() {
  document.getElementById('workspaceModal').classList.add('open');
}
document.getElementById('createWorkspaceBtn')?.addEventListener('click', async () => {
  if (!currentUser) { toast('Please sign in with Telegram to create workspaces'); showProfileModal(); return; }
  const code = 'CAP-' + Math.random().toString(36).substring(2, 8).toUpperCase();
  await api.createWorkspace('My Workspace', code);
  toast(`Room created! Code: ${code}`);
});
document.getElementById('joinWorkspaceBtn')?.addEventListener('click', async () => {
  const code = document.getElementById('workspaceCode').value.trim().toUpperCase();
  if (!code) { toast('Enter room code'); return; }
  await api.joinWorkspace(code);
  toast('Joined workspace!');
});

// Chat Functions
async function loadChats() {
  try { const res = await api.getChats(); S.chats = res.chats || []; renderSidebar(); } catch(e) { console.error(e); }
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const msg = input?.value.trim();
  if (!msg || S.loading) return;
  input.value = ''; S.draft = ''; S.loading = true; render();
  S.messages.push({ role: 'user', content: msg });
  const aiIdx = S.messages.length;
  S.messages.push({ role: 'assistant', content: '' });
  render();
  const target = document.getElementById(`msgBody${aiIdx}`);
  if (target) { target.innerHTML = '<span class="stream-cursor"></span>'; scrollChat(); }
  try {
    const res = await api.sendMessage(S.messages.slice(0, -1), S.activeChat);
    S.activeChat = res.chat_id;
    S.messages[aiIdx].content = res.content;
    await loadChats();
    if (target) {
      target.innerHTML = '';
      const streamer = new TokenStreamer(res.content, target, 8);
      streamer.start();
      await new Promise(resolve => { const check = setInterval(() => { if (!streamer.running) { clearInterval(check); resolve(); } }, 50); });
    }
    render(); saveMessages();
  } catch(e) { S.messages[aiIdx].content = `Error: ${e.message}`; render(); toast(e.message); }
  finally { S.loading = false; render(); if (S.streamAbort) S.streamAbort(); }
}

function render() {
  const app = document.getElementById('app');
  const isMobile = window.innerWidth <= 768;
  const isAuthenticated = !!currentUser;
  app.innerHTML = `
    <aside class="sidebar ${isMobile && S.sidebarOpen ? 'open' : ''}" id="sidebar">
      <div class="sidebar-header">
        <div class="sb-logo" onclick="handleLogoClick()">⚡ CAPITAN AI</div>
      </div>
      <button class="btn-new-convo" onclick="newChat()">+ New Conversation</button>
      <div class="sb-section-header">Recent Chats</div>
      <div class="chats-list" id="chatsList"></div>
      <div class="sidebar-footer">CLOSEAI Technologies © 2026</div>
    </aside>
    <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
    <main class="main">
      <div class="top-bar">
        <button class="profile-btn" onclick="showProfileModal()">
          ${isAuthenticated ? '👤' : '🔓'}
          <span class="profile-indicator ${isAuthenticated ? 'authenticated' : 'anonymous'}"></span>
        </button>
      </div>
      <div class="chat-container">
        <div class="chat-messages" id="chatMsgs">${renderMessages()}</div>
        <div class="input-area">
          <div class="input-wrap">
            <input type="text" class="input-field" id="msgInput" placeholder="Ask anything..." value="${escapeHtml(S.draft)}" onkeypress="if(event.key==='Enter') sendMsg()" ${S.loading ? 'disabled' : ''}>
            <button class="send-btn" onclick="sendMsg()" ${S.loading ? 'disabled' : ''}>➤</button>
          </div>
        </div>
      </div>
    </main>
  `;
  renderSidebar();
  if (S.messages.length) setTimeout(() => { const m = document.getElementById('chatMsgs'); if (m) m.scrollTop = m.scrollHeight; }, 100);
}

function renderSidebar() {
  const el = document.getElementById('chatsList');
  if (!el) return;
  if (!S.chats.length) { el.innerHTML = '<div style="padding:20px;color:var(--txt3);text-align:center">No conversations yet.<br>Start a new chat!</div>'; return; }
  el.innerHTML = S.chats.map(c => `<div class="sb-chat-item ${S.activeChat === c.id ? 'active' : ''}" onclick="loadChat('${c.id}')"><span>${escapeHtml(c.title || 'Chat')}</span><button class="sb-chat-del" onclick="event.stopPropagation(); deleteChat('${c.id}')">✕</button></div>`).join('');
}

function renderMessages() {
  if (!S.messages.length) {
    return `<div class="welcome"><h1>CAPITAN AI</h1><p>Your enterprise intelligence platform</p><div class="welcome-pills"><div class="wp-pill" onclick="quickSend('What is CAPITAN AI?')">🤖 About CAPITAN</div><div class="wp-pill" onclick="quickSend('Write Python code for a trading bot')">💻 Trading Bot</div><div class="wp-pill" onclick="quickSend('Explain DCF valuation')">📊 Finance</div><div class="wp-pill" onclick="quickSend('What are current market trends?')">📈 Markets</div></div></div>`;
  }
  return S.messages.map((m, i) => m.role === 'user' ? `<div class="msg user"><div class="msg-user-bubble">${escapeHtml(m.content)}</div></div>` : `<div class="msg"><div class="msg-ai-label">CAPITAN AI</div><div class="msg-ai-body" id="msgBody${i}">${m.content ? m.content : ''}</div><div class="msg-actions"><button class="msg-action" onclick="copyText('${escapeHtml(m.content)}')">📋</button><button class="msg-action" onclick="regen()">🔄</button><button class="msg-action" onclick="shareMsg('${escapeHtml(m.content)}')">📤</button></div></div>`).join('');
}

async function loadChat(id) { S.activeChat = id; S.messages = []; render(); saveMessages(); }
async function deleteChat(id) { if (!confirm('Delete this chat?')) return; await api.deleteChat(id); S.chats = S.chats.filter(c => c.id !== id); if (S.activeChat === id) newChat(); renderSidebar(); toast('Chat deleted'); }
function newChat() { if (S.streamAbort) S.streamAbort(); S.activeChat = null; S.messages = []; render(); saveMessages(); }
function quickSend(msg) { const i = document.getElementById('msgInput'); if (i) { i.value = msg; sendMsg(); } }
function regen() { if (S.messages.length >= 2) { S.messages.pop(); sendMsg(); } }
function copyText(t) { navigator.clipboard.writeText(t); toast('Copied!'); }
function shareMsg(t) { if (navigator.share) navigator.share({ text: t }).catch(()=>{}); else copyText(t); }
function scrollChat() { const m = document.getElementById('chatMsgs'); if (m) m.scrollTop = m.scrollHeight; }
function saveMessages() { if (S.activeChat && S.messages.length) localStorage.setItem(`chat_${S.activeChat}`, JSON.stringify(S.messages)); }
function handleLogoClick() { toast(`CAPITAN AI v27.0 - ${currentUser ? currentUser.tier?.toUpperCase() || 'Guest' : 'Guest'} mode`); }
function toggleSidebar() { S.sidebarOpen = !S.sidebarOpen; const sb = document.getElementById('sidebar'); if (sb) sb.classList.toggle('open', S.sidebarOpen); }

// Modal close handlers
document.getElementById('closeProfileModal')?.addEventListener('click', () => document.getElementById('profileModal').classList.remove('open'));
document.getElementById('closeUpgradeModal')?.addEventListener('click', () => document.getElementById('upgradeModal').classList.remove('open'));
document.getElementById('closeProjectsModal')?.addEventListener('click', () => document.getElementById('projectsModal').classList.remove('open'));
document.getElementById('closeWorkspaceModal')?.addEventListener('click', () => document.getElementById('workspaceModal').classList.remove('open'));
document.getElementById('closeSupportModal')?.addEventListener('click', () => document.getElementById('supportModal').classList.remove('open'));

// Initialize - First, create anonymous session
async function init() {
  if (authToken) {
    try { 
      currentUser = await api.getMe(); 
      await loadChats(); 
      render(); 
    } catch(e) { 
      authToken = null; localStorage.removeItem('auth_token');
      await initAnonymous();
    }
  } else {
    await initAnonymous();
  }
}

async function initAnonymous() {
  try {
    const session = await api.createAnonymousSession();
    anonymousSession = session.token;
    localStorage.setItem('anonymous_session', anonymousSession);
    await loadChats();
    render();
  } catch(e) { console.error('Anonymous session failed:', e); }
}

init();
window.addEventListener('resize', () => { if (window.innerWidth > 768) { const sb = document.getElementById('sidebar'); if (sb) sb.classList.remove('open'); } });
</script>
