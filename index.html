<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b1622" />
  <title>CAPITAN AI — Enterprise Intelligence</title>
  <link rel="manifest" href="https://capitanai.billionaireman35.workers.dev/manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7/dist/ethers.umd.min.js"></script>

  <style>
    :root {
      --bg-primary: #0b1622;
      --bg-secondary: #0f1a2a;
      --bg-tertiary: #1a2a3a;
      --surface: #0f1a2a;
      --surface-float: rgba(15, 26, 42, 0.85);
      --border: #1e2d3d;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --accent-cyan: #00d4ff;
      --accent-violet: #7c3aed;
      --accent-glow-cyan: rgba(0, 212, 255, 0.15);
      --accent-glow-violet: rgba(124, 58, 237, 0.15);
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
      --glass-bg: rgba(15, 26, 42, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      --shadow-glow: 0 0 30px rgba(0, 212, 255, 0.1);
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-size-base: 13px;
      --line-height-base: 1.55;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --duration-fast: 150ms;
      --duration-med: 300ms;
      --duration-slow: 500ms;
    }

    body.light {
      --bg-primary: #f8fafc;
      --bg-secondary: #f1f5f9;
      --bg-tertiary: #e2e8f0;
      --surface: #ffffff;
      --surface-float: rgba(255, 255, 255, 0.85);
      --border: #cbd5e1;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-tertiary: #64748b;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(0, 0, 0, 0.06);
    }

    body {
      margin: 0; padding: 0; height: 100vh; overflow: hidden;
      font-family: var(--font-family); font-size: var(--font-size-base);
      line-height: var(--line-height-base); background: var(--bg-primary);
      color: var(--text-primary);
      transition: background var(--duration-med) var(--ease-smooth), color var(--duration-med) var(--ease-smooth);
    }

    capitan-app-shell { display: block; height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <capitan-app-shell></capitan-app-shell>

  <script>
    // ==================== STORE ====================
    class Store {
      constructor(initialState = {}) {
        this._state = JSON.parse(JSON.stringify(initialState));
        this._subscribers = new Map();
        this._globalSubscribers = new Set();
      }
      get(path) {
        const keys = path.split('.');
        let val = this._state;
        for (const key of keys) {
          if (val == null) return undefined;
          val = val[key];
        }
        return val;
      }
      set(path, value) {
        const keys = path.split('.');
        let obj = this._state;
        for (let i = 0; i < keys.length - 1; i++) {
          if (typeof obj[keys[i]] !== 'object' || obj[keys[i]] === null) obj[keys[i]] = {};
          obj = obj[keys[i]];
        }
        const oldValue = obj[keys[keys.length - 1]];
        if (oldValue !== value) {
          obj[keys[keys.length - 1]] = value;
          this._notify(path, value, oldValue);
        }
      }
      subscribe(pathOrCallback, callback) {
        if (typeof pathOrCallback === 'function') {
          this._globalSubscribers.add(pathOrCallback);
          return () => this._globalSubscribers.delete(pathOrCallback);
        }
        if (!this._subscribers.has(pathOrCallback)) {
          this._subscribers.set(pathOrCallback, new Set());
        }
        this._subscribers.get(pathOrCallback).add(callback);
        return () => {
          const set = this._subscribers.get(pathOrCallback);
          if (set) set.delete(callback);
        };
      }
      _notify(path, newValue, oldValue) {
        const subs = this._subscribers.get(path);
        if (subs) {
          subs.forEach(cb => cb(newValue, oldValue, path));
        }
        const parts = path.split('.');
        for (let i = parts.length - 1; i > 0; i--) {
          const parentPath = parts.slice(0, i).join('.');
          const parentSubs = this._subscribers.get(parentPath);
          if (parentSubs) {
            const parentValue = this.get(parentPath);
            parentSubs.forEach(cb => cb(parentValue, oldValue, parentPath));
          }
        }
        this._globalSubscribers.forEach(cb => cb(path, newValue, oldValue));
      }
      transaction(fn) { fn(this); }
      hydrate() {
        const token = localStorage.getItem('ct');
        if (token) {
          this.set('auth.token', token);
          const user = localStorage.getItem('cu');
          if (user) {
            try { this.set('auth.user', JSON.parse(user)); } catch(e){}
          }
        }
        const theme = localStorage.getItem('theme') || 'dark';
        this.set('ui.theme', theme);
      }
    }

    const initialState = {
      auth: { token: null, user: null, isAdmin: false, isGuest: false, loading: false, error: null },
      ui: { theme: 'dark', sidebarOpen: false, activeView: 'chat', openDrawer: null, modals: [], toasts: [] },
      tokens: { balance: 0, tier: 'free', rate: 0, loading: false },
      wallet: {
        address: localStorage.getItem('os_address') || null,
        network: parseInt(localStorage.getItem('network') || '137'),
        balances: [],
        activity: [],
        chartData: [],
        chartTimeframe: '1h',
        activityPage: 0, activityHasMore: true,
        loadingBalances: false, loadingActivity: false,
        markets: { crypto: [], stocks: [], commodities: [] },
        totalUsd: 0, changePercent: 0,
      },
      chat: { messages: [], currentChatId: null, sending: false, history: [], loadingHistory: false },
      portfolio: { items: [], loading: false },
      research: { topics: [], projects: [], loading: false },
      developer: { keys: [], webhooks: [], loadingKeys: false, loadingWebhooks: false },
      workspaces: { list: [], activeRoomId: null, messages: {}, loadingList: false, loadingMessages: false },
      community: { leaderboard: [], badges: [], loading: false },
      notifications: { items: [], unreadCount: 0, loading: false },
      admin: { dashboardData: null, loading: false },
    };

    const store = new Store(initialState);
    store.hydrate();

    // ==================== API ====================
    const BASE_URL = 'https://capitan-ai-jxu8.onrender.com';
    class ApiError extends Error {
      constructor(message, status) { super(message); this.status = status; }
    }

    async function request(endpoint, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      const token = store.get('auth.token');
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const config = { ...options, headers };
      if (config.body && typeof config.body === 'object' && !(config.body instanceof FormData)) {
        config.body = JSON.stringify(config.body);
      }
      const res = await fetch(BASE_URL + endpoint, config);
      if (res.status === 401) {
        store.set('auth.token', null);
        store.set('auth.user', null);
        store.set('auth.isAdmin', false);
        localStorage.removeItem('ct');
        localStorage.removeItem('cu');
        throw new ApiError('Session expired', 401);
      }
      if (!res.ok) {
        let message = 'Request failed';
        try {
          const errorBody = await res.json();
          message = errorBody.detail || errorBody.message || message;
        } catch(e) {
          const text = await res.text();
          if (text) message = text;
        }
        throw new ApiError(message, res.status);
      }
      const contentType = res.headers.get('content-type');
      if (contentType && contentType.includes('application/json')) return res.json();
      return res.text();
    }

    const api = {
      get: (endpoint) => request(endpoint, { method: 'GET' }),
      post: (endpoint, body) => request(endpoint, { method: 'POST', body }),
      put: (endpoint, body) => request(endpoint, { method: 'PUT', body }),
      delete: (endpoint) => request(endpoint, { method: 'DELETE' }),
    };

    // ==================== BASE ELEMENT ====================
    class CapitanElement extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        this._unsubscribeFunctions = [];
      }
      connectedCallback() {
        this._unsubscribeFunctions = this.subscribe();
        this.render();
      }
      disconnectedCallback() {
        this._unsubscribeFunctions.forEach(fn => fn());
        this._unsubscribeFunctions = [];
      }
      subscribe() { return []; }
      render() {}
      observe(path, callback) { return store.subscribe(path, callback); }
      emit(name, detail) {
        this.dispatchEvent(new CustomEvent(name, { bubbles: true, composed: true, detail }));
      }
      toast(msg, type = 'info') {
        const id = Date.now();
        store.transaction(s => {
          const toasts = s.get('ui.toasts') || [];
          s.set('ui.toasts', [...toasts, { id, msg, type }]);
        });
        setTimeout(() => {
          store.transaction(s => {
            const toasts = s.get('ui.toasts');
            s.set('ui.toasts', toasts.filter(t => t.id !== id));
          });
        }, 3000);
      }
      static define(tag) {
        if (!customElements.get(tag)) customElements.define(tag, this);
      }
    }

    // ==================== TOAST CONTAINER ====================
    class ToastContainer extends CapitanElement {
      subscribe() {
        return [this.observe('ui.toasts', () => this.render())];
      }
      render() {
        const toasts = store.get('ui.toasts') || [];
        if (toasts.length === 0) { this.shadowRoot.innerHTML = ''; return; }
        const toastList = toasts.map(t => `
          <div class="toast toast-${t.type}">${t.msg}</div>
        `).join('');
        this.shadowRoot.innerHTML = `
          <style>
            .toast-container { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; }
            .toast { background:var(--surface-float); backdrop-filter:blur(10px); color:var(--text-primary); padding:10px 20px; border-radius:40px; font-size:13px; box-shadow:var(--shadow-lg); border:1px solid var(--border); animation:slideUp 0.3s var(--ease-spring); }
            .toast-success { border-left:4px solid var(--success); }
            .toast-error { border-left:4px solid var(--danger); }
            @keyframes slideUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
          </style>
          <div class="toast-container">${toastList}</div>
        `;
      }
    }
    ToastContainer.define('capitan-toast-container');

    // ==================== AUTH GATE ====================
    class AuthGate extends CapitanElement {
      constructor() {
        super();
        this.tab = 'login';
      }
      subscribe() {
        return [
          this.observe('auth.loading', () => this.render()),
          this.observe('auth.error', () => this.render()),
        ];
      }
      render() {
        const { loading, error } = store.get('auth');
        const tab = this.tab;
        this.shadowRoot.innerHTML = `
          <style>
            :host { display:flex; align-items:center; justify-content:center; height:100%; background:var(--bg-primary); }
            .auth-card { width:100%; max-width:400px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); padding:32px 24px; box-shadow:var(--shadow-lg); }
            h1 { font-size:26px; font-weight:700; background:linear-gradient(90deg,var(--accent-cyan),var(--accent-violet)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:0 0 4px; }
            .sub { color:var(--text-secondary); margin-bottom:24px; font-size:14px; }
            .tabs { display:flex; border-bottom:2px solid var(--border); margin-bottom:24px; }
            .tab { flex:1; text-align:center; padding:10px 0; font-weight:600; font-size:14px; color:var(--text-tertiary); cursor:pointer; border-bottom:2px solid transparent; transition:all var(--duration-fast); }
            .tab.active { color:var(--accent-cyan); border-bottom-color:var(--accent-cyan); }
            input { width:100%; padding:12px 16px; margin-bottom:12px; border:1.5px solid var(--border); border-radius:var(--radius-md); background:var(--bg-secondary); color:var(--text-primary); font-size:14px; font-family:inherit; }
            input:focus { outline:none; border-color:var(--accent-cyan); box-shadow:0 0 0 3px var(--accent-glow-cyan); }
            .btn { width:100%; padding:14px; border:none; border-radius:var(--radius-lg); background:linear-gradient(135deg,var(--accent-cyan),var(--accent-violet)); color:white; font-weight:700; font-size:15px; cursor:pointer; box-shadow:0 4px 14px rgba(0,212,255,0.25); }
            .btn:disabled { opacity:0.6; }
            .error { color:var(--danger); font-size:12px; margin-bottom:8px; }
            .switch { text-align:center; margin-top:14px; font-size:13px; color:var(--text-secondary); }
            .switch a { color:var(--accent-cyan); cursor:pointer; font-weight:600; text-decoration:none; }
          </style>
          <div class="auth-card">
            <h1>CAPITAN AI</h1>
            <div class="sub">Enterprise Intelligence</div>
            <div class="tabs">
              <div class="tab ${tab==='login'?'active':''}" data-tab="login">Sign In</div>
              <div class="tab ${tab==='signup'?'active':''}" data-tab="signup">Create Account</div>
            </div>
            ${tab === 'login' ? this._renderLogin() : this._renderSignup()}
            <div class="switch"><a href="mailto:support@capitan.ai">Contact Support</a></div>
          </div>
        `;
        this._attachEventListeners();
      }
      _renderLogin() {
        return `
          <input type="email" id="loginEmail" placeholder="Email" />
          <input type="password" id="loginPassword" placeholder="Password" />
          <div class="error" id="loginError">${store.get('auth.error') || ''}</div>
          <button class="btn" id="loginBtn" ${store.get('auth.loading') ? 'disabled' : ''}>Sign In</button>
        `;
      }
      _renderSignup() {
        return `
          <input type="text" id="signupName" placeholder="Full Name (optional)" />
          <input type="email" id="signupEmail" placeholder="Email" />
          <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" />
          <div class="error" id="signupError"></div>
          <button class="btn" id="signupBtn">Create Account</button>
          <div class="switch">Already have an account? <a id="switchToLogin">Sign In</a></div>
        `;
      }
      _attachEventListeners() {
        setTimeout(() => {
          this.shadowRoot.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
            this.tab = t.dataset.tab;
            this.render();
          }));
          if (this.tab === 'login') {
            this.shadowRoot.getElementById('loginBtn')?.addEventListener('click', () => this._handleLogin());
            this.shadowRoot.getElementById('loginPassword')?.addEventListener('keydown', e => { if (e.key === 'Enter') this._handleLogin(); });
          } else {
            this.shadowRoot.getElementById('signupBtn')?.addEventListener('click', () => this._handleSignup());
            this.shadowRoot.getElementById('switchToLogin')?.addEventListener('click', () => { this.tab = 'login'; this.render(); });
          }
        }, 0);
      }
      async _handleLogin() {
        const email = this.shadowRoot.getElementById('loginEmail')?.value.trim();
        const password = this.shadowRoot.getElementById('loginPassword')?.value;
        if (!email || !password) { store.set('auth.error', 'Email and password required'); return; }
        store.set('auth.loading', true);
        try {
          const data = await api.post('/api/auth/login', { email, password });
          store.set('auth.token', data.token);
          store.set('auth.user', data.user);
          store.set('auth.isAdmin', data.user.is_admin || false);
          localStorage.setItem('ct', data.token);
          localStorage.setItem('cu', JSON.stringify(data.user));
          this.toast('Welcome back, ' + data.user.name, 'success');
        } catch (e) {
          store.set('auth.error', e.message);
        } finally {
          store.set('auth.loading', false);
        }
      }
      async _handleSignup() {
        const name = this.shadowRoot.getElementById('signupName')?.value.trim();
        const email = this.shadowRoot.getElementById('signupEmail')?.value.trim();
        const password = this.shadowRoot.getElementById('signupPassword')?.value;
        if (!email || !password) { store.set('auth.error', 'Email and password required'); return; }
        if (password.length < 6) { store.set('auth.error', 'Password min 6 characters'); return; }
        store.set('auth.loading', true);
        try {
          const data = await api.post('/api/auth/register', { email, password, name });
          store.set('auth.token', data.token);
          store.set('auth.user', data.user);
          store.set('auth.isAdmin', false);
          localStorage.setItem('ct', data.token);
          localStorage.setItem('cu', JSON.stringify(data.user));
          await api.post('/api/token/welcome-bonus');
          this.toast('Account created! Welcome to Capitan AI.', 'success');
        } catch (e) {
          store.set('auth.error', e.message);
        } finally {
          store.set('auth.loading', false);
        }
      }
    }
    AuthGate.define('capitan-auth-gate');

    // ==================== APP SHELL ====================
    class AppShell extends CapitanElement {
      subscribe() {
        return [
          this.observe('auth.token', () => this.render()),
          this.observe('ui.theme', (theme) => {
            document.body.className = theme === 'auto'
              ? (new Date().getHours() >= 6 && new Date().getHours() < 18 ? 'light' : 'dark')
              : theme;
          }),
        ];
      }
      render() {
        const token = store.get('auth.token');
        this.shadowRoot.innerHTML = `
          <style>
            :host { display:block; height:100%; width:100%; }
          </style>
          ${token ? '<capitan-main-layout></capitan-main-layout>' : '<capitan-auth-gate></capitan-auth-gate>'}
          <capitan-toast-container></capitan-toast-container>
          <capitan-buy-modal></capitan-buy-modal>
          <capitan-send-modal></capitan-send-modal>
          <capitan-receive-modal></capitan-receive-modal>
          <capitan-swap-modal></capitan-swap-modal>
        `;
      }
    }
    AppShell.define('capitan-app-shell');

    // ==================== MAIN LAYOUT ====================
    class MainLayout extends CapitanElement {
      subscribe() {
        return [this.observe('ui.activeView', () => this.render())];
      }
      render() {
        const activeView = store.get('ui.activeView') || 'chat';
        this.shadowRoot.innerHTML = `
          <style>
            :host { display:flex; height:100%; overflow:hidden; }
            capitan-sidebar { width:280px; flex-shrink:0; }
            .main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
          </style>
          <capitan-sidebar></capitan-sidebar>
          <div class="main-content">
            ${this._getViewComponent(activeView)}
          </div>
        `;
      }
      _getViewComponent(view) {
        switch(view) {
          case 'chat': return '<capitan-chat-view></capitan-chat-view>';
          case 'wallet': return '<capitan-wallet-view></capitan-wallet-view>';
          case 'portfolio': return '<capitan-portfolio-view></capitan-portfolio-view>';
          case 'research': return '<capitan-research-view></capitan-research-view>';
          case 'developer': return '<capitan-developer-view></capitan-developer-view>';
          case 'workspaces': return '<capitan-workspaces-view></capitan-workspaces-view>';
          case 'community': return '<capitan-community-view></capitan-community-view>';
          case 'dashboard': return '<capitan-dashboard-view></capitan-dashboard-view>';
          default: return '<capitan-chat-view></capitan-chat-view>';
        }
      }
    }
    MainLayout.define('capitan-main-layout');

    // ==================== SIDEBAR ====================
    class Sidebar extends CapitanElement {
      subscribe() {
        return [
          this.observe('ui.activeView', () => this.render()),
          this.observe('tokens.balance', () => this.render()),
          this.observe('auth.user', () => this.render()),
          this.observe('tokens.tier', () => this.render()),
        ];
      }
      render() {
        const activeView = store.get('ui.activeView');
        const user = store.get('auth.user');
        const balance = store.get('tokens.balance');
        const tier = store.get('tokens.tier');
        this.shadowRoot.innerHTML = `
          <style>
            :host { display:flex; flex-direction:column; height:100%; background:var(--surface); border-right:1px solid var(--border); }
            .brand { padding:16px 20px 12px; display:flex; align-items:center; gap:10px; }
            .logo-text { font-weight:800; font-size:20px; letter-spacing:1px; background:linear-gradient(135deg,var(--accent-cyan),var(--accent-violet)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
            .nav { padding:8px 12px; flex:1; }
            .nav-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:var(--radius-md); cursor:pointer; font-weight:500; font-size:13px; color:var(--text-secondary); transition:all var(--duration-fast); margin-bottom:2px; }
            .nav-item:hover { background:var(--bg-tertiary); color:var(--text-primary); }
            .nav-item.active { background:var(--accent-glow-cyan); color:var(--accent-cyan); }
            .nav-item svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; flex-shrink:0; }
            .footer { padding:12px 16px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
            .profile { display:flex; align-items:center; gap:10px; cursor:pointer; }
            .avatar { width:36px; height:36px; border-radius:50%; background:var(--accent-glow-cyan); border:2px solid var(--accent-cyan); display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--accent-cyan); }
            .name { font-weight:600; font-size:13px; }
            .tier { font-size:10px; color:var(--accent-cyan); }
            .balance { font-size:11px; color:var(--text-tertiary); }
          </style>
          <div class="brand">
            <span class="logo-text">CAPITAN AI</span>
          </div>
          <div class="nav">
            ${this._navItem('chat', 'Chat', 'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z', activeView)}
            ${this._navItem('wallet', 'OS Wallets', 'M20 21V5a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v16 M20 17h-5a3 3 0 0 1 0-6h5 M4 10h4v4H4z', activeView)}

      subscribe() {
        return [
          this.observe('wallet.balances', () => this._renderTokensAndTotal()),
          this.observe('wallet.activity', () => this._renderActivity()),
          this.observe('wallet.markets', () => this._renderMarkets()),
          this.observe('wallet.loadingBalances', () => this._updateLoading()),
          this.observe('wallet.address', () => this._updateAddress()),
        ];
      }
      connectedCallback() {
        super.connectedCallback();
        this._loadData();

      async _loadData() {
        await Promise.all([
          this._loadBalances(),
          this._loadActivity(true),
          this._loadMarkets(),
        ]);
        this._renderChart();
      }
      async _loadBalances() {
        const address = store.get('wallet.address');
        if (!address) return;
        store.set('wallet.loadingBalances', true);
        try {
          const data = await api.get(`/api/wallet/balances?address=${address}`);
          store.set('wallet.balances', data.tokens || []);
          let total = 0;
          for (const t of data.tokens) total += t.usdValue || 0;
          store.set('wallet.totalUsd', total);
        } catch (e) {
          store.set('wallet.balances', []);
        } finally {
          store.set('wallet.loadingBalances', false);
        }
      }
      async _loadActivity(reset = false) {
        if (reset) { store.set('wallet.activityPage', 0); store.set('wallet.activity', []); store.set('wallet.activityHasMore', true); }
        if (!store.get('wallet.activityHasMore') || store.get('wallet.loadingActivity')) return;
        store.set('wallet.loadingActivity', true);
        const page = store.get('wallet.activityPage');
        try {
          const data = await api.get(`/api/wallet/activity?page=${page}&limit=20`);
          const current = store.get('wallet.activity') || [];
          store.set('wallet.activity', reset ? data.items : [...current, ...(data.items || [])]);
          store.set('wallet.activityHasMore', data.hasMore || false);
          store.set('wallet.activityPage', page + 1);
        } catch (e) {
          store.set('wallet.activity', []);
        } finally {
          store.set('wallet.loadingActivity', false);
        }
      }
      async _loadMarkets() {
        try {
          const [crypto, stocks, commodities] = await Promise.all([
            api.get('/api/markets/crypto'),
            api.get('/api/markets/stocks'),
            api.get('/api/markets/commodities'),

      _formatAddress(addr) { return addr ? addr.slice(0,6)+'…'+addr.slice(-4) : '0x0000…0000'; }
      _formatNumber(n, d=2) { return Number(n).toLocaleString(undefined, {minimumFractionDigits:d, maximumFractionDigits:d}); }

      _renderTokensContent() {
        const balances = store.get('wallet.balances') || [];
        const loading = store.get('wallet.loadingBalances');
        if (loading) return '<div class="skeleton" style="height:200px;"></div>';
        if (!balances.length) return '<div style="color:var(--text-tertiary); text-align:center; padding:20px;">No tokens found.</div>';
        return `

                  <div class="token-usd">$${this._formatNumber(t.usdValue, 2)}</div>
                </div>
              </div>
            `).join('')}
          </div>
        `;

      _renderActivityContent() {
        const activity = store.get('wallet.activity') || [];
        const loading = store.get('wallet.loadingActivity');
        if (loading && activity.length === 0) return '<div class="skeleton" style="height:200px;"></div>';
        if (!activity.length) return '<div style="color:var(--text-tertiary); text-align:center; padding:20px;">No activity yet.</div>';
        let html = '<div class="activity-list">';
        activity.forEach(item => {
          const statusClass = item.status === 'completed' ? 'completed' : item.status === 'pending' ? 'pending' : 'failed';
          html += `
            <div class="activity-item">
              <div>
                <div class="activity-type">${item.type}</div>
                <div class="activity-date">${new Date(item.timestamp).toLocaleString()}</div>
              </div>
              <div>
                <div class="activity-amount">${this._formatNumber(item.amount)}</div>
                <div class="status ${statusClass}">${item.status}</div>
              </div>
            </div>
          `;
        });
        if (store.get('wallet.activityHasMore')) html += '<div style="text-align:center;padding:8px;color:var(--text-tertiary);">Scroll for more...</div>';

        if (!this.shadowRoot) return;

      _renderMarketList(type) {
        const grid = this.shadowRoot.getElementById('marketsGrid');
        if (!grid) return;
        const markets = store.get('wallet.markets');
        let items = [];
        if (type === 'crypto') items = markets.crypto || [];
        else if (type === 'stocks') items = markets.stocks || [];
        else items = markets.commodities || [];
        if (!items.length) { grid.innerHTML = '<div class="text-tertiary">No data.</div>'; return; }
        grid.innerHTML = `<div class="markets-grid">
          ${items.slice(0,50).map(item => `
            <div class="market-item">
              <div class="market-symbol">${item.symbol}</div>

          `).join('')}
        </div>`;

      _updateAddress() {
        const addrEl = this.shadowRoot?.getElementById('addrText');

      }
      _renderChart() {
        const canvas = this.shadowRoot?.getElementById('walletChart');
        if (!canvas) return;
        if (this._chart) this._chart.destroy();
        const labels = Array.from({length: 24}, (_, i) => i + 'h');
        const data = labels.map(() => Math.random() * 100 + 50);
        this._chart = new Chart(canvas, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              label: 'Portfolio Value',
              data,
              borderColor: '#00d4ff',
              backgroundColor: 'rgba(0, 212, 255, 0.05)',
              fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } },
              y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { size: 10 } } }
            }
          }
        });
      }
      _attachEventListeners() {
        const netSelect = this.shadowRoot.getElementById('networkSelect');
        netSelect?.addEventListener('change', (e) => {
          store.set('wallet.network', parseInt(e.target.value));
          localStorage.setItem('network', e.target.value);
          this._loadBalances();
        });
        const addrDisp = this.shadowRoot.getElementById('addressDisplay');
        addrDisp?.addEventListener('click', () => {
          navigator.clipboard.writeText(store.get('wallet.address') || '');
          this.toast('Address copied', 'success');
        });
        this.shadowRoot.getElementById('sendBtn')?.addEventListener('click', () => {
          store.set('ui.modals', [...store.get('ui.modals'), 'send']);
        });
        this.shadowRoot.getElementById('receiveBtn')?.addEventListener('click', () => {
          store.set('ui.modals', [...store.get('ui.modals'), 'receive']);
        });
        this.shadowRoot.getElementById('swapBtn')?.addEventListener('click', () => {
          store.set('ui.modals', [...store.get('ui.modals'), 'swap']);
        });
        this.shadowRoot.getElementById('buyBtn')?.addEventListener('click', () => {
          store.set('ui.modals', [...store.get('ui.modals'), 'buy']);
        });
        this.shadowRoot.querySelectorAll('.tab').forEach(tab => {
          tab.addEventListener('click', () => {
            this.shadowRoot.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const tabName = tab.dataset.tab;
            store.set('wallet.tab', tabName);
            const tabContent = this.shadowRoot.getElementById('tabContent');
            if (tabName === 'tokens') tabContent.innerHTML = this._renderTokensContent();
            else if (tabName === 'activity') tabContent.innerHTML = this._renderActivityContent();
            else if (tabName === 'markets') {
              tabContent.innerHTML = this._renderMarketsContent();
              this._attachMarketListeners();
              this._renderMarketList('crypto');
            }
          });

        this.shadowRoot.querySelectorAll('.time-pill').forEach(pill => {

            this.shadowRoot.querySelectorAll('.time-pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');

            this._renderChart();
          });
        });
      }
      _attachMarketListeners() {
        const btns = this.shadowRoot.querySelectorAll('[data-market]');
        btns.forEach(btn => {
          btn.addEventListener('click', () => {
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this._renderMarketList(btn.dataset.market);
          });
        });
      }
    }

              <button class="btn btn-primary" id="verifyBtn">Verify Payment</button>
            </div>
          </div>
        `;
        this._init();
      }
      async _init() {
        try {
          const rateData = await api.get('/api/token/rate');
          this.shadowRoot.getElementById('buyRate').textContent = `1 POL = ${rateData.rate} CLOSE`;
          this.shadowRoot.getElementById('buyAddress').textContent = rateData.matic_payment_address;
        } catch(e) {}
        this.shadowRoot.getElementById('closeBtn').addEventListener('click', () => {
          store.set('ui.modals', store.get('ui.modals').filter(m => m !== 'buy'));
        });
        this.shadowRoot.getElementById('verifyBtn').addEventListener('click', async () => {
          const amount = this.shadowRoot.getElementById('buyAmount').value;
          const txHash = this.shadowRoot.getElementById('buyTxHash').value.trim();
          if (!amount || !txHash) return alert('Fill all fields');
          try {
            const res = await api.post('/api/cap/purchase', { cap_amount: Math.floor(amount * 1e18).toString(), tx_hash: txHash });
            if (res.verified) {
              this.toast('Purchase confirmed!', 'success');
              store.set('ui.modals', store.get('ui.modals').filter(m => m !== 'buy'));
            } else {
              alert('Verification failed.');
            }
          } catch(e) { alert(e.message); }
        });
      }
    }
    BuyModal.define('capitan-buy-modal');

    // ==================== SEND MODAL ====================
    class SendModal extends CapitanElement {
      subscribe() {
        return [this.observe('ui.modals', (modals) => {
          if (modals.includes('send')) this.render();
          else this.shadowRoot.innerHTML = '';
        })];
      }
      render() {
        if (!store.get('ui.modals').includes('send')) { this.shadowRoot.innerHTML = ''; return; }
        this.shadowRoot.innerHTML = `
          <style>
            :host { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(12px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; }
            .modal { background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius-xl); max-width:560px; width:100%; padding:28px 24px; box-shadow:var(--shadow-lg); }
            h2 { font-size:22px; font-weight:700; margin-bottom:16px; }
            input, select { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--radius-md); background:var(--bg-secondary); color:var(--text-primary); font-size:14px; margin-bottom:12px; }
            .btn { padding:12px 20px; border:none; border-radius:var(--radius-lg); font-weight:600; font-size:14px; cursor:pointer; }
            .btn-primary { background:linear-gradient(135deg,var(--accent-cyan),var(--accent-violet)); color:white; }
            .btn-secondary { background:var(--bg-tertiary); color:var(--text-primary); border:1px solid var(--border); }
          </style>
          <div class="modal">
            <h2>Send</h2>
            <input type="text" id="sendAddress" placeholder="Recipient Address" />
            <select id="sendTokenSelect"></select>
            <input type="number" id="sendAmount" placeholder="Amount" step="any" />
            <div style="display:flex; gap:10px; margin-top:16px;">
              <button class="btn btn-secondary" id="closeBtn">Cancel</button>
              <button class="btn btn-primary" id="sendConfirmBtn">Send</button>
            </div>
          </div>
        `;
        this._init();
      }
      async _init() {
        const select = this.shadowRoot.getElementById('sendTokenSelect');
        const balances = store.get('wallet.balances') || [];
        select.innerHTML = balances.map(t => `<option value="${t.address}">${t.symbol}</option>`).join('');
        this.shadowRoot.getElementById('closeBtn').addEventListener('click', () => {
          store.set('ui.modals', store.get('ui.modals').filter(m => m !== 'send'));
        });
        this.shadowRoot.getElementById('sendConfirmBtn').addEventListener('click', async () => {
          const to = this.shadowRoot.getElementById('sendAddress').value.trim();
          const tokenAddress = select.value;
          const amountInput = this.shadowRoot.getElementById('sendAmount').value;
          const chainId = store.get('wallet.network') || 137;
          if (!to || !amountInput) return alert('Fill all fields');
          if (!ethers.utils.isAddress(to)) return alert('Invalid address');
          let decimals = 18;
          const token = store.get('wallet.balances').find(t => t.address === tokenAddress);
          if (token) decimals = token.decimals || 18;
          else if (tokenAddress === '0x0000000000000000000000000000000000000000') decimals = 18;
          const amount = ethers.utils.parseUnits(amountInput, decimals).toString();
          try {
            const res = await api.post('/api/wallet/send', { to, token_address: tokenAddress, amount, chain_id: chainId });
            this.toast('Transaction sent! ' + res.tx_hash, 'success');
            store.set('ui.modals', store.get('ui.modals').filter(m => m !== 'send'));
            // refresh wallet
            document.querySelector('capitan-wallet-view')?._loadBalances();
          } catch(e) { alert(e.message); }
        });
      }
    }
    SendModal.define('capitan-send-modal');

    // ==================== RECEIVE MODAL ====================
    class ReceiveModal extends CapitanElement {
      subscribe() {
        return [this.observe('ui.modals', (modals) => {
          if (modals.includes('receive')) this.render();
          else this.shadowRoot.innerHTML = '';
        })];
      }
      render() {
        if (!store.get('ui.modals').includes('receive')) { this.shadowRoot.innerHTML = ''; return; }
        const address = store.get('wallet.address') || '0x0000000000000000000000000000000000000000';
        this.shadowRoot.innerHTML = `
          <style>
            :host { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(12px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; }
            .modal { background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius-xl); max-width:560px; width:100%; padding:28px 24px; box-shadow:var(--shadow-lg); }
            h2 { font-size:22px; font-weight:700; margin-bottom:16px; }
            .btn { padding:12px 20px; border:none; border-radius:var(--radius-lg); font-weight:600; font-size:14px; cursor:pointer; }
            .btn-primary { background:linear-gradient(135deg,var(--accent-cyan),var(--accent-violet)); color:white; }
            .btn-secondary { background:var(--bg-tertiary); color:var(--text-primary); border:1px solid var(--border); }
          </style>
          <div class="modal">
            <h2>Receive</h2>
            <p>Your OS Wallet address:</p>
            <div style="background:var(--bg-secondary); padding:10px; border-radius:var(--radius-sm); word-break:break-all; font-family:monospace; font-size:14px;" id="receiveAddress">${address}</div>
            <div id="qrContainer" style="text-align:center; margin:16px 0;"></div>
            <button class="btn btn-primary" id="copyBtn">Copy Address</button>
            <div style="margin-top:12px;"><button class="btn btn-secondary" id="closeBtn">Close</button></div>
          </div>
        `;
        this._init();
      }
      _init() {
        const address = store.get('wallet.address');
        try {
          if (typeof QRCode !== 'undefined') {
            const container = this.shadowRoot.getElementById('qrContainer');
            container.innerHTML = '';
            new QRCode(container, { text: address, width: 180, height: 180 });
          }
        } catch(e){}
        this.shadowRoot.getElementById('copyBtn').addEventListener('click', () => {
          navigator.clipboard.writeText(address);
          this.toast('Address copied', 'success');
        });
        this.shadowRoot.getElementById('closeBtn').addEventListener('click', () => {
          store.set('ui.modals', store.get('ui.modals').filter(m => m !== 'receive'));
        });
      }
    }
    ReceiveModal.define('capitan-receive-modal');

    // ==================== SWAP MODAL ====================
    class SwapModal extends CapitanElement {
      subscribe() {
        return [this.observe('ui.modals', (modals) => {
          if (modals.includes('swap')) this.render();
          else this.shadowRoot.innerHTML = '';
        })];
      }
      render() {
        if (!store.get('ui.modals').includes('swap')) { this.shadowRoot.innerHTML = ''; return; }
        this.shadowRoot.innerHTML = `
          <style>
            :host { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(12px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; }
            .modal { background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius-xl); max-width:560px; width:100%; padding:28px 24px; box-shadow:var(--shadow-lg); }
            h2 { font-size:22px; font-weight:700; margin-bottom:16px; }
            input, select { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--radius-md); background:var(--bg-secondary); color:var(--text-primary); font-size:14px; margin-bottom:12px; }
            .btn { padding:12px 20px; border:none; border-radius:var(--radius-lg); font-weight:600; font-size:14px; cursor:pointer; }
            .btn-primary { background:linear-gradient(135deg,var(--accent-cyan),var(--accent-violet)); color:white; }
            .btn-secondary { background:var(--bg-tertiary); color:var(--text-primary); border:1px solid var(--border); }
          </style>
          <div class="modal">
            <h2>Swap</h2>
            <select id="swapFromToken"></select>
            <select id="swapToToken"></select>
            <input type="number" id="swapAmount" placeholder="Amount" step="any" />
            <div style="display:flex; gap:10px; margin-top:16px;">
              <button class="btn btn-secondary" id="closeBtn">Cancel</button>
              <button class="btn btn-primary" id="swapConfirmBtn">Swap</button>
            </div>
          </div>
        `;
        this._init();
      }
      _init() {
        const from = this.shadowRoot.getElementById('swapFromToken');
        const to = this.shadowRoot.getElementById('swapToToken');
        const balances = store.get('wallet.balances') || [];
        from.innerHTML = balances.map(t => `<option value="${t.address}">${t.symbol}</option>`).join('');
        to.innerHTML = balances.map(t => `<option value="${t.address}">${t.symbol}</option>`).join('');
        this.shadowRoot.getElementById('closeBtn').addEventListener('click', () => {
          store.set('ui.modals', store.get('ui.modals').filter(m => m !== 'swap'));
        });
        this.shadowRoot.getElementById('swapConfirmBtn').addEventListener('click', async () => {
          const fromToken = from.value;
          const toToken = to.value;
          const amountInput = this.shadowRoot.getElementById('swapAmount').value;
          if (!amountInput) return alert('Enter amount');
          let decimals = 18;
          const token = balances.find(t => t.address === fromToken);
          if (token) decimals = token.decimals || 18;
          const amount = ethers.utils.parseUnits(amountInput, decimals).toString();
          try {
            const res = await api.post('/api/wallet/swap/execute', { from_token: fromToken, to_token: toToken, amount, slippage: 1.0 });
            this.toast('Swap executed! TX: ' + res.tx_hash, 'success');
            store.set('ui.modals', store.get('ui.modals').filter(m => m !== 'swap'));
            document.querySelector('capitan-wallet-view')?._loadBalances();
          } catch(e) { alert(e.message); }
        });
      }
    }
    SwapModal.define('capitan-swap-modal');

    // ==================== GRACEFUL AUTH CHECK ====================
    (async () => {
      const token = store.get('auth.token');
      if (!token) return;
      try {
        const res = await fetch(BASE_URL + '/api/auth/validate', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (res.ok) {
          const data = await res.json();
          store.set('auth.user', data.user);
          store.set('auth.isAdmin', data.is_admin);
        } else {
          store.set('auth.token', null);
          store.set('auth.user', null);
          localStorage.removeItem('ct');
          localStorage.removeItem('cu');
        }
      } catch (e) {
        store.set('auth.token', null);
        store.set('auth.user', null);
        localStorage.removeItem('ct');
        localStorage.removeItem('cu');
      }
      // Set initial theme
      const theme = store.get('ui.theme');
      document.body.className = theme === 'auto'
        ? (new Date().getHours() >= 6 && new Date().getHours() < 18 ? 'light' : 'dark')
        : theme;
    })();
  </script>
