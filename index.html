<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CAPITAN AI — Institutional Intelligence</title>
<style>
/* ═══════════════════════════════════════════════════════════ */
/* CAPITAN AI v17.0 — Sharp. Emotional. Commanding.         */
/* Black & White. Scrollable. $17-Worthy.                   */
/* CLOSEAI TECHNOLOGIES — closeaitechnologies@gmail.com     */
/* ═══════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #0a0a0a;
  --bg2: #0f0f0f;
  --bg3: #161616;
  --bg4: #1c1c1c;
  --bdr: #1e1e1e;
  --bdr2: #282828;
  --bdr3: #333333;
  --txt: #f5f5f5;
  --txt2: #b0b0b0;
  --txt3: #606060;
  --accent: #ffffff;
  --shadow-lg: 0 40px 100px rgba(0,0,0,0.8);
  --radius: 18px;
  --radius-sm: 14px;
  --radius-xs: 10px;
  --font-xs: 10.5px;
  --font-sm: 12.5px;
  --font-md: 15px;
  --font-lg: 20px;
  --font-xl: 28px;
  --font-2xl: 36px;
  --transition: 0.25s cubic-bezier(0.22, 0.61, 0.36, 1);
}

:root.light {
  --bg: #f8f8f8;
  --bg2: #f0f0f0;
  --bg3: #e6e6e6;
  --bg4: #dcdcdc;
  --bdr: #d4d4d4;
  --bdr2: #c6c6c6;
  --bdr3: #b0b0b0;
  --txt: #0a0a0a;
  --txt2: #333333;
  --txt3: #777777;
  --accent: #000000;
  --shadow-lg: 0 40px 100px rgba(0,0,0,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Inter', 'Space Grotesk', system-ui, -apple-system, sans-serif;
  font-size: var(--font-sm);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
}

#app { display: flex; height: 100vh; height: 100dvh; width: 100vw; width: 100dvw; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 3px; }

/* ═══════════════════════════════════════════════════════════ */
/* SIDEBAR — Minimal, sharp, dark                            */
/* ═══════════════════════════════════════════════════════════ */
.sidebar {
  width: 280px; min-width: 280px; background: var(--bg);
  border-right: 1px solid var(--bdr); display: flex;
  flex-direction: column; padding: 20px 14px; gap: 1px;
  z-index: 60; transition: all var(--transition);
  font-size: var(--font-xs); overflow-y: auto; overflow-x: hidden;
}
.sidebar.collapsed { width: 52px; min-width: 52px; padding: 20px 8px; }

.sb-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 6px 18px; border-bottom: 1px solid var(--bdr);
  margin-bottom: 10px; flex-shrink: 0;
}
.sb-logo { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
.sb-logo .name { font-weight: 900; font-size: 17px; letter-spacing: -0.05em; color: var(--txt); text-transform: uppercase; }
.sb-toggle {
  background: var(--bg3); border: 1px solid var(--bdr2);
  color: var(--txt); cursor: pointer; padding: 6px 10px;
  border-radius: var(--radius-xs); font-size: var(--font-xs);
  opacity: 0.7; transition: all var(--transition);
  font-weight: 600; display: flex; align-items: center; gap: 4px;
}
.sb-toggle:hover { opacity: 1; background: var(--bg4); }

.sb-section { border-top: 1px solid var(--bdr); padding-top: 10px; margin-top: 6px; }
.sb-section:first-of-type { border-top: none; }
.sb-section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 12px; cursor: pointer; border-radius: var(--radius-sm);
  font-size: var(--font-xs); color: var(--txt2); font-weight: 700;
  transition: all var(--transition); user-select: none;
  min-height: 42px; text-transform: uppercase; letter-spacing: 0.08em;
}
.sb-section-header:hover { background: var(--bg3); color: var(--txt); }
.sb-section-header .arrow { font-size: 9px; transition: transform 0.2s; opacity: 0.3; }
.sb-section-header.open .arrow { transform: rotate(90deg); opacity: 0.6; }
.sb-section-content { display: none; padding: 4px 0 6px; }
.sb-section-content.open { display: block; }

.sb-item {
  display: flex; align-items: center; gap: 8px;
  background: none; border: none; color: var(--txt2);
  padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: var(--font-xs); font-family: inherit; width: 100%; text-align: left;
  transition: all var(--transition); min-height: 40px;
  font-weight: 500; letter-spacing: 0.01em;
}
.sb-item:hover { background: var(--bg3); color: var(--txt); }
.sb-item.active { background: var(--bg3); color: var(--txt); font-weight: 700; }
.sb-item .badge { margin-left: auto; font-size: 8px; background: var(--bg4); color: var(--txt2); padding: 2px 7px; border-radius: 8px; font-weight: 700; text-transform: uppercase; }
.sb-item .badge.pro { background: var(--txt); color: var(--bg); }

.btn-new {
  display: flex; align-items: center; gap: 8px;
  background: transparent; border: 1px solid var(--bdr2);
  color: var(--txt); padding: 12px 14px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: var(--font-xs); font-family: inherit; width: 100%;
  transition: all var(--transition); margin: 8px 0; min-height: 44px;
  font-weight: 700; flex-shrink: 0; letter-spacing: 0.02em;
}
.btn-new:hover { border-color: var(--txt); background: var(--bg3); }

.btn-upgrade {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--txt); border: none;
  color: var(--bg); padding: 13px 14px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: var(--font-xs); font-family: inherit; width: 100%;
  font-weight: 800; transition: all var(--transition); min-height: 46px;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.btn-upgrade:hover { opacity: 0.85; transform: scale(1.01); }

.tier-badge { text-align: center; padding: 8px; border-radius: var(--radius-sm); font-size: 9px; font-weight: 800; letter-spacing: 0.1em; flex-shrink: 0; margin-top: 4px; color: var(--txt2); text-transform: uppercase; }
.tier-free { background: var(--bg3); }
.tier-pro { background: var(--bg3); color: var(--txt); }

.sb-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--bdr); flex-shrink: 0; }
.sb-footer-links { display: flex; gap: 14px; justify-content: center; margin-bottom: 8px; flex-wrap: wrap; }
.sb-footer-links a { color: var(--txt3); font-size: 9px; text-decoration: none; font-weight: 600; letter-spacing: 0.03em; }
.sb-footer-links a:hover { color: var(--txt); }
.sb-footer-brand { text-align: center; font-size: 9px; color: var(--txt3); letter-spacing: 0.12em; opacity: 0.7; font-weight: 700; margin-top: 4px; text-transform: uppercase; }
.support-link { text-align: center; padding: 2px 0; font-size: 9px; color: var(--txt3); }
.support-link a { color: var(--txt2); text-decoration: none; font-weight: 600; }

.limit-indicator { text-align: center; padding: 8px 10px; font-size: var(--font-xs); color: var(--txt2); background: var(--bg2); border-radius: var(--radius-sm); margin: 6px 0; }
.limit-indicator .limit-bar { height: 2px; background: var(--bdr); border-radius: 1px; margin-top: 5px; overflow: hidden; }
.limit-indicator .limit-fill { height: 100%; background: var(--txt); border-radius: 1px; transition: width 0.3s; }

/* ═══════════════════════════════════════════════════════════ */
/* MAIN — Scrollable, bold, emotional                        */
/* ═══════════════════════════════════════════════════════════ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.chat-container { flex: 1; display: flex; flex-direction: column; max-width: 780px; margin: 0 auto; width: 100%; }
.chat-messages { flex: 1; overflow-y: auto; padding: 32px 28px; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }

/* ═══════════════════════════════════════════════════════════ */
/* WELCOME — Bold greeting, clean categories, no logo        */
/* ═══════════════════════════════════════════════════════════ */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; text-align: center; padding: 32px 20px;
}
.welcome h1 {
  font-size: clamp(26px, 6vw, 38px); font-weight: 900;
  color: var(--txt); margin-bottom: 28px;
  letter-spacing: -0.04em; line-height: 1.15;
}
.welcome-categories {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
}
.welcome-categories span {
  font-size: var(--font-xs); font-weight: 600; color: var(--txt2);
  cursor: pointer; transition: all var(--transition);
  padding: 8px 18px; border-radius: 20px;
  border: 1px solid var(--bdr2); letter-spacing: 0.02em;
  text-transform: lowercase;
}
.welcome-categories span:hover { border-color: var(--txt); color: var(--txt); background: var(--bg3); }
.welcome-categories span.locked { opacity: 0.45; border-style: dashed; }

/* ═══════════════════════════════════════════════════════════ */
/* MESSAGES — Crisp, sharp, high contrast                     */
/* ═══════════════════════════════════════════════════════════ */
.msg {
  padding: 20px 22px; margin: 10px 0; line-height: 1.8;
  font-size: var(--font-sm); animation: msgIn 0.3s ease;
  word-break: break-word;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { background: var(--bg3); border: 1px solid var(--bdr); border-radius: var(--radius); margin-left: auto; max-width: 78%; color: var(--txt); font-weight: 500; }
.msg.ai { background: transparent; border-left: 2px solid var(--txt); padding-left: 20px; max-width: 94%; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.msg-ai-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: var(--font-xs); font-weight: 700; color: var(--txt); text-transform: uppercase; letter-spacing: 0.06em; }
.msg-ai-hd .model-tag { font-size: 8px; background: var(--bg3); color: var(--txt2); padding: 3px 8px; border-radius: 6px; font-weight: 700; }
.msg-content { color: var(--txt); }
.msg-content h2, .msg-content h3 { color: var(--txt); margin: 18px 0 10px; font-weight: 800; letter-spacing: -0.02em; }
.msg-content p { margin-bottom: 12px; color: var(--txt); line-height: 1.8; }
.msg-content strong { color: var(--txt); font-weight: 800; }
.msg-content code { background: var(--bg3); color: var(--txt); padding: 3px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 11px; border: 1px solid var(--bdr); }
.confidence-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 9px; padding: 4px 10px; border-radius: 8px; margin-left: 6px; font-weight: 700; color: var(--txt); background: var(--bg3); text-transform: uppercase; letter-spacing: 0.04em; }
.source-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.source-chip { display: flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid var(--bdr); padding: 5px 12px; border-radius: 10px; font-size: 9px; color: var(--txt); cursor: pointer; transition: all var(--transition); font-weight: 600; }
.source-chip:hover { border-color: var(--txt); }
.msg-actions { display: flex; gap: 10px; padding: 12px 0 0; opacity: 0; transition: opacity 0.2s; flex-wrap: wrap; }
.msg.ai:hover .msg-actions { opacity: 0.7; }
.msg-actions button { background: none; border: none; color: var(--txt2); font-size: var(--font-xs); font-family: inherit; cursor: pointer; padding: 5px 10px; min-height: 28px; border-radius: 6px; transition: all var(--transition); display: flex; align-items: center; gap: 4px; font-weight: 600; }
.msg-actions button:hover { color: var(--txt); background: var(--bg3); }
.ai-note { font-size: 9px; color: var(--txt3); margin-top: 12px; font-weight: 500; letter-spacing: 0.02em; }
.thinking { display: flex; align-items: center; gap: 10px; color: var(--txt2); font-size: var(--font-xs); padding: 8px 0; font-weight: 600; }
.thinking-dots { display: flex; gap: 5px; }
.thinking-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--txt); animation: dotPulse 1.2s infinite; }
.thinking-dot:nth-child(2) { animation-delay: 0.2s; }
.thinking-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

/* ═══════════════════════════════════════════════════════════ */
/* INPUT — Bold, commanding                                   */
/* ═══════════════════════════════════════════════════════════ */
.chat-input-wrap { padding: 18px 28px 28px; }
.chat-input-inner {
  display: flex; gap: 8px; background: var(--bg2);
  border: 1px solid var(--bdr); border-radius: var(--radius);
  padding: 8px 8px 8px 20px; transition: all var(--transition);
  align-items: center;
}
.chat-input-inner:focus-within { border-color: var(--txt); box-shadow: 0 0 0 1px var(--txt); }
.chat-input-inner input { flex: 1; background: transparent; border: none; color: var(--txt); padding: 12px 0; font-size: var(--font-sm); font-family: inherit; outline: none; min-width: 0; font-weight: 500; }
.chat-input-inner input::placeholder { color: var(--txt3); font-weight: 400; }
.chat-input-inner input:disabled { opacity: 0.3; }
.send-btn { background: var(--txt); color: var(--bg); border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: var(--font-sm); font-family: inherit; transition: all var(--transition); min-width: 48px; min-height: 48px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; letter-spacing: 0.04em; }
.send-btn:hover { opacity: 0.8; }
.send-btn:disabled { opacity: 0.08; cursor: not-allowed; }
.model-selector { display: flex; gap: 6px; padding: 8px 0; }
.model-option { background: none; border: 1px solid var(--bdr); color: var(--txt3); padding: 6px 14px; border-radius: 14px; cursor: pointer; font-size: var(--font-xs); font-family: inherit; font-weight: 600; transition: all var(--transition); text-transform: uppercase; letter-spacing: 0.03em; }
.model-option:hover { border-color: var(--txt); color: var(--txt); }
.model-option.active { border-color: var(--txt); color: var(--txt); background: var(--bg3); }

/* ═══════════════════════════════════════════════════════════ */
/* MODALS — Dark, dramatic                                    */
/* ═══════════════════════════════════════════════════════════ */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 120; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(8px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--bdr); border-radius: var(--radius); padding: 36px; width: 480px; max-width: 94vw; max-height: 86vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal h2 { font-size: var(--font-lg); font-weight: 900; margin-bottom: 10px; letter-spacing: -0.03em; color: var(--txt); text-transform: uppercase; }
.modal p { color: var(--txt2); font-size: var(--font-xs); margin-bottom: 22px; line-height: 1.7; }
.modal .price { font-size: 40px; font-weight: 900; margin-bottom: 20px; letter-spacing: -0.05em; color: var(--txt); }
.modal .price span { font-size: 16px; color: var(--txt2); font-weight: 500; }
.modal input, .modal textarea, .modal select { width: 100%; background: var(--bg3); border: 1px solid var(--bdr); color: var(--txt); padding: 14px; border-radius: var(--radius-sm); font-size: var(--font-xs); font-family: inherit; margin-bottom: 12px; outline: none; font-weight: 500; }
.modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--txt); }
.modal input::placeholder, .modal textarea::placeholder { color: var(--txt3); }
.modal .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
.modal .btn-primary { flex: 1; min-width: 110px; background: var(--txt); color: var(--bg); border: none; padding: 14px 22px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 800; font-family: inherit; font-size: var(--font-xs); min-height: 48px; transition: all var(--transition); text-transform: uppercase; letter-spacing: 0.06em; }
.modal .btn-primary:hover { opacity: 0.85; }
.modal .btn-secondary { flex: 1; min-width: 110px; background: transparent; border: 1px solid var(--bdr); color: var(--txt); padding: 14px 22px; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; font-size: var(--font-xs); min-height: 48px; font-weight: 700; }
.modal .btn-secondary:hover { background: var(--bg3); }
.modal .tabs { display: flex; gap: 0; margin-bottom: 22px; border-bottom: 1px solid var(--bdr); }
.modal .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-size: var(--font-xs); color: var(--txt2); border-bottom: 2px solid transparent; transition: all var(--transition); min-height: 44px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
.modal .tab.active { color: var(--txt); border-bottom-color: var(--txt); }

/* ═══════════════════════════════════════════════════════════ */
/* TOAST                                                       */
/* ═══════════════════════════════════════════════════════════ */
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--txt); color: var(--bg); padding: 12px 28px; border-radius: 24px; font-size: var(--font-xs); font-weight: 800; z-index: 200; animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards; pointer-events: none; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.05em; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

.theme-toggle { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; cursor: pointer; border-radius: var(--radius-sm); font-size: var(--font-xs); color: var(--txt2); width: 100%; transition: all var(--transition); border: none; background: none; font-family: inherit; min-height: 40px; gap: 8px; font-weight: 600; }
.theme-toggle:hover { background: var(--bg3); color: var(--txt); }
.theme-toggle .theme-indicator { font-size: 9px; color: var(--txt); background: var(--bg3); padding: 4px 10px; border-radius: 10px; font-weight: 700; text-transform: uppercase; }

.mobile-toggle-hint {
  display: none; position: fixed; left: 0; top: 50%; transform: translateY(-50%);
  background: var(--bg3); border: 1px solid var(--bdr2); color: var(--txt);
  padding: 16px 10px; border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
  cursor: pointer; z-index: 55; font-size: 12px; font-weight: 800;
  writing-mode: vertical-rl; text-orientation: mixed; letter-spacing: 0.1em;
  opacity: 0.9; transition: all var(--transition); text-transform: uppercase;
}
.mobile-toggle-hint:hover { opacity: 1; background: var(--txt); color: var(--bg); }

/* ═══════════════════════════════════════════════════════════ */
/* RESPONSIVE                                                  */
/* ═══════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -290px; top: 0; bottom: 0; z-index: 60; width: 290px; min-width: 290px; box-shadow: 12px 0 50px rgba(0,0,0,0.7); max-height: 100vh; max-height: 100dvh; }
  .sidebar.open-mobile { left: 0; }
  .mobile-toggle-hint { display: flex; }
  .chat-container { max-width: 100%; }
  .chat-messages { padding: 20px 16px; }
  .chat-input-wrap { padding: 14px 16px 20px; }
  .msg.user { max-width: 86%; }
  .msg.ai { max-width: 100%; }
  .modal { padding: 24px; width: 100%; }
  .welcome-categories { gap: 6px; }
  .welcome-categories span { padding: 7px 14px; font-size: 10px; }
}
@media (max-width: 480px) {
  .sidebar { width: 100vw; min-width: 100vw; left: -100vw; }
  .sidebar.open-mobile { left: 0; }
  .sb-item { padding: 12px 12px; min-height: 44px; }
  .btn-new { min-height: 48px; }
  .chat-input-inner input { font-size: 16px; }
  .msg { padding: 16px 18px; }
  .welcome h1 { font-size: 24px; }
}
@media (max-height: 500px) and (orientation: landscape) {
  .welcome { min-height: auto; padding: 12px; }
  .welcome h1 { font-size: 18px; margin-bottom: 14px; }
}
</style>
</head>
<body>

<div id="app"></div>
<div class="mobile-toggle-hint" id="mobileToggleHint">MENU</div>

<div id="paymentModal" class="modal-overlay">
  <div class="modal">
    <h2>CAPITAN PRO</h2>
    <p>Institutional intelligence. Unlimited. Every domain. Every tool.</p>
    <div class="price">$17<span>/month</span></div>
    <div class="tabs"><div class="tab active" data-tab="card">Card</div><div class="tab" data-tab="crypto">Crypto</div></div>
    <div id="tabCard">
      <input type="text" placeholder="Card number" id="cardNumber" inputmode="numeric" autocomplete="cc-number">
      <div style="display:flex;gap:8px"><input type="text" placeholder="MM/YY" style="flex:1" id="cardExpiry" inputmode="numeric" autocomplete="cc-exp"><input type="text" placeholder="CVC" style="flex:1" id="cardCvc" inputmode="numeric" autocomplete="cc-csc"></div>
      <input type="text" placeholder="Name on card" id="cardName" autocomplete="cc-name">
      <div class="btn-row"><button class="btn-primary" id="payCard">Pay $17</button><button class="btn-secondary" id="closeModal">Cancel</button></div>
    </div>
    <div id="tabCrypto" style="display:none">
      <div style="font-size:var(--font-xs);color:var(--txt2);margin-bottom:10px;line-height:1.7">Send <strong>0.00028 BTC</strong> or <strong>0.005 ETH</strong> or <strong>17 USDC</strong> to:</div>

function renderMessages(){
  const el=document.getElementById('chatMessages');if(!el)return;
  if(!S.messages.length){const pro=isPro();el.innerHTML=`<div class="welcome"><h1>${getGreeting()}</h1><div class="welcome-categories"><span onclick="sendMessage('Analyze market trends and build financial models')">finance</span><span class="${pro?'':'locked'}" onclick="${pro?"sendMessage('Explain quantitative methods and mathematical proofs')":"showToast('PRO FEATURE · \$17/MONTH');openPaymentModal()"}">quant${pro?'':' · pro'}</span><span class="${pro?'':'locked'}" onclick="${pro?"sendMessage('Design system architecture and write optimized code')":"showToast('PRO FEATURE · \$17/MONTH');openPaymentModal()"}">coding${pro?'':' · pro'}</span><span class="${pro?'':'locked'}" onclick="${pro?"sendMessage('Explore scientific concepts and current research')":"showToast('PRO FEATURE · \$17/MONTH');openPaymentModal()"}">science${pro?'':' · pro'}</span></div></div>`;return}
  el.innerHTML=S.messages.map((m,i)=>{

    let extras='';if(content&&m.marketWidget)extras+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin:8px 0">${m.marketWidget.map(x=>`<div style="background:var(--bg3);border:1px solid var(--bdr);padding:10px;border-radius:var(--radius-sm)"><div style="font-weight:700;font-size:var(--font-xs);color:var(--txt)">${x.symbol}</div><div style="font-size:var(--font-md);font-weight:800;color:var(--txt);margin:2px 0">${typeof x.price==='number'&&x.price<10?x.price.toFixed(4):x.price.toLocaleString()}</div><div style="font-size:9px;color:var(--txt2)">${Math.abs(x.change).toFixed(1)}%</div></div>`).join('')}</div>`;if(content&&m.citations)extras+=`<div class="source-chips">${m.citations.map(c=>`<span class="source-chip">${esc(c)}</span>`).join('')}</div>`;if(content&&m.confidence)extras+=`<span class="confidence-badge">${m.confidence.toUpperCase()} CONFIDENCE</span>`;
    return`<div class="msg ai"><div class="msg-ai-hd">CAPITAN AI<span class="model-tag">${model?model.name:'BALANCED'}</span></div>${isLast&&!content?'<div class="thinking"><div class="thinking-dots"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div>Thinking</div>':`<div class="msg-content">${formatMsg(content)}${extras}</div>`}${content?`<div class="msg-actions"><button onclick="copyMsg('${escAttr(content)}')">Copy</button><button onclick="retryMsg()">Retry</button>${isPro()?'<button onclick="showExportOptions()">Export</button>':''}<button onclick="saveToMemory('${escAttr(content.substring(0,100))}')">Save</button></div>`:''}${content?'<div class="ai-note">CAPITAN AI can make mistakes. Verify important information.</div>':''}</div>`}).join('');el.scrollTop=el.scrollHeight}

function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function escAttr(s){return s?s.replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,'\\n').replace(/\\/g,'\\\\'):''}
function formatMsg(s){return s?s.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`(.*?)`/g,'<code>$1</code>'):''}
function copyMsg(t){navigator.clipboard.writeText(t).then(()=>showToast('COPIED')).catch(()=>{})}
function retryMsg(){if(S.messages.length<2)return;S.messages=S.messages.slice(0,-2);const u=[...S.messages].reverse().find(m=>m.role==='user');if(u)sendMessage(u.content)}
function saveToMemory(c){const id=memId();S.memories.push({id:shortId(),memoryId:id,content:c,active:true});GlobalMemory.add({type:'saved',memoryId:id,content:c});saveState();showToast('SAVED · '+id)}

async function sendMessage(content){
  const input=document.getElementById('chatInput'),text=content||input?.value?.trim();if(!text||S.streaming)return;
  if(S.tier==='free'&&!checkFreeLimit()){showToast('LIMIT REACHED');openPaymentModal();return}
  const isBlocked=/\b(quant|quantum|code|python|javascript|algorithm|function|api|architecture|prove|theorem|math|equation|calculus|crispr|dna|physics|chemistry|biology)\b/i.test(text);
  if(S.tier==='free'&&isBlocked){showToast('PRO FEATURE');openPaymentModal();return}
  GlobalMemory.add({type:'query',memoryId:memId(),query:text,userId:'ANON'});
  S.messages.push({id:shortId(),role:'user',content:text});const aiMsg={id:shortId(),role:'assistant',content:''};
  if(S.selectedModel==='deep')aiMsg.cot=['Analyzing query...','Retrieving context...','Structuring response...','Generating...'];
  S.messages.push(aiMsg);S.streaming=true;if(input)input.value='';if(S.tier==='free'){S.freeMsgCount++;saveState()}
  render();await simResponse(aiMsg,text);S.streaming=false;render()
}

async function simResponse(aiMsg,query){
  const model=S.selectedModel,delays={quick:250,balanced:500,deep:900},baseDelay=delays[model]||500;
  if(aiMsg.cot){await sleep(baseDelay*0.5);aiMsg.cot=null;renderMessages()}await sleep(baseDelay);
  let r='';const q=query.toLowerCase();
  if(/\b(price|market|stock|spx|ndx|btc|eth|gold|oil)\b/i.test(q)&&isPro()){refreshData();aiMsg.marketWidget=S.marketData.slice(0,4);r=`**LIVE MARKET DATA**\n\nCurrent prices across major assets.\n\nS&P 500: ${S.marketData[0].change>=0?'POSITIVE':'UNDER PRESSURE'}\nBitcoin: ${S.marketData[2].change>=0?'RECOVERING':'DECLINING'}\nGold: ${S.marketData[4].change>=0?'SAFE HAVEN':'CONSOLIDATING'}`;aiMsg.confidence='high'}
  else if(q.includes('quantum')||q.includes('qubit')){r=`**QUANTUM ANALYSIS**\n\nSuperposition: |ψ⟩ = α|0⟩ + β|1⟩ where |α|² + |β|² = 1\nEntanglement: Non-local correlations enable computation\nGates: Hadamard, CNOT, Phase form universal sets\n\nQuantum supremacy demonstrated. Error correction is the frontier.`;aiMsg.confidence='high'}
  else if(q.includes('code')||q.includes('python')||q.includes('algorithm')){r=`**CODE ANALYSIS**\n\n\`\`\`python\ndef solution(data):\n    return [x for x in data if x > 0]\n\`\`\`\n\nO(n) complexity. Handle edge cases for empty input.`;aiMsg.confidence='high'}
  else{const rr=['**ANALYSIS**\n\nContext suggests interconnected factors. Clear patterns emerge.\n\nWhat aspect should I explore deeper?','**EXPLORATION**\n\nFundamentals are established. Recent developments shift understanding.\n\nWhere should we focus?','**INSIGHTS**\n\nHolistic analysis reveals consistent patterns. Relationships are robust.\n\nWhat angle interests you?'];r=rr[Math.floor(Math.random()*rr.length)];aiMsg.confidence=model==='deep'?'high':'medium'}
  const words=r.split(' ');for(const w of words){aiMsg.content=(aiMsg.content||'')+w+' ';renderMessages();await sleep(8+Math.random()*18)}aiMsg.content=r
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function bindEvents(){
  const pro=isPro(),founder=S.tier==='founder';
  document.getElementById('toggleSidebar')?.addEventListener('click',()=>{S.sidebarOpen=!S.sidebarOpen;render()});

  document.querySelectorAll('[data-capability]').forEach(b=>{b.addEventListener('click',()=>{const p={finance:'Analyze market trends and generate investment insights',quant:'Explain quantitative methods and mathematical proofs',coding:'Design system architecture and write optimized code',science:'Explore scientific concepts and current research',general:'Explore a topic connecting multiple fields'};S.activeView='chat';render();setTimeout(()=>sendMessage(p[b.dataset.capability]||'Explore'),100)})});

  document.getElementById('createFirstWs')?.addEventListener('click',()=>{if(!pro)return;const n=prompt('Workspace name:');if(n){const w={id:shortId(),name:n,members:1,color:'#fff'};S.workspaces.push(w);S.currentWorkspace=w;if(!S.members.length)S.members=[{id:'m1',name:'You',role:'Admin',online:true,initials:'YO',color:'#fff'}];if(!S.promptTemplates.length)S.promptTemplates=getPrompts();saveState();render();showToast('WORKSPACE CREATED')}});
  const input=document.getElementById('chatInput'),sendBtn=document.getElementById('sendBtn');
  input?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
  sendBtn?.addEventListener('click',()=>sendMessage());setTimeout(()=>input?.focus(),100);
  document.getElementById('upgradeLink')?.addEventListener('click',openPaymentModal);
  document.getElementById('btnVoiceInput')?.addEventListener('click',()=>{if(!requirePro())return;showToast('VOICE ACTIVE');setTimeout(()=>sendMessage('Meeting transcribed'),1500)});
  if(pro){
    document.getElementById('btnWorkspace')?.addEventListener('click',()=>{const o=document.createElement('div');o.className='modal-overlay open';o.innerHTML=`<div class="modal"><h2>WORKSPACE</h2>${S.currentWorkspace?`<p>Current: ${S.currentWorkspace.name}</p>`:''}${S.workspaces.map(w=>`<div style="padding:10px;border:1px solid var(--bdr);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer" data-ws="${w.id}">${w.name} · ${w.members} member${w.members>1?'s':''}${w.id===S.currentWorkspace?.id?' · ACTIVE':''}</div>`).join('')}<div class="btn-row"><button class="btn-primary" id="createWs">NEW</button><button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">CLOSE</button></div></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove()});o.querySelector('#createWs')?.addEventListener('click',()=>{const n=prompt('Name:');if(n){const w={id:shortId(),name:n,members:1,color:'#fff'};S.workspaces.push(w);S.currentWorkspace=w;o.remove();saveState();render()}});o.querySelectorAll('[data-ws]').forEach(el=>{el.addEventListener('click',()=>{const w=S.workspaces.find(x=>x.id===el.dataset.ws);if(w){S.currentWorkspace=w;o.remove();saveState();render()}})})});
    document.getElementById('workspaceSwitcher')?.addEventListener('click',()=>{if(S.workspaces.length<2)return;const i=S.workspaces.indexOf(S.currentWorkspace);S.currentWorkspace=S.workspaces[(i+1)%S.workspaces.length];saveState();render()});
    document.getElementById('btnMarketResearch')?.addEventListener('click',()=>{S.activeView='chat';render();setTimeout(()=>sendMessage('Market research: sizing, trends, landscape, projections.'),100)});
    document.getElementById('btnDealAnalysis')?.addEventListener('click',()=>{S.activeView='chat';render();setTimeout(()=>sendMessage('Deal analysis: DCF, comps, precedents, risks.'),100)});
    document.getElementById('btnMemory')?.addEventListener('click',()=>{const o=document.createElement('div');o.className='modal-overlay open';o.innerHTML=`<div class="modal"><h2>MEMORY</h2>${S.memories.map(m=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px;border-bottom:1px solid var(--bdr)"><div><div style="font-size:var(--font-xs);color:var(--txt)">${esc(m.content)}</div><div style="font-size:8px;color:var(--txt3)">${m.memoryId}</div></div><button style="background:none;border:none;color:var(--txt3);cursor:pointer" data-del="${m.id}">✕</button></div>`).join('')}<div class="btn-row"><button class="btn-primary" id="addMem">ADD</button><button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">CLOSE</button></div></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove()});o.querySelector('#addMem')?.addEventListener('click',()=>{const c=prompt('Memory:');if(c){const id=memId();S.memories.push({id:shortId(),memoryId:id,content:c,active:true});saveState();o.remove();showToast('SAVED')}});o.querySelectorAll('[data-del]').forEach(d=>{d.addEventListener('click',()=>{S.memories=S.memories.filter(x=>x.id!==d.dataset.del);saveState();d.closest('div').parentElement.remove()})})});
    document.getElementById('btnAPIKeys')?.addEventListener('click',()=>{if(!S.apiKeys.capitan)S.apiKeys.capitan='cap_'+shortId()+shortId();const o=document.createElement('div');o.className='modal-overlay open';o.innerHTML=`<div class="modal"><h2>API KEYS</h2><div style="background:var(--bg3);padding:12px;border-radius:var(--radius-sm);font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt);word-break:break-all;margin:8px 0">${S.apiKeys.capitan}</div><div class="btn-row"><button class="btn-primary" id="rotateKey">ROTATE</button><button class="btn-secondary" onclick="navigator.clipboard.writeText('${S.apiKeys.capitan}');showToast('COPIED')">COPY</button></div></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove()});o.querySelector('#rotateKey')?.addEventListener('click',()=>{S.apiKeys.capitan='cap_'+shortId()+shortId();saveState();o.remove();document.getElementById('btnAPIKeys')?.click()})});
    document.getElementById('btnExport')?.addEventListener('click',()=>showExportOptions());
    document.getElementById('btnPromptLib')?.addEventListener('click',()=>{if(!S.promptTemplates.length)S.promptTemplates=getPrompts();const cats=[...new Set(S.promptTemplates.map(p=>p.category))],o=document.createElement('div');o.className='modal-overlay open';o.innerHTML=`<div class="modal"><h2>LIBRARY</h2>${cats.map(c=>`<div style="margin-bottom:10px"><h3 style="font-size:var(--font-xs);font-weight:700;color:var(--txt);margin-bottom:4px;text-transform:uppercase">${c}</h3>${S.promptTemplates.filter(p=>p.category===c).map(pt=>`<div style="padding:10px;border:1px solid var(--bdr);border-radius:var(--radius-sm);margin-bottom:4px;cursor:pointer" data-pt="${pt.id}"><div style="font-weight:700;font-size:var(--font-xs);color:var(--txt)">${pt.title}</div><div style="font-size:9px;color:var(--txt3)">${pt.prompt.substring(0,60)}...</div></div>`).join('')}</div>`).join('')}<button class="btn-secondary" style="width:100%;margin-top:8px" onclick="this.closest('.modal-overlay').remove()">CLOSE</button></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove()});o.querySelectorAll('[data-pt]').forEach(pt=>{pt.addEventListener('click',()=>{const t=S.promptTemplates.find(x=>x.id===pt.dataset.pt);if(t){let p=t.prompt;t.vars.forEach(v=>{const val=prompt(`Enter ${v}:`);if(val)p=p.replace(`{{${v}}}`,val)});o.remove();sendMessage(p)}})})});
  }
  if(founder){document.getElementById('btnAdminMemory')?.addEventListener('click',()=>{if(!S.adminAuth){const code=prompt('Admin code:');if(code===ADMIN_ACCESS_CODE){S.adminAuth=true;saveState();showToast('ACCESS GRANTED')}else{showToast('INVALID');return}}const all=GlobalMemory.recent(100);const o=document.createElement('div');o.className='modal-overlay open';o.innerHTML=`<div class="modal" style="width:600px;max-width:95vw"><h2>ADMIN MEMORY</h2><div style="margin-bottom:8px"><input type="text" placeholder="Search..." id="adminMemSearch" style="width:100%;background:var(--bg3);border:1px solid var(--bdr);color:var(--txt);padding:10px;border-radius:var(--radius-sm);font-size:var(--font-xs)"></div><div style="max-height:300px;overflow-y:auto">${all.map(m=>`<div style="padding:8px;border-bottom:1px solid var(--bdr);font-size:var(--font-xs)"><div style="font-weight:700;color:var(--txt)">${m.memoryId} · ${m.userId}</div><div style="color:var(--txt2)">${m.query||m.content||'—'}</div><div style="font-size:8px;color:var(--txt3)">${new Date(m.timestamp).toLocaleString()}</div></div>`).join('')||'<div style="padding:20px;text-align:center;color:var(--txt3)">EMPTY</div>'}</div><button class="btn-secondary" style="width:100%;margin-top:10px" onclick="this.closest('.modal-overlay').remove()">CLOSE</button></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove()});o.querySelector('#adminMemSearch')?.addEventListener('input',e=>{const r=GlobalMemory.search(e.target.value);o.querySelector('div[style*="max-height:300px"]').innerHTML=r.length?r.map(m=>`<div style="padding:8px;border-bottom:1px solid var(--bdr);font-size:var(--font-xs)"><div style="font-weight:700;color:var(--txt)">${m.memoryId} · ${m.userId}</div><div style="color:var(--txt2)">${m.query||m.content||'—'}</div><div style="font-size:8px;color:var(--txt3)">${new Date(m.timestamp).toLocaleString()}</div></div>`).join(''):'<div style="padding:20px;text-align:center;color:var(--txt3)">NO RESULTS</div>'})})}
  document.getElementById('btnTheme')?.addEventListener('click',()=>{S.theme=S.theme==='dark'?'light':'dark';saveState();render()});
  const sp=(t,c)=>{const o=document.createElement('div');o.className='modal-overlay open';o.innerHTML=`<div class="modal"><h2>${t}</h2><p style="color:var(--txt)">${c}</p><button class="btn-primary" style="width:100%" onclick="this.closest('.modal-overlay').remove()">CLOSE</button></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove()})};
  document.getElementById('btnPrivacy')?.addEventListener('click',()=>sp('PRIVACY',`CAPITAN AI by CLOSEAI Technologies.\n\nEnd-to-end encrypted. We never sell or share your data. You own your inputs and outputs.\n\n${SUPPORT_EMAIL}`));
  document.getElementById('btnTerms')?.addEventListener('click',()=>sp('TERMS',`Pro: $17/month. Free: 20 messages per 7 hours.\n\nCLOSEAI Technologies.\n\n${SUPPORT_EMAIL}`));
  document.getElementById('linkPrivacy')?.addEventListener('click',e=>{e.preventDefault();sp('PRIVACY',`CAPITAN AI. End-to-end encrypted.\n\n${SUPPORT_EMAIL}`)});
  document.getElementById('linkTerms')?.addEventListener('click',e=>{e.preventDefault();sp('TERMS',`Pro: $17/mo. Free: 20 msg/7hrs.\n\n${SUPPORT_EMAIL}`)});
  document.getElementById('linkTrust')?.addEventListener('click',e=>{e.preventDefault();sp('TRUST',`SOC 2 Type II. Encrypted. Regular audits.\n\n${SUPPORT_EMAIL}`)});
  document.getElementById('btnUpgrade')?.addEventListener('click',openPaymentModal);
  document.getElementById('closeModal')?.addEventListener('click',closePaymentModal);
  document.getElementById('closeModal2')?.addEventListener('click',closePaymentModal);
  document.querySelectorAll('#paymentModal .tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('#paymentModal .tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');document.getElementById('tabCard').style.display=tab.dataset.tab==='card'?'block':'none';document.getElementById('tabCrypto').style.display=tab.dataset.tab==='crypto'?'block':'none'})});
  document.getElementById('payCard')?.addEventListener('click',()=>activatePro());
  document.getElementById('verifyCrypto')?.addEventListener('click',()=>{if(document.getElementById('txidInput')?.value?.trim())activatePro();else showToast('ENTER TXID')});
  let ts=0;document.querySelector('.main')?.addEventListener('touchstart',e=>{ts=e.touches[0].clientX},{passive:true});document.querySelector('.main')?.addEventListener('touchend',e=>{if(e.changedTouches[0].clientX-ts>60&&!S.sidebarOpen){S.sidebarOpen=true;render()}});
}

function activatePro(){S.tier='pro';S.proExpiry=Date.now()+PRO_EXPIRY_DAYS*86400000;if(!S.promptTemplates.length)S.promptTemplates=getPrompts();closePaymentModal();saveState();showToast('WELCOME TO CAPITAN PRO');render()}
function openPaymentModal(){document.getElementById('paymentModal').classList.add('open')}
function closePaymentModal(){document.getElementById('paymentModal').classList.remove('open')}
document.getElementById('paymentModal')?.addEventListener('click',function(e){if(e.target===this)closePaymentModal()});

applyTheme();render();
if(isPro())setInterval(()=>{refreshData()},30000);
console.log('CAPITAN AI v17.0 — Sharp. Emotional. Commanding.');
</script>
